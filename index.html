 Zu was that budding flames started to appear in his heart. These yellowish flames resembled chicks, they gathered together in groups.","The more losses one ate, the more flames of resentment they would feel in their heart.","The more flames of resentment they had, the more uncomfortable it felt, even Ren Zu's several hearts could not take it, they were going to be incinerated soon!","Right at this moment, the heart of nobleness grew in Ren Zu's chest.","Compared to the other hearts, the heart of nobleness was able to endure the most flames of resentment. With this heart to bear the burden, Ren Zu finally managed to endure it.","Ren Zu ate all of the losses.","Strong Gu looked at Ren Zu's bulging belly as he smiled coldly: \"Oh human, you are almost at your limit, it is time for us to eat.\"","Ren Zu breathed roughly as he asked: \"What do you want to eat?\"","Strong Gu said: \"I want to eat your flesh.\"","Ren Zu was helpless about it, he could only let it eat his flesh.","Ren Zu's skin and flesh were inside Predicament's stomach, he only had his bones, organs, and hair left.","TL note: [1] The Chinese phrase for suffering/hardship is written as bitter head literally.","[2] Eat loss is the literal meaning of the phrase that means suffering a loss, being disadvantaged, or ending up in an unfavorable situation."]},{"id":"part_38","title":"The Legends of Ren Zu - Part 38","part":"38","paragraphs":["Ren Zu stared at the skeleton head: \"Next, I will eat the most important part of the Predicament's body.\"","Strong Gu laughed: \"This is a stupid move! Oh human, your choice is extremely foolish.\"","The Predicament shook its body as it shrank. At the same time, countless Tribulations flew out of its neck and attacked Ren Zu.","The Tribulations were like fire, burning Ren Zu's bones. The Tribulations were like hammers, charging at Ren Zu as his bones cracked. The Tribulations were like wind and rain, sweeping at Ren Zu's lone body. The Tribulations were like flashing lightning, striking on Ren Zu continuously.","Fear Gu shouted: \"Oh heaven, this is too scary, that human will die for sure at this rate.\"","Courage Gu encouraged: \"Oh human, don't be afraid.\"","Self Gu and attitude Gu shouted together: \"I am very strong, I am very strong, all Tribulations are mere drizzles, they are insignificant breezes!\"","Weak Gu, betrayal Gu, and fear Gu flew together, wanting to escape with Ren Zu: \"Oh human, quickly run. Don't believe in self Gu's words, it has already been deceived.\"","Ren Zu was trapped in the Tribulations, he could not escape.","When Tribulations loom over you, it is not a simple matter of running away.","\"This is too scary, let's go, forget about the human.\" Weak gu, betrayal Gu, and fear Gu flew away together.","\"You traitors!\" Self Gu was furious, it grabbed onto these three Gu and bit them all.","The three Gu were injured but they were not stopped by self Gu, they quickly escaped from Ren Zu.","Self Gu wanted to chase them but rules and regulation Gu urged: \"Don't chase them. Escaping when Tribulations strike due to fear and weakness, betraying one's self and courage in the process, it will only lead to death. Isn't it good that they are gone? Weak Gu and betrayal Gu are unable to help us, as for fear Gu… if the Tribulations did not appear, fear would have been pointless. But since the Tribulations are here now, fear will only lead to greater pain in the human.\"","\"You are absolutely right.\" Self Gu stopped.","Hope Gu flickered with light as it supported Ren Zu: \"Oh human, as long as you still have hope in your heart during the Tribulations, there will still be hope in this situation.\"","Strong Gu could not stop laughing: \"Oh human, you are truly pitiful, you easily believe in the words of hope. Don't you know? Having only hope during the Tribulations will only cause them to continue longer, hope is the thing that lengthens the person's pain. When you stop bearing any hope, you will feel relaxed in the Tribulations.\"","Ren Zu did not speak, he endured the attacks of the Tribulations with great difficulty.","No matter how bent his body became, he did not fall.","Strong Gu soon found the reason — on Ren Zu's feet, there was a pair of independent wings. Even though the wings were small, they flapped stubbornly, helping Ren Zu to stand up despite everything.","Strong Gu continued to demoralize Ren Zu: \"Oh human, I am starting to admire you. It is a pity that you are going to fall soon, look at your bones, they are covered in cracks now due to the Tribulations.\"","Ren Zu was silent.","Originally, Ren Zu's bones were shiny and intact, there were no cracks at all. Now, his skeleton was covered in cracks, it seemed like it would shatter at any moment.","All the other Gu worms were silent, only hope Gu gave out light: \"Oh human, don't give up! Tribulations are not scary, the scariest thing is a person who has lost hope.\"","The light of hope Gu penetrated the cracks of Ren Zu's bones, into his bone marrow.","In the life of everyone in this world, cracks would always form at some point, but those were the times where the light of hope would shine in!","Ren Zu's bones absorbed the light of hope, they started to engulf the surrounding Tribulations.","Each crack was like a huge mouth, the larger the crack, the larger the mouth, and the more Tribulations it could devour.","\"How could this happen?\" Strong Gu was extremely shocked.","The more Tribulations that Ren Zu's skeleton devoured, the stronger and firmer his bones became.","Tribulations could destroy people, but they could also toughen oneself!","As the Tribulations continued, Ren Zu's bones started to shine in a golden light.","The Tribulations became wilder as Ren Zu's bones burned in flames, becoming dazzlingly golden.","Ren Zu started to straighten his back, he raised his head and puffed his chest, after enduring countless tortures, his skeleton shined like a golden pillar, he stood directly inside the Tribulations. This was the myriad tribulation golden skeleton.","And on Ren Zu's skeleton head, a crown grew out naturally, it was the heaven connecting bone crown.","All of the tribulations and disasters that people suffer would become their crowns of achievement in the future.","Even though the Tribulations had not ended, Ren Zu could already speak at this time: \"I know, Fate has arrangements, Tribulations are the arrangements it makes for people. But I can persevere, any Tribulations that seem unendurable are all in fact endurable to me.\"","Strong Gu was shocked and bewildered.","Self Gu realized at this time: \"I understand. Oh human, you are someone who walked out of Ordinary Abyss, that is why you can endure these Tribulations that are impossible to endure.\"","Strong Gu saw that the Tribulations could not take down Ren Zu, it forced itself to stay calm: \"Oh human, don't forget, as long as you have hope Gu, these Tribulations will not stop. Are you going to delay our bet from earlier? I don't care! I will treat it as if you passed the Tribulations. Now, it is our turn to eat you.\"","\"Which part of me do you want to eat?\" Ren Zu sighed.","Strong Gu laughed loudly, pointing at Ren Zu's chest: \"Next, I will eat your hearts!\"","Ren Zu shook slightly, strong Gu's choice was too fatal, how could a human live without his heart?","\"Quickly take out all of your hearts, let us eat them!\" Strong Gu shouted in excitement.","Ren Zu sighed as he hesitated, before taking out the heart of sympathy.","Strong Gu directly placed the heart of sympathy into the Predicament's neck as the heart fell into its stomach. The Predicament's stomach expanded slightly.","When faced with predicaments, people often lose their hearts of sympathy first.","Ren Zu took out his heart of nobleness next, the Predicament ate it as its stomach expanded some more, it seemed to have problems digesting it.","Ren Zu took out his original heart next: \"Oh hope Gu, leave now. I do not want to implicate you.\"","Hope Gu resided in Ren Zu's original heart, it did not fly out, instead it said: \"I am not leaving, this is my home. Oh human, just toss me in along with it, I do not blame you.\"","Ren Zu had no choice, as strong Gu rushed him, he gave his original heart to the Predicament as food.","After the Predicament ate it, its belly expanded again.","Predicaments often caused people to lose hope as well.","Without hope Gu, all of the Tribulations around Ren Zu vanished. This caused the pressure on Ren Zu to fall, but he felt deep melancholy as well.","\"Quick, oh human, take out your final heart and let us eat it!\" Strong Gu pointed at the heart of loneliness in Ren Zu's chest.","Ren Zu hesitated as he felt troubled, the heart of loneliness did not only contain his self Gu, it was also his final heart. Without this heart, Ren Zu might die.","Strong Gu laughed and threatened: \"Quick! If you do not take it out yourself, we will make our move and eat you entirely!\"","Self Gu had already been deceived, it called out in nonchalance: \"Oh human, just give it to them. I do not care, you will not die either! We are the strongest.\"","\"Give it to me!\" Strong Gu grabbed the heart of loneliness in Ren Zu's hand and stuffed it into the Predicament's stomach through its exposed neck.","At this point, Ren Zu lost all his hearts.","He fell onto the ground, losing all signs of life, he could not stand up anymore.","Ren Zu died.","\"Oh human, you died, we have regained freedom.\" Rules and regulation Gu flew away.","\"There is no helping it, the human met with the greatest predicament in his life.\" Courage Gu and edge Gu flew away as well.","On Ren Zu's corpse, only self Gu remained, it flew around him. Attitude Gu wanted to leave too, but self Gu grabbed onto it, forcing it to stay.","Strong Gu laughed happily: \"Hahaha, oh human, you were nothing impressive after all. Hmm? Predicament, what's wrong?\"","The Predicament that strong Gu was attached to grabbed onto its bulging stomach as it rolled on the ground in pain.","Loneliness was extremely hard to digest, the stronger the Predicament, the lonelier one would feel.","Boom!","Suddenly, the Predicament's belly burst open.","Ren Zu's heart of loneliness, his skin and flesh fused to create a boy.","Strong Gu was flabbergasted: \"Who are you?\"","The boy said: \"I am Ren Zu's son — Great Strength True Martial!\"","Before finishing his words, he jumped up and grabbed strong Gu.","Strong Gu tried to struggle while self Gu used the opportunity to approach and take a bite of it.","Strong Gu was injured, it got weakened.","\"Where are you trying to go!\" Great Strength True Martial shouted, he grabbed strong Gu and stuffed it into his chest.","Strong Gu went into his chest and got imprisoned in his heart, unable to escape.","\"Don't waste your effort, this is my heart of ambition, you cannot escape.\" Great Strength True Martial laughed.","Next, he found Ren Zu's other hearts from the corpse of the Predicament and placed them back into his chest.","Ren Zu was revived once again!"]},{"id":"part_39","title":"The Legends of Ren Zu - Part 39","part":"39","paragraphs":["Legend says that Ren Zu encountered the greatest Predicament in his life, he ended up creating his seventh child, Great Strength True Martial, and was saved as a result.","Ren Zu and Great Strength True Martial started to travel together.","Great Strength True Martial asked: \"Father, where are we going now?\"","Ren Zu replied: \"My son, you still do not know the situation, I will explain it to you. I originally wanted to save your brothers and sisters, but fate Gu arranged everything, not allowing us to have a reunion. Right now, we need to break free from fate's control in order to be with our family again.\"","After hearing the story, Great Strength True Martial could not help but shout in anger: \"This fate Gu is too wicked.\"","At the same time, strong Gu also shouted in his heart: \"Experts hate restraints, especially fate.\"","Ren Zu patted Great Strength True Martial's head and consoled: \"Don't worry, I have already thought of a way. I will use self Gu to gain strength and wisdom, after, I will obtain freedom Gu and break free from fate Gu's control. Now, let us go to a place called Qian Kun Crystal Wall, we will search for wisdom Gu there.\"","Great Strength True Martial nodded: \"Let us go there then.\"","Ren Zu and Great Strength True Martial walked and walked, the road was uneven, there were many upslope and downslope roads.","Strong Gu encouraged Great Strength True Martial: \"Oh human, walk on the Upslope Road, even though it is a harder journey, there are often good things there!\"","Great Strength True Martial nodded: \"Experts like to walk on the Upslope Road.\"","Great Strength True Martial took great effort to walk up the Upslope Road, he looked around and called out: \"There's nothing here at all.\"","\"No, it is right by your feet, pick it up now.\" Strong Gu instructed.","Great Strength True Martial squatted down, searching the ground with his hands, as expected, he found something hard, it was an invisible Gu.","\"I found something good.\" Great Strength True Martial laughed: \"So it is effort Gu.\"","Ren Zu found it strange: \"My son, how did you find out its name? We can't see what it looks like.\"","Great Strength True Martial scratched his head: \"The moment I obtained it, I saw effort Gu's appearance. As for why I know this is effort Gu, well, every expert should know what effort is. This is natural, there is nothing strange about it.\"","After all, you cannot see the effort of other people.","The pair of father and son set off again.","\"This is great, now that I have effort Gu, it will help me greatly.\" Great Strength True Martial walked as he looked at effort Gu, feeling very happy.","He continued to choose the Upslope Road.","Ren Zu asked curiously: \"Is effort Gu really that amazing? Can it allow you to achieve success?\"","Great Strength True Martial shook his head: \"Effort might not necessarily lead to success, but effort will give you a result. Regardless of the result, whether you put in effort or not will show a difference.\"","Ren Zu was very worried: \"Oh son, you have just been born, don't be deceived by the Gu. I had once been deceived by wisdom Gu. I see that you are covered in sweat and pant heavily each time you walk on the Upslope Road, I do not see effort Gu helping you at all. I've heard of such rumors too, effort Gu can sometimes lie to you.\"","Great Strength True Martial shook his head as he wiped the sweat off his forehead: \"Father, because you cannot see the effort I put in, you misunderstood things. You cannot understand the amount of effort I put in to walk this Upslope Road. Actually, the result of my effort is below my feet, every step, I move higher and further. There are many good things on the Upslope Road, humans cannot obtain them without effort.\"","\"Is that really the case?\" Ren Zu was half convinced and suspicious.","Ren Zu and Great Strength True Martial continued on their journey.","Great Strength True Martial kept walking on the Upslope Road, he continued to move up higher, he obtained authority Gu and fortitude Gu.","In the later part of the road, he found humility Gu and forgiveness Gu as well.","These two Gu worms took the initiative to follow Great Strength True Martial.","Great Strength True Martial asked for the reason while they replied matter-of-factly: \"Because humility (forgiveness) is the authority of an expert to begin with.\"","Because Great Strength True Martial walked on the Upslope Road, an ability Gu suddenly appeared within him.","Great Strength True Martial held ability Gu as he said to Ren Zu: \"Look father, this is the result of effort Gu. It awakened my potential, I have my own ability now!\"","Ren Zu asked: \"Then what is the use of this ability Gu?\"","Great Strength True Martial shook his head: \"I am not sure. People will only know their abilities and their strength after they use them. But it is definitely useful, it can last my entire lifetime.\"","Ren Zu shook his head, he still felt that his son was deceived by the Gu.","Ren Zu and Great Strength True Martial continued walking, the situation on the road was getting worse.","Downslope Road was easier to walk on, but it was getting rarer, there were more and more segments of Upslope Road.","Not only so, more and more Predicaments appeared on the road.","\"Isn't there an easier road to walk on?\" Ren Zu was helpless.","Cognition Gu flew towards Ren Zu: \"Oh human, there is no other way. The more valuable thing you try to pursue, the more segments of the Upslope Road you need to walk on, and the more Predicaments you need to overcome.\"","Ren Zu and Great Strength True Martial had to continue on their way.","Indeed, as cognition Gu had said, they encountered more and more Predicaments, their road was completely blocked.","Ren Zu said: \"Don't be afraid of the Predicaments, we still have our hope.\"","\"But hope alone cannot defeat the Predicament, at this time, you will need me.\" Great Strength True Martial's ability Gu spoke.","Great Strength True Martial used his ability, defeating many Predicaments.","Ren Zu sighed at long last: \"My son, your ability Gu is too amazing, it can actually do this. It seems I have underestimated your effort and ability.\"","Great Strength True Martial smiled: \"Often, we humans do not lack abilities, we lack the opportunities to display them.\"","Strong Gu shouted in his heart with great ambition: \"Kill them all, let's eat them all! That way, we can become even stronger.\"","Great Strength True Martial killed many Predicaments, he started to eat the Predicaments' head.","\"So this is a bitter head? It is really bitter. But I can feel myself getting stronger.\"","He started to eat the Predicament's loss.","Great Strength True Martial immediately spat it out: \"Experts do not like to swallow losses.\"","He also ate the Predicament's flesh.","Strong Gu got bigger, Great Strength True Martial also became more muscular than before.","Strong Gu was very satisfied about this change: \"In this world, only by becoming stronger can one avoid getting bullied.\"","Great Strength True Martial gave some of the meat to Ren Zu: \"Oh father, eat something, you are too skinny.\"","Ren Zu was so thin he looked like a rack of bones.","Eventually, Great Strength True Martial tossed ability Gu into the tribulation.","Ability Gu went through great hurdles and difficulties, but it got larger and stronger as well.","All sorts of tribulations and difficulties were prime opportunities to train one's ability, to develop one's ability, and to increase one's ability."]},{"id":"part_40","title":"The Legends of Ren Zu - Part 40","part":"40","paragraphs":["Ren Zu and Great Strength True Martial went through great hurdles and finally arrived before Qian Kun Crystal Wall.","Qian Kun Crystal Wall was straight and stood upright in the void, it was like a huge mirror that reflected everything that happened in the world.","Ren Zu and Great Strength True Martial went inside Qian Kun Crystal Wall.","Numerous flowers, birds, fish and insects converged into a colorful dazzling shadow that filled Great Strength True Martial's vision. The sound of the waves, thunder, and birds' singing in his ears rippled together, there was a fresh, sweet, exciting, spicy taste dancing on his tongue. At times, he felt like he was walking on a steep mountain path, at other times he felt like he was swimming in the waves, and at other times he felt as if he was falling from a great height.","\"Father, father! Where are you?\" Great Strength True Martial shouted.","But Ren Zu could not hear Great Strength True Martial, he could not see Great Strength True Martial, the color of white filled his vision, it was boundless and vast.","\"Oh son, where are you?\" Ren Zu sprinted, wanting to find Great Strength True Martial.","Ren Zu ran and ran and ran, after a long time, he saw a black dot at the furthest point within his vision.","Initially, he felt happy and thought it was Great Strength True Martial. But when he approached the black dot, he found that it was actually a huge mountain.","This mountain was very special, the mountain rocks and vegetation were made of white paper, the streams and waterfalls were made of black ink.","This was Book Mountain.","At the foot of Book Mountain, there was a village with many inkmen living in it.","Ren Zu went into the village, causing a huge commotion to arise.","\"This is really a rare sight.\" The inkman spoke: \"When ordinary lifeforms enter Qian Kun Crystal Wall, they would get lost after a few steps, they cannot resist the allure of the material world or the countless temptations within it, they can never reach here. You are the first person to arrive here.\"","Ren Zu was confused: \"Why so?\"","The inkman elder replied: \"Oh human, you are only left with a skeleton, you cannot see, hear, taste, smell, or touch, it allowed you to roam Qian Kun Crystal Wall freely without losing your life.\"","Qian Kun Crystal Wall existed when the world was first created, it reflected everyone and everything, it contained all the secrets of the world's past and present. Once a person enters it, they would face the barrage of endless information, after some time, they would die from information overload.","After Ren Zu heard this, he felt very worried about Great Strength True Martial, he asked the inkman elder about the way to survive, the elder thus brought Ren Zu to ascend the mountain.","On Book Mountain, there was a largest ink waterfall, and below it was a deep pool.","The inkmen called this pool literature spring.","The ink waterfall continued to flow as it landed on the literature spring, water splashed about. These black color splashes flew in the air as the water droplets formed into ink texts.","\"If a person wants to continue living in Qian Kun Crystal Wall, the ink text will be your best helper. The reason why we inkmen can live here is also because of the ink text.\" The inkman elder told Ren Zu about this big secret.","Ren Zu received the inkman's advice, he collected a lot of ink texts and left the mountain.","Every time he walked for some distance, he would leave behind some ink texts as reference points.","In this vast world of whiteness, the pitch black ink text became very conspicuous. Even though ink texts faded over time, using them, Ren Zu no longer walked on unnecessary trails, he eventually found Great Strength True Martial.","Great Strength True Martial received Ren Zu's ink texts, every step he walked, he would leave behind some ink texts.","The ink texts recorded the information that barraged Great Strength True Martial, turning them all into pieces of literary work. These literary pieces turned into pieces of tiles that were layered below Great Strength True Martial's feet.","Great Strength True Martial was finally free, his eyes were not blurry, his ears were not buzzing, he could no longer smell the mix of countless fragrances as well.","Stepping on these tiles, he followed Ren Zu back to the inkman village.","Ren Zu asked the inkman elder again: \"Oh elder, how can I find wisdom Gu inside Qian Kun Crystal Wall?\"","The inkman elder told Ren Zu: \"Even though wisdom Gu often stays within Qian Kun Crystal Wall, it is hidden very deeply. To find it, you will need to venture deep into the crystal wall, it will not be possible with just ink texts and the tiles that are formed below your feet. These tiles only record all sorts of information on the superficial level, with the endless barrage of other information the limited ink texts within the tiles will change in content, they will disappear quickly and cannot last for long.\"","The inkman elder said again: \"Oh human, you need to turn all the information into knowledge. Only with knowledge can you explain information clearly, you will be able to write them down in words, allowing you to create a real path instead of just tiles made of texts.\"","Ren Zu was troubled: \"How can I turn them into knowledge?\"","The inkman elder laughed: \"There are many bookworms on Book Mountain, they record the knowledge that our inkman seniors have left behind. Oh human, you can go look at them.\"","\"It is not difficult to gather the knowledge yourself either. Firstly, you need memory Gu to store all of this information inside your mind. Next...\"","Before the inkman finished his words, cognition Gu appeared, saying to Ren Zu: \"After that, I can help you to refine knowledge.\"","The inkman elder nodded with a smile: \"Indeed, cognition can produce knowledge.\"","Ren Zu: \"Then I will thank you all in advance.”","The inkman elder shook his head: \"No need to stand on ceremony.\"","Cognition Gu: \"Don't say that human. We have always been good friends, and this situation benefits myself as well.\"","If cognition did not take in new information, it would quickly get outdated. Only by receiving new information and thinking about it could cognition create useful new thoughts that were healthy and vibrant, innovative and lively.","Ren Zu gathered many bookworms on Book Mountain, he obtained a lot of new information.","Next, with cognition Gu's help, he created many new knowledge from the vast amount of information.","He used ink texts to write down his knowledge, scattering them on the ground and creating a black path made of ink texts.","Ren Zu and Great Strength True Martial walked on this path, they walked for a long time, far longer than any of their previous trips.","\"Oh no, I don't have enough knowledge left.\" Ren Zu walked to the end of the path, feeling very dejected and upset. He had gathered many ink texts but the knowledge in his mind was insufficient already.","Ren Zu and Great Strength True Martial's first attempt failed, they had to return to Book Mountain.","Great Strength True Martial continued to collect ink texts while Ren Zu gathered all the bookworms, with cognition Gu's help, he refined even more knowledge from them.","With more and more knowledge, Ren Zu found that his mind was getting filled up.","“I have too much knowledge now.\" Ren Zu was very satisfied, he said confidently: \"Let's go, I am sure we can reach the deepest part of Qian Kun Crystal Wall this time!\"","However, they still failed in their second attempt.","\"Why did this happen? My mind was already filled with knowledge.\" Ren Zu said dejected: \"This is all the knowledge I can hold.\"","\"No, oh human, look closely again.\" Self Gu suddenly spoke to remind him.","Ren Zu inspected his mind, he found a Gu hiding inside it.","Ren Zu realized at once: \"So you are occupying my mind, preventing me from getting more knowledge. What Gu are you?\"","The Gu answered: \"I am pride Gu.\"","Ren Zu said anxiously: \"Can you hurry and get out, you are occupying such a huge area, I want to fill the place with knowledge instead.\"","But no matter how anxious Ren Zu was, or how he urged, pride Gu refused to leave.","When Ren Zu was out of ideas, Great Strength True Martial spoke: \"Oh father, don't be anxious. Don't forget that I still have humility Gu. I will give it to you.\"","Great Strength True Martial took out humility Gu and gave it to Ren Zu.","Pride Gu was chased away by humility Gu, it had to fly out of Ren Zu's mind and land on Great Strength True Martial instead.","Strong Gu was very happy: \"The strong have their own pride!\"","After Ren Zu chased pride Gu away from his mind, he returned to Book Mountain to continue gaining knowledge.","After Ren Zu gained humility Gu, he realized that the more knowledge he had, the more he found that he was lacking knowledge, and the more he wanted to fill his mind with even more knowledge.","Ren Zu's mind was quickly filled.","Self Gu urged him: \"Oh human, stop now, your mind is already full of knowledge.\"","But Ren Zu replied: \"But I think that it is insufficient, I am certain that I still do not know a lot of things, I need to continue gaining knowledge.\"","Ren Zu continued to refine his knowledge, his mind was getting bloated, it was hurting and could not hold anymore information, but humility Gu made him feel like he was still lacking in knowledge.","Suddenly, there was a loud boom.","Eventually, Ren Zu's mind could not take it anymore, it exploded from an overload of knowledge.","The knowledge scattered on the ground as a little girl stood up from within.","\"Father, father.\" The little girl hugged Ren Zu's leg happily: \"My name is Carefree Wisdom Heart, I am your daughter.\""]},{"id":"part_41","title":"The Legends of Ren Zu - Part 41","part":"41","paragraphs":["Carefree Wisdom Heart was born, she was intelligent and witty, Ren Zu liked his eighth child a lot.","But at the same time, Ren Zu was vexed: \"My mind shattered, what do I do? I cannot store more knowledge anymore. Sigh, it seems that only the two of you can help me now.\"","Thus, Carefree Wisdom Heart and Great Strength True Martial used their own minds to store up more knowledge.","They filled their minds with knowledge, before moving along with Ren Zu.","Ren Zu and his children started their third attempt.","Before they took a step, they would scatter ink text and knowledge, the text would describe their knowledge and form a small black path.","Ren Zu and his children walked on this small path.","But when they finished using their knowledge and reached the end of the ink text path, they did not see any signs of wisdom Gu.","Ren Zu's third attempt failed again.","Great Strength True Martial shrugged in disappointment: \"What do we do now? We have already done our best, but our knowledge is still insufficient. We cannot hold any more knowledge in our minds.\"","Ren Zu sighed, he was also quite helpless.","At this time, hope Gu flew out: \"Oh human, don't be disappointed, I am here.\"","Ren Zu was surprised: \"How can you help me?\"","Hope Gu answered: \"Oh human, I can awaken your aperture[1. Awaken aperture in Chinese can also mean enlightenment/reach an understanding.].\"","Hope allowed people to gain enlightenment (awaken their aperture).","Thus, hope Gu exerted effort to create an aperture for Ren Zu.","Humility Gu laughed: \"Then let me help you as well, human. When you have humility, your capacity will be larger, you will be able to hold more things.\"","Thus, the aperture expanded in size.","Ren Zu obtained the aperture and felt very happy: \"This place is really huge, I can store so much knowledge! This is wonderful.\"","Ren Zu and his children went to Book Mountain again, they refined their knowledge and searched for ink text.","Ren Zu stored a lot of knowledge into his aperture, even he did not know the quantity he took.","Ren Zu and his children set off on their fourth journey, they stepped on the ink text path and entered deep into Qian Kun Crystal Wall.","They went very deeply and searched many places, they changed directions countless times but still could not find wisdom Gu.","They had no choice but to return to Book Mountain.","This time, because the exploration took too long, the ink text path that they created when they set off was unable to endure the endless barrage of information, a large portion of it faded away.","Ren Zu found the inkman elder and asked: \"Why can't we find wisdom Gu?\"","The inkman elder replied: \"Sometimes, when we inkmen explore the place, we would encounter wisdom Gu. But you three have searched the entire Qian Kun Crystal Wall but did not find wisdom Gu, it means that it is intentionally hiding from you, it does not want to meet you.\"","Carefree Wisdom Heart quickly asked: \"Then where is wisdom Gu hiding at?\"","The inkman elder pondered and said: \"Oh humans, you have searched the entire Qian Kun Crystal Wall. If wisdom Gu is still inside here, it can only hide in one place. That place is called Primordial Domain, it is the most mysterious part of Qian Kun Crystal Wall.\"","\"Qian Kun Crystal Wall has a record of everything that happens in the world, it contains infinite information. Primordial Domain contains the information of the world since creation, it also has the information of the ends of all living beings. It is both the starting point and the ending point. It has nothing, yet it comprises everything.\"","Great Strength True Martial was overjoyed: \"We have not gone to Primordial Domain yet, oh inkman elder, tell us how to get into the Primordial Domain.\"","The inkman elder shook his head: \"It is not that I do not want to help you, but we inkmen have also only heard of the location, we have never entered it. Oh humans, we inkmen admire you a lot. You possess knowledge that far surpasses us, thus, if you want to enter Primordial Domain, you need to rely on yourselves.\"","Ren Zu and his children had to make their own research.","Carefree Wisdom Heart had a find, she shouted joyfully: \"I found it, I found it!\"","\"Oh daughter, what did you find, why are you so excited?\" Ren Zu asked in curiosity.","Carefree Wisdom Heart opened both her palms: \"On my right palm, I found right Gu. On my left palm, I found wrong Gu.\"","\"These two Gu are born in your body, they are ordinary looking and are much less presentable than my authority Gu. What help can they give us?\" Great Strength True Martial was very prideful, he spoke nonchalantly.","Carefree Wisdom Heart answered: \"These two Gu allow us to differentiate and classify our knowledge. Look at our knowledge again, the truth is, much of it is right at this moment, but after some time, those pieces of information will be wrong. There is also much of it that is right when placed here, but wrong when placed there. I think that if we use the knowledge that is always right at all times and use it to make our text path, we will be able to reach Primordial Domain.\"","Ren Zu nodded: \"Your words are quite logical. Let us try it.\"","But no matter how they looked, they could not find such knowledge.","Great Strength True Martial's strong Gu said proudly: \"Oh humans, you are wasting your effort.Because in this world, there has only been strong and weak, there has never been right or wrong, thus, your actions are in vain, you cannot classify right and wrong.\"","\"Qian Kun Crystal Wall contains everything that happens in the world, all of the information comprises genuine events with no lies. Using right and wrong will not be able to differentiate them at all, because since they exist, or rather, since they existed, they are all logical information.\"","Carefree Wisdom Heart was criticized, but her eyes shined with bright light: \"I get it, the existence of everyone in the world, regardless of right or wrong, is logical, because this is the true meaning of their existence. This is what true meaning is!\"","\"Be it information or knowledge, they are a type of expression of true meaning, a form of revelation. If we can grasp true meaning, not only can we explain what is right, we can also explain what is wrong, it can explain everything!\"","\"Let us search for it.\"","The three of them started to dig up true meaning from the vast sea of knowledge.","Great Strength True Martial was the first to get impatient, Ren Zu also lost his perseverance soon, but only Carefree Wisdom Heart remained calm and composed, her expression was serious and solemn.","After a long time, Great Strength True Martial pointed at Carefree Wisdom Heart, he gasped in shock: \"Look, another Gu grew on your body!\"","The newly born Gu was called serious Gu.","After Carefree Wisdom Heart obtained it, she became very happy: \"With this Gu, I will be able to recognize true meaning more easily.\"","After a long time, Ren Zu pointed at Carefree Wisdom Heart as well: \"Look, another Gu appeared on your body.\"","The second Gu was called learning Gu.","Carefree Wisdom Heart started to learn knowledge, she converted knowledge into things that she truly understood, she was no longer just storing them using memory Gu.","She started to understand more and more knowledge, soon, a third Gu appeared on her body.","The third Gu was called talent Gu.","\"I found it, I found it!\" One day, Carefree Wisdom Heart shouted with joy, with the help of serious Gu, learning Gu, and talent Gu, she finally found the true meaning of knowledge.","\"Quickly tell us, what does true meaning look like?\" Great Strength True Martial was very happy as he asked.","But Carefree Wisdom Heart shook her head: \"The true meaning contained within will be lost if I try to convey it in words.\"","\"Then write it out using ink text.\" Great Strength True Martial thought about it and suggested.","But Carefree Wisdom Heart shook her head again: \"The meaning can only be understood, it cannot be passed down in text!\"","Ren Zu waved his hand: \"Forget it, since you possess true meaning now, let's head out immediately.\"","Carefree Wisdom Heart was filled with true meaning, they set off from Book Mountain as she scattered ink text on the ground, the path was much wider than before, it was also more sturdy.","Ren Zu and his children walked on the great path and arrived in Primordial Domain.","Within Primordial Domain, they met wisdom Gu.","Wisdom Gu was quite helpless, it had already hidden itself so deeply but Ren Zu still found it, self Gu managed to take a bite out of it in the end."]},{"id":"part_42","title":"The Legends of Ren Zu - Part 42","part":"42","paragraphs":["Wisdom Gu was bitten by self Gu, it felt very angry and decided to take revenge.","Wisdom Gu found lie Gu: \"No matter what I say, my words are filled with wisdom, they will advise and help others. This won't do, so I came to you for help.\"","Lie Gu asked: \"How do you want me to help you?\"","Wisdom Gu said: \"This is easy and simple. Ren Zu and his children are in Primordial Domain now. In front of Primordial Domain is Xi Land, while behind it is Hu Land. Go to Primordial Domain and deceive Ren Zu, tell him Hu Land is in front while Xi Land is behind.\"","Lie Gu was puzzled: \"That can help you take revenge?\"","Wisdom Gu laughed loudly: \"Humans need to breathe in first before they can breathe out. Meanwhile, Xi Land and Hu Land are the breathing of heaven and earth. Just follow my instructions.\"","Lie Gu followed wisdom Gu's arrangements and went to Primordial Domain. It told Ren Zu: \"Human, you need to be careful. You are in a mystical place, you will reach Hu Land if you go forward and Xi Land if you move back.\"","Ren Zu had been thinking of leaving Primordial Domain, he thought: \"The beastmen once advised me to not go to Hu Land. In that case, I shall head towards the back and go to Xi Land.\"","Ren Zu moved towards the back of Primordial Domain with his children Great Strength True Martial and Carefree Wisdom Heart.","Thus, they arrived at Hu Land.","\"This is not Xi Land!\" Carefree Wisdom Heart knew they had been deceived.","Ren Zu patted his chest: \"Fortunately, I died once and betrayal Gu has already left me. Otherwise if I care[1. 'Care' is read as 'At Hu' here, its a word pun.], betrayal Gu will harm me.\"","But Great Strength True Martial suddenly realized something and shouted: \"This is bad!\"","\"What's wrong?\" Ren Zu was just about to ask when self Gu flew out of his body.","Self Gu left Ren Zu, leaving behind a sentence: \"Oh human, after you put attitude Gu on me, you deceived even yourself, so don't blame me for leaving you.\"","Back then, Ren Zu protected weak Gu. Weak Gu urged Ren Zu to put attitude Gu on self Gu to deceive himself; creating the perfect deception that managed to even deceive the Predicament.","If humans deceived themselves, their sense of self would leave and the person would lose themselves.","Ren Zu was angry and anxious: \"What to do, self Gu left me. How can I obtain freedom without it? How can I break free of the restraints of fate?\"","\"Self Gu once took a bite of betrayal Gu, so it gained the inclination to betray. I was already dissatisfied with it.\" Great Strength True Martial's ability Gu shouted.","The skilled were naturally dissatisfied with themselves.","\"Self Gu will be out of our sight soon, we need to give chase!\" Carefree Wisdom Heart reminded.","The three immediately chase after self Gu.","Self Gu left very fast and dove into a river.","The river's surface was calm with ice of all sizes floating on it.","\"This is the River of Time, the ice floating on the river is called truthful floating ice.\" Ren Zu's group recognized it immediately, they had gained this knowledge in the Qian Kun Crystal Wall.","Ren Zu looked afar and said: \"I think self Gu is hiding in the center of the floating ice, let's quickly go and catch it!\"","Ren Zu's group sized up the situation by the riverside.","Every piece of floating ice in the River of Time was a piece of truth.","Ren Zu observed for a long while before pointing towards a floating ice: \"This floating ice is neither big nor small and has a smooth surface, let's step on this.\"","But Great Strength True Martial said: \"This floating ice is clearly too small, it is not enough for us three.\"","Carefree Wisdom Heart shook her head: \"This floating ice is quite big but there are many spikes on it, they will pierce our feet.\"","Even when looking at the same truth, from the perspectives of different people, they could be big or small, minor or severe, difficult or easy. Some could accept it, but some could not.","Ren Zu's group discussed for a long while before they chose a floating ice and stepped on it.","When Ren Zu stepped on this ice, he immediately cried and sniveled; Great Strength True Martial shouted in anger, while Carefree Wisdom Heart laughed happily.","When looking at the same truth, different people would have different feelings and emotions regarding it.","Ren Zu and his children could only endure this.","\"Every piece of floating ice in the River of Time is a cold and silent truth. But we humans have hearts, we feel emotions when we come across truths, and when truths and emotions mix, they create different situations[1. The Chinese character for situation/thing is made up of truth and emotion.] for everyone.\" Carefree Wisdom Heart recalled the knowledge in her mind.","The floating ice carried the group and drifted for a while before it started shrinking and submerging.","\"Let's jump to that floating ice.\" Ren Zu pointed towards the left, at his front.","Before the floating ice under them submerged, the three jumped to the second floating ice.","This piece of truth created different emotions in Ren Zu's group.","The longer they stood on the floating ice, the more these emotions accumulated.","As the floating ice continued to sink, the emotions they felt also changed. Some went from angry to happy, while others went from happy to depressed.","\"I can't endure this anymore, I feel horrible.\" After persisting for a while, Ren Zu said while grasping his heart, \"Let's jump to that floating ice.\"","The three jumped over, but shortly afterwards, Carefree Wisdom Heart said: \"I cannot stand this situation, I am also feeling extremely down. I even want to die.\"","Ren Zu's group of three quickly changed to another floating ice.","No matter what truth they came upon, in reality, they could be endured by gritting one's teeth. The most dreadful thing was the suffering of the heart.","If the heart could not endure it, the person would be unable to continue moving forward.","After changing several pieces of floating ice, Great Strength True Martial felt the least amount of discomfort: \"I am still fine.\"","Strong Gu shouted proudly in his heart: \"There are too many situations in the world, but it has always been the weak who suffer more than the strong.\"","Fortitude Gu called out: \"The credit here goes to me because I have been helping you since the start.\"","Fortitude Gu could suppress emotions.","Suddenly, two Gu worms grew on Carefree Wisdom Heart's palms.","The Gu on the left palm was called Good. The Gu on the right palm was called Bad.","\"Humans, we can help you distinguish which situation is good and which is bad.\" Good Gu and bad Gu said together in a soft voice.","Thus, with the help of good Gu and bad Gu, Ren Zu's group was able to choose a piece of floating ice that had a good situation.","All three of them felt happy when standing on this floating ice.","When the floating ice started to submerge and good situations turned bad, the three jumped away.","Like this, the three gradually turned happy, then ecstatic, before finally becoming euphoric. They could not move forward anymore as they drowned in emotions of endless joy.","The three forgot about their situation, the truthful floating ice they were standing on submerged completely, they fell into the river one after the other."]},{"id":"part_43","title":"The Legends of Ren Zu - Part 43","part":"43","paragraphs":["After falling into the water of the River of Time, Ren Zu and the other two woke up in shock.","The three immediately climb up to a nearby floating ice, although it was only a short time, they had already grown old.","\"Time Gu is hidden within the River of Time, our lifespan will be washed away by the river water.\" Great Strength True Martial sighed.","Ren Zu felt regretful: \"Constantly encountering good situations is actually a bad thing, it will create a huge problem! It is not good to be too happy or constantly happy, it can make people indulge in the present and forget about time as they get immersed entirely.\"","But Carefree Wisdom Heart said with a tone of joy: \"Quick, look at your heart!\"","The three of them inspected their inner heart, they saw that many accumulated emotions had been washed away earlier when they fell into the river.","This discovery made Ren Zu and the other two feel very happy.","Next, they continued to travel on the floating ice.","Whenever they encountered a bad situation and felt negative emotions, they would put their heart into the river water to wash it: \"These bad situations will pass eventually.\"","Their negative emotions faded away with time.","Whenever they encountered a good situation and felt immersed in joy, they would put their heart into the river water to wash it: \"These good situations will pass eventually.\"","Their positive emotions also weakened over time, preventing them from feeling indulgent.","Cognition Gu saw that the three of them were constantly washing their hearts, it could not help but remind them: \"Time has never healed the wounds of the heart, except that your hearts have grown old. The worst thing is not your body growing old but your hearts aging. Stop washing them.\"","Ren Zu and the other two heard these words and quickly stopped their actions.","But without washing the hearts, their speed fell again.","\"Let me help you.\" At this time, a Gu worm flew over and landed on Ren Zu.","Ren Zu and the other two saw this Gu worm and became very happy.","It was familial emotion Gu.","With the help of familial emotion Gu, Ren Zu and the other two spread their emotions around, the joy of one person was split among three, the sorrow of one person was also split into three.","Using familial emotion, Ren Zu and the other two consoled each other and carried each other's burden, they moved quickly and firmly.","But good times did not last.","More and more emotions accumulated in their hearts, their hearts became tired and gradually got hurt after being unable to sustain it any longer.","Deep emotions hurt the heart.","The situation soon aggravated, because their hearts were severely injured, they could not take in more emotions.","At this time, Carefree Wisdom Heart took out a cage and held it in her hand: \"This is the Mental Domain that I created, place all your emotions in here.\"","Ren Zu and Great Strength True Martial did as she said.","They put their emotions into the Mental Domain.","Immediately, the truthful floating ice revealed its original appearance in front of the three.","They were simply pieces of floating ice, the three felt a different sensation towards it now.","The emotions of people did not concern others, only their own mental state mattered.","\"What is this?\" Carefree Wisdom Heart soon found a Gu worm in the floating ice.","The Gu worm answered: \"I am calm Gu.\"","The truth was icy cold, this was the attitude that one should have when facing situations.","Ren Zu and the other two finally reached the center of the truthful floating ice.","But they did not find self Gu.","\"So self Gu is not here.\" Ren Zu was very disappointed.","Initially, people would often think that they were the center of all situations, but that was not true.","At the center of the truthful floating ice, there was no self Gu, but three other Gu instead.","They were rules Gu, regulation Gu, and practice Gu.","Rules and regulation Gu had been with Ren Zu for a long time, after Ren Zu's heart was eaten by the Predicament, they thought that he died and left him.","They came here to create truthful floating ice along with practice Gu.","All sorts of situations were bound by the rules and regulation of heaven and earth.","The three Gu continued to create truthful floating ice like this, afterwards, under the effect of time Gu, these floating ice flowed away and sank.","Rules and regulation Gu saw Ren Zu and felt surprised: \"Oh human, so you did not die.\"","Ren Zu quickly asked them on how he could find self Gu.","Rules and regulation Gu pointed at practice Gu and said in unison: \"It can help you!\"","Practice Gu replied: \"Oh human, you have gone through too many situations. After such a long time, you have changed a lot. Self Gu is the same, even if it is right before you, it will feel very foreign now, you cannot recognize it.\"","\"What can I do?\" Ren Zu was troubled.","\"This is simple.\" Practice Gu laughed: \"Can't you just undergo the situation of 'recognizing yourself'?\"","\"That's right!\" Ren Zu and the other two realized at once.","Practice Gu continued: \"For a human, recognizing yourself is the most important and also most difficult thing in the world. Great Strength True Martial, you are strong and have ability, if we work together, the chance of success is very high.\"","Ability Gu laughed and said: \"Undergoing situations can make me stronger.\"","Carefree Wisdom Heart supported this, she gave serious Gu to Great Strength True Martial.","Great Strength True Martial started to undergo situations alongside practice Gu.","They first created a piece of floating ice that was as small as a ball. It surrounded Great Strength True Martial and practice Gu as a light membrane appeared around the ice ball.","Ren Zu and Carefree Wisdom Heart stood on top of the ice ball as they flowed away, eventually encountering year Gu.","\"Is this self Gu?\" Ren Zu asked.","Great Strength True Martial replied: \"No, self Gu is smaller than it.\"","They continued to undergo situations within the ice ball as ability Gu got stronger, the floating ice also became larger as a water membrane appeared around the periphery.","While floating, Ren Zu saw month Gu.","\"Is this self Gu?\" Ren Zu asked.","Great Strength True Martial replied: \"No, self Gu is smaller than it.\"","Great Strength True Martial and practice Gu continued working hard, ability Gu got stronger and made this floating ice even bigger, the periphery of the ice ball was covered in a stone membrane.","Ren Zu saw day Gu.","\"Is this self Gu?\" Ren Zu asked.","Great Strength True Martial replied: \"No, self Gu is smaller than it.\"","The stronger the ability, the more one would find that they were small and insignificant.","Eventually, the floating ice reached its biggest size, the periphery was covered by a crystal membrane. Ren Zu and the other two floated on the ice ball and eventually found self Gu.","\"Self Gu is actually so small.\" Ren Zu was internally shaken.","Cognition Gu sighed: \"In the eyes of heaven and earth, in the eyes of mankind, a single self Gu is very small and insignificant.\""]}];

let currentSectionId = null;
let fontSize = parseInt(localStorage.getItem('rz_fontSize') || '19');
let bookmarks = JSON.parse(localStorage.getItem('rz_bookmarks') || '[]');
let ctxVerse = null;
let ctxSectionId = null;

// ── Utils ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1800);
}

function isBookmarked(sid, vi) {
  return bookmarks.some(b => b.sectionId === sid && b.verseIndex === vi);
}

function saveBookmarks() {
  localStorage.setItem('rz_bookmarks', JSON.stringify(bookmarks));
}

function getSectionTitle(id) {
  const s = SCRIPTURE.find(s => s.id === id);
  return s ? s.title : id;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, query) {
  if (!query) return esc(text);
  const e = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp('(' + e + ')', 'gi'), '<mark>$1</mark>');
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    const on = b.dataset.tab === tab;
    b.classList.toggle('active', on);
    const icons = { legend: ['✦','◇'], search: ['⊕','⊙'], bookmarks: ['✦','◆'] };
    b.querySelector('.tab-icon').textContent = icons[b.dataset.tab][on ? 0 : 1];
  });
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'bookmarks') renderBookmarks();
  closeCtxMenu();
}

// ── Contents ──
function renderContents(query) {
  const q = (query || '').toLowerCase().trim();
  const filtered = q
    ? SCRIPTURE.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.part.includes(q) ||
        s.paragraphs.some(p => p.toLowerCase().includes(q)))
    : SCRIPTURE;

  document.getElementById('contents-count').textContent =
    q ? (filtered.length + ' passage' + (filtered.length !== 1 ? 's' : '') + ' for "' + q + '"')
      : (filtered.length + ' passages');

  const list = document.getElementById('contents-list');
  list.innerHTML = '';
  filtered.forEach(s => {
    const div = document.createElement('div');
    div.className = 'contents-item';
    div.innerHTML =
      '<div class="contents-item-left">' +
        '<div class="contents-part">Part ' + s.part + '</div>' +
        '<div class="contents-title">' + esc(s.title) + '</div>' +
        '<div class="contents-count">' + s.paragraphs.length + ' verses</div>' +
      '</div>' +
      '<div class="contents-arrow">›</div>';
    div.addEventListener('click', () => openReader(s.id, null));
    list.appendChild(div);
  });
}

document.getElementById('contents-search').addEventListener('input', function() {
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  renderContents(this.value);
});
document.getElementById('clear-btn').addEventListener('click', function() {
  document.getElementById('contents-search').value = '';
  this.style.display = 'none';
  renderContents('');
});

// ── Reader ──
function openReader(sectionId, scrollToVerse) {
  currentSectionId = sectionId;
  const section = SCRIPTURE.find(s => s.id === sectionId);
  if (!section) return;
  document.getElementById('reader-part-title').textContent = 'Part ' + section.part;
  renderReader(section, scrollToVerse);
  document.getElementById('reader-screen').classList.add('open');
  closeCtxMenu();
}

function renderReader(section, scrollToVerse) {
  const scroll = document.getElementById('reader-scroll');
  const idx = SCRIPTURE.findIndex(s => s.id === section.id);
  const hasPrev = idx > 0;
  const hasNext = idx < SCRIPTURE.length - 1;

  scroll.innerHTML = '';

  // Title block
  const title = document.createElement('div');
  title.className = 'reader-title-block';
  title.innerHTML =
    '<div class="reader-ornament">✦  ✦  ✦</div>' +
    '<div class="reader-section-label">The Legend of Ren Zu</div>' +
    '<div class="reader-section-title">' + esc(section.title) + '</div>' +
    '<div class="reader-title-rule"></div>';
  scroll.appendChild(title);

  // Verses
  section.paragraphs.forEach((para, i) => {
    const div = document.createElement('div');
    div.className = 'verse-wrap' +
      (isBookmarked(section.id, i) ? ' bookmarked' : '') +
      (scrollToVerse === i ? ' highlighted' : '');
    div.dataset.verse = i;
    div.dataset.section = section.id;
    const span = document.createElement('span');
    span.className = 'verse-text';
    span.style.fontSize = fontSize + 'px';
    span.textContent = para;
    div.appendChild(span);

    // Long-press / right-click
    let pressTimer;
    div.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, div); });
    div.addEventListener('touchstart', e => { pressTimer = setTimeout(() => showCtxMenu(e.touches[0], div), 500); }, { passive: true });
    div.addEventListener('touchend', () => clearTimeout(pressTimer));
    div.addEventListener('touchmove', () => clearTimeout(pressTimer));
    scroll.appendChild(div);
  });

  // End ornament
  const end = document.createElement('div');
  end.className = 'reader-end';
  end.innerHTML = '<div class="reader-end-rule"></div><div class="reader-end-ornament">✦</div><div class="reader-end-rule"></div>';
  scroll.appendChild(end);

  // Nav buttons
  const nav = document.createElement('div');
  nav.className = 'reader-nav';
  const prevBtn = document.createElement('button');
  prevBtn.className = 'reader-nav-btn';
  prevBtn.textContent = '‹ Previous';
  prevBtn.disabled = !hasPrev;
  prevBtn.addEventListener('click', () => { if (hasPrev) openReader(SCRIPTURE[idx - 1].id, null); });
  const nextBtn = document.createElement('button');
  nextBtn.className = 'reader-nav-btn';
  nextBtn.textContent = 'Next ›';
  nextBtn.disabled = !hasNext;
  nextBtn.addEventListener('click', () => { if (hasNext) openReader(SCRIPTURE[idx + 1].id, null); });
  nav.appendChild(prevBtn);
  nav.appendChild(nextBtn);
  scroll.appendChild(nav);

  // Scroll to verse
  if (scrollToVerse !== null && scrollToVerse > 0) {
    requestAnimationFrame(() => {
      setTimeout(() => {
        const target = scroll.querySelector('[data-verse="' + scrollToVerse + '"]');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 120);
    });
  } else {
    scroll.scrollTop = 0;
  }
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('reader-screen').classList.remove('open');
  document.getElementById('font-controls').classList.remove('open');
  currentSectionId = null;
});

document.getElementById('font-toggle').addEventListener('click', () => {
  document.getElementById('font-controls').classList.toggle('open');
});

function updateFontSize() {
  fontSize = Math.max(14, Math.min(28, fontSize));
  localStorage.setItem('rz_fontSize', fontSize);
  document.getElementById('font-size-label').textContent = fontSize + 'pt';
  if (currentSectionId) {
    document.querySelectorAll('.verse-text').forEach(el => { el.style.fontSize = fontSize + 'px'; });
  }
}
document.getElementById('font-dec').addEventListener('click', () => { fontSize -= 2; updateFontSize(); });
document.getElementById('font-inc').addEventListener('click', () => { fontSize += 2; updateFontSize(); });
document.getElementById('font-size-label').textContent = fontSize + 'pt';

// ── Context menu ──
function showCtxMenu(e, el) {
  ctxVerse = parseInt(el.dataset.verse);
  ctxSectionId = el.dataset.section;
  const section = SCRIPTURE.find(s => s.id === ctxSectionId);
  const menu = document.getElementById('ctx-menu');
  document.getElementById('ctx-ref').textContent = (section ? section.title : '') + ' · Verse ' + (ctxVerse + 1);
  document.getElementById('ctx-bookmark').textContent =
    isBookmarked(ctxSectionId, ctxVerse) ? '✕  Remove Bookmark' : '✦  Bookmark Verse';
  const x = Math.max(8, Math.min((e.clientX || 0), window.innerWidth - 230));
  const y = Math.max(8, Math.min((e.clientY || 0), window.innerHeight - 160));
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('open');
}

function closeCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('open');
}

document.addEventListener('click', e => { if (!e.target.closest('#ctx-menu')) closeCtxMenu(); });

document.getElementById('ctx-bookmark').addEventListener('click', () => {
  if (ctxVerse === null) return;
  const section = SCRIPTURE.find(s => s.id === ctxSectionId);
  const text = section ? (section.paragraphs[ctxVerse] || '') : '';
  if (isBookmarked(ctxSectionId, ctxVerse)) {
    bookmarks = bookmarks.filter(b => !(b.sectionId === ctxSectionId && b.verseIndex === ctxVerse));
    saveBookmarks();
    showToast('Bookmark removed');
    document.querySelector('[data-verse="' + ctxVerse + '"]')?.classList.remove('bookmarked');
  } else {
    bookmarks.unshift({ sectionId: ctxSectionId, verseIndex: ctxVerse, text: text.slice(0, 120), savedAt: Date.now() });
    saveBookmarks();
    showToast('✦ Passage bookmarked');
    document.querySelector('[data-verse="' + ctxVerse + '"]')?.classList.add('bookmarked');
  }
  closeCtxMenu();
});

document.getElementById('ctx-share').addEventListener('click', () => {
  if (ctxVerse === null) return;
  const section = SCRIPTURE.find(s => s.id === ctxSectionId);
  const text = section ? (section.paragraphs[ctxVerse] || '') : '';
  const ref = '\u2014 The Legend of Ren Zu, ' + (section ? section.title : '') + ', Verse ' + (ctxVerse + 1);
  const full = '"' + text + '"\n\n' + ref;
  if (navigator.share) navigator.share({ text: full });
  else if (navigator.clipboard) navigator.clipboard.writeText(full).then(() => showToast('Copied to clipboard'));
  closeCtxMenu();
});

// ── Search ──
document.getElementById('search-input').addEventListener('input', function() {
  document.getElementById('search-clear-btn').style.display = this.value ? 'block' : 'none';
  runSearch(this.value.trim());
});
document.getElementById('search-clear-btn').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  runSearch('');
});

function runSearch(query) {
  const list = document.getElementById('search-results-list');
  const countEl = document.getElementById('search-count');
  const hint = document.getElementById('search-hint');

  if (!query || query.length < 2) {
    hint.style.display = 'flex';
    list.querySelectorAll('.search-result-item, .search-empty:not(#search-hint)').forEach(e => e.remove());
    countEl.textContent = '';
    return;
  }

  hint.style.display = 'none';
  const q = query.toLowerCase();
  const results = [];
  for (const section of SCRIPTURE) {
    for (let i = 0; i < section.paragraphs.length; i++) {
      if (section.paragraphs[i].toLowerCase().includes(q)) {
        results.push({ section, verseIndex: i, text: section.paragraphs[i] });
      }
    }
  }

  countEl.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + query + '"';

  list.querySelectorAll('.search-result-item, .search-empty:not(#search-hint)').forEach(e => e.remove());

  if (results.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.style.display = 'flex';
    empty.innerHTML = '<div class="search-empty-ornament">✦</div><div class="search-empty-text">No results for "' + esc(query) + '"</div>';
    list.appendChild(empty);
    return;
  }

  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-result-item';
    div.innerHTML =
      '<div class="search-result-ref">' + esc(r.section.title) + ' · Verse ' + (r.verseIndex + 1) + '</div>' +
      '<div class="search-result-text">' + highlight(r.text, query) + '</div>';
    div.addEventListener('click', () => {
      openReader(r.section.id, r.verseIndex);
    });
    list.appendChild(div);
  });
}

// ── Bookmarks ──
function renderBookmarks() {
  const list = document.getElementById('bookmarks-list');
  list.innerHTML = '';

  if (bookmarks.length === 0) {
    list.innerHTML = '<div class="bm-empty"><div class="bm-empty-ornament">✦</div><div class="bm-empty-text">No saved passages<br><span style="font-size:14px">Long-press any verse while reading<br>to bookmark it here.</span></div></div>';
    return;
  }

  const wrap = document.createElement('div');
  wrap.style.padding = '8px 0 4px';
  bookmarks.forEach((bm, idx) => {
    const card = document.createElement('div');
    card.className = 'bookmark-card';
    card.innerHTML =
      '<div class="bookmark-card-header">' +
        '<div class="bookmark-ref">' + esc(getSectionTitle(bm.sectionId)) + ' · Verse ' + (bm.verseIndex + 1) + '</div>' +
        '<button class="bookmark-delete" data-idx="' + idx + '">✕</button>' +
      '</div>' +
      '<div class="bookmark-text">"' + esc(bm.text) + (bm.text.length >= 120 ? '…' : '"') + '"</div>' +
      '<div class="bookmark-date">' + formatDate(bm.savedAt) + '</div>';
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('bookmark-delete')) return;
      openReader(bm.sectionId, bm.verseIndex);
    });
    card.querySelector('.bookmark-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      bookmarks.splice(idx, 1);
      saveBookmarks();
      renderBookmarks();
      showToast('Bookmark removed');
    });
    wrap.appendChild(card);
  });
  list.appendChild(wrap);
}

// ── Tab buttons ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Close reader if open before switching tabs
    document.getElementById('reader-screen').classList.remove('open');
    document.getElementById('font-controls').classList.remove('open');
    currentSectionId = null;
    switchTab(btn.dataset.tab);
  });
});

// ── Init ──
renderContents('');
</script>
