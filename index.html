<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0800;--bg-card:#1a1000;--bg-section:#120c00;--bg-input:#1f1500;
  --gold:#c9952a;--gold-light:#e8bc5a;--gold-dim:#7a5a10;--gold-border:#3d2a08;
  --text-primary:#f0e6cc;--text-secondary:#b89a60;--text-muted:#7a6040;--text-verse:#e8dcc0;
  --separator:#2a1e08;--tab-bar:#0a0600;--header-bg:#0d0800;--highlight:rgba(201,149,42,0.1);
  --tab-height:64px;--font:'EB Garamond',Georgia,serif;
}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font);-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;height:100dvh;width:100%;overflow:hidden;position:relative}
#tab-bar{display:flex;background:var(--tab-bar);border-top:1px solid #2a1a00;height:var(--tab-height);flex-shrink:0;order:2;z-index:5}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 4px;-webkit-tap-highlight-color:transparent}
.tab-icon{font-size:16px;color:var(--text-muted);line-height:1}
.tab-label{font-family:var(--font);font-size:clamp(8px,2vw,10px);letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase}
.tab-btn.active .tab-icon,.tab-btn.active .tab-label{color:var(--gold);font-weight:700}
#screens{flex:1;overflow:hidden;order:1;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--gold-border) transparent}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:2px}
.screen-header{display:flex;flex-direction:column;align-items:center;padding:clamp(16px,5vw,28px) 20px clamp(14px,4vw,20px);flex-shrink:0}
.header-title{font-size:clamp(18px,5.5vw,26px);font-weight:700;color:var(--gold);letter-spacing:clamp(3px,1.2vw,6px);text-transform:uppercase;text-align:center}
.header-rule{width:80px;height:1px;background:var(--gold-border);margin-top:14px}
.search-bar-wrap{display:flex;align-items:center;gap:8px;margin:0 clamp(12px,4vw,16px) 8px;background:var(--bg-input);border:1px solid var(--gold-border);border-radius:10px;padding:0 12px;height:44px;flex-shrink:0}
.search-bar-wrap input{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:clamp(15px,4vw,17px);color:var(--text-primary)}
.search-bar-wrap input::placeholder{color:var(--text-muted)}
.search-icon{color:var(--text-muted);font-size:13px}
.clear-btn{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:2px 4px;display:none;-webkit-tap-highlight-color:transparent}
.result-count{font-style:italic;font-size:clamp(11px,3vw,12px);color:var(--text-muted);padding:0 clamp(14px,4vw,20px) 6px;flex-shrink:0}
.contents-item{display:flex;align-items:center;padding:clamp(12px,3vw,14px) clamp(14px,4vw,20px);background:var(--bg-card);cursor:pointer;border-bottom:1px solid var(--separator);-webkit-tap-highlight-color:transparent}
.contents-item:hover,.contents-item:active{background:#221500}
.contents-item-left{flex:1;min-width:0}
.contents-part{font-size:clamp(9px,2.5vw,11px);letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.contents-title{font-weight:700;font-size:clamp(14px,4vw,16px);color:var(--text-primary);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contents-count{font-size:clamp(10px,2.5vw,12px);color:var(--text-muted);margin-top:3px;font-style:italic}
.contents-arrow{color:var(--gold-dim);font-size:22px;margin-left:12px;flex-shrink:0}
#reader-screen{display:none;flex-direction:column;position:absolute;inset:0;z-index:10;background:var(--bg)}
#reader-screen.open{display:flex}
#reader-header{display:flex;align-items:center;padding:clamp(8px,2.5vw,10px) clamp(12px,4vw,16px);border-bottom:1px solid var(--gold-border);background:var(--header-bg);flex-shrink:0;gap:8px}
#back-btn{font-family:var(--font);font-size:clamp(14px,4vw,16px);color:var(--gold);background:none;border:none;cursor:pointer;flex:1;text-align:left;padding:0;-webkit-tap-highlight-color:transparent;white-space:nowrap}
#reader-part-title{flex:2;text-align:center;font-weight:700;font-size:clamp(14px,4vw,16px);color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#font-toggle{flex:1;text-align:right;font-family:var(--font);font-weight:700;font-size:clamp(13px,3.5vw,15px);color:var(--gold);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
#font-controls{display:none;align-items:center;justify-content:center;gap:clamp(12px,4vw,20px);padding:8px 16px;background:var(--bg-section);border-bottom:1px solid var(--gold-border);flex-shrink:0}
#font-controls.open{display:flex}
.font-btn{font-family:var(--font);font-weight:700;font-size:clamp(13px,4vw,15px);color:var(--gold);background:var(--bg-input);border:1px solid var(--gold-border);border-radius:8px;padding:5px clamp(10px,3vw,16px);cursor:pointer;-webkit-tap-highlight-color:transparent}
#font-size-label{font-family:var(--font);font-size:13px;color:var(--text-muted);min-width:36px;text-align:center}
#reader-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 clamp(16px,5vw,26px);scrollbar-width:thin;scrollbar-color:var(--gold-border) transparent}
#reader-scroll::-webkit-scrollbar{width:3px}
#reader-scroll::-webkit-scrollbar-thumb{background:var(--gold-border)}
.reader-title-block{text-align:center;padding:clamp(24px,6vw,36px) 0 clamp(20px,5vw,28px)}
.reader-ornament{color:var(--gold);font-size:14px;letter-spacing:8px;margin-bottom:12px}
.reader-section-label{font-style:italic;font-size:clamp(10px,2.5vw,12px);color:var(--text-secondary);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.reader-section-title{font-weight:700;font-size:clamp(18px,5vw,22px);color:var(--text-primary);line-height:1.4}
.reader-title-rule{width:80px;height:1px;background:var(--gold-border);margin:20px auto 0}
.verse-wrap{margin-bottom:clamp(14px,4vw,18px);padding:6px;border-radius:6px;cursor:context-menu;-webkit-tap-highlight-color:transparent}
.verse-wrap.bookmarked{border-left:2px solid var(--gold);padding-left:14px}
.verse-wrap.highlighted{background:var(--highlight)}
.verse-text{line-height:1.72;color:var(--text-verse);text-align:justify;word-break:break-word}

.ctx-ref{font-style:italic;font-size:12px;color:var(--gold);padding:8px 16px 6px;letter-spacing:.5px}

.ctx-item{display:block;width:100%;padding:12px 16px;font-family:var(--font);font-weight:700;font-size:clamp(14px,4vw,16px);color:var(--gold-light);background:none;border:none;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.ctx-item:hover,.ctx-item:active{background:rgba(201,149,42,.08)}
.search-input-wrap{display:flex;align-items:center;gap:8px;margin:0 clamp(12px,4vw,16px) 8px;background:var(--bg-input);border:1px solid var(--gold-border);border-radius:10px;padding:0 12px;height:46px;flex-shrink:0}
.search-input-wrap input{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:clamp(15px,4vw,17px);color:var(--text-primary)}

.search-clear-btn{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent}

.search-empty-ornament{color:var(--gold-dim);font-size:clamp(22px,6vw,28px)}
.search-empty-text{font-style:italic;font-size:clamp(14px,4vw,16px);color:var(--text-muted);text-align:center;line-height:1.6}

.search-result-item:hover,.search-result-item:active{background:#221500}
.search-result-ref{font-weight:700;font-size:clamp(10px,2.5vw,11px);color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.search-result-text{font-size:clamp(14px,3.8vw,15px);color:var(--text-verse);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.search-result-text mark{background:rgba(201,149,42,.18);color:var(--gold-light);font-weight:700;border-radius:2px}
.bookmark-card{background:var(--bg-card);border:1px solid var(--gold-border);border-left:3px solid var(--gold);border-radius:10px;padding:clamp(12px,4vw,16px);margin:0 clamp(12px,4vw,16px) 10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bookmark-card:hover,.bookmark-card:active{background:#221500}
.bookmark-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bookmark-ref{font-weight:700;font-size:clamp(10px,2.5vw,11px);color:var(--gold);flex:1;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.bookmark-delete{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 0 0 8px;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.bookmark-delete:hover{color:#c02020}
.bookmark-text{font-style:italic;font-size:clamp(13px,3.8vw,15px);color:var(--text-verse);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.bookmark-date{font-size:clamp(10px,2.5vw,11px);color:var(--text-muted);margin-top:8px;font-style:italic}
.bm-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
.bm-empty-ornament{color:var(--gold-dim);font-size:clamp(22px,6vw,28px)}
.bm-empty-text{font-style:italic;font-size:clamp(14px,4vw,16px);color:var(--text-muted);text-align:center;line-height:1.6}
#toast{position:fixed;bottom:calc(var(--tab-height) + 12px);left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--gold-border);border-radius:20px;padding:10px 20px;font-family:var(--font);font-size:14px;color:var(--gold);z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1}

@supports(padding-bottom:env(safe-area-inset-bottom)){#tab-bar{padding-bottom:env(safe-area-inset-bottom);height:calc(var(--tab-height) + env(safe-area-inset-bottom))}}

<script>
const SCRIPTURE = [{"id":"part_1","title":"The Legends of Ren Zu - Part 1","part":"1","paragraphs":["One of the oldest legends talk about the Hope Gu. In the legend, when the world was just formed it was a land of savage wilderness. Among the wild beasts that walked the earth, the first man appeared. He was known as Ren Zu, eating raw meat and drinking blood, living a difficult life.","In particular was a group of wild beasts called Predicament. These wild beasts loved the taste of Ren Zu and longed to eat him.","Ren Zu did not have a body as strong as mountain rock, nor did he have the sharp teeth and claws of a wild beast. How could he fight with the Predicaments? His source of food was unstable and he had to hide all day. He was at the bottom of nature’s food chain, and could barely survive.","At this moment, there were 3 Gu that came up to him and said, “As long as you use your life to provide us, we will help you through this difficulty.” Ren Zu had nowhere to go, so he could only agree to these 3 Gu.","He first gave his youth away to the biggest Gu among the three. That Gu then granted him strength.","With strength, Ren Zu’s life began to change. He started to have a stable source of food and was able to protect himself. He fought bravely and ruthlessly, defeating many Predicaments. But soon he suffered and finally realized that strength was not everything. It needed to heal and be cultivated, not spent freely at his will. Not to mention when facing the entire group of Predicaments, his strength alone was too small.","Ren Zu reflected over this lesson bitterly and decided to give his prime middle years to the most beautiful Gu among the three. And thus, the second Gu gave him wisdom.","With wisdom, Ren Zu was able to learn how to think and reflect. He began to accumulate experience and found out that many times when he used wisdom, it was more effective than using strength. By relying on wisdom and strength was he able to conquer all the goals that he formerly could not, and killed many Predicaments. He ate the meat of Predicaments and drank the blood of Predicaments, surviving with tenacity.","But good things do not last and Ren Zu was old, and would only grow older and older. This is because he gave away his youth and middle years to keep the Strength Gu and Wisdom Gu. When a man is old, his muscles deteriorate and his brain slows down.","“Human, what else can you give us? You don’t have anything else left to provide to us,” the Strength Gu and Wisdom Gu said as they realized this. They left him.","Without wisdom and strength, Ren Zu was once surrounded by Predicaments. He was old and could not run, his teeth had fallen out and could not even chew wild fruits and plants.","As he fell weakly onto the ground surrounded by Predicaments, his heart was filled with desperation. It was at this time the third Gu said to him, “Human, take me up. I will help you escape Predicament.”","Ren Zu tearfully replied, “Gu, I don’t have anything else left. See, the Strength Gu and Wisdom Gu have abandoned me. I only have my old age left! While it is not as worth my youth and middle age, but if I give you my old age, my life would immediately end. Even though I am surrounded by Predicaments right now, but I will not die immediately. I wish to live a little longer, even if just a second more. So you should leave, I have nothing else to provide to you.”","But the Gu said, “Among the three I have the smallest needs. Human, if you just give me your heart, it will be enough.”","“Then I will give you my heart,” Ren Zu said. “But Gu, what can you give me in return? In this situation, even if the Strength Gu and Wisdom Gu returned to my side, it would change nothing.”","When compared to the Strength Gu, this Gu looked frail and was just a tiny ball of light. When compared to the Wisdom Gu, this one was only able to give out a dim white light, not beautiful in any way.","But when Ren Zu gave it his heart, this Gu suddenly gave out endless light. In this light, the Predicaments screamed in horror: “This is the Hope Gu, withdraw! We Predicaments are most afraid of hope!”","The Predicaments retreated suddenly. Ren Zu was speechless, and from that day onwards whenever he faced Predicament, he would give his heart to hope."]},{"id":"part_2","title":"The Legends of Ren Zu - Part 2","part":"2","paragraphs":["The story mentioned that Ren Zu was able to escape his predicament because of hope. But eventually he grew old and without Strength Gu and Wisdom Gu, he could no longer continue to hunt. Even his teeth fell off, making him unable to chew many wild fruits and vegetables.","Ren Zu felt death slowly approaching.","At this time, the Hope Gu said to him, \"Human, you must not die. If you die, your heart will be lost and I will lose my only place of residence.\"","Ren Zu was helpless. \"Who wishes to die? But if the heavens and earth want me dead, I have no choice.\"","The Hope Gu said, \"There's always hope in everything. As long as you can catch a Longevity Gu, you will be able to increase your lifespan.\"","Ren Zu had heard of the existence of the Longevity Gu long ago but he waved his hand helplessly. \"When the Longevity Gu stays still, nobody can detect it and when it flies, it is faster than light. How can I possibly catch it? It’s too hard!\"","The Hope Gu then told Ren Zu a secret, \"Human, don't give up hope no matter what. Let me tell you, on the northwest corner of this continent, there is a huge mountain. On the mountain, there is a cave and in that cave, there is a pair of round and square Gu Worms. As long as you can subdue them, there is no Gu in this world that you cannot catch, including the Longevity Gu!\"","Ren Zu had no choice, this was his last remaining hope.","He braved all difficulties and finally found the mountain. He then risked his life and ventured through countless dangers to ascend the mountain. On the mountain top, near the cave entrance, he used his last remaining strength to slowly make his way in.","The inside of the cave was completely dark and one would not be able to even see their own fingers. Ren Zu walked in the darkness. Sometimes, he would bump into things not knowing what they were. This caused himself to get injured and wounded all over. At times, he felt that this dark cave was huge beyond words as if this was a world of its own. He felt as if he was the only person in the area.","He spent a lot of time but he could not walk out of the darkness. Not to mention subduing the two Gu Worms.","Just when he was at a loss about what to do, two voices spoke to him from the darkness.","One voice said, \"Human, you're here to catch us? Go back, for even if you had the Strength Gu, it would be impossible.\"","The other said, \"Human, go back, we will not take your life. Even if you had the Wisdom Gu to help you, you may not be able to find us.","Ren Zu laid exhausted on the ground, panting. \"The Strength Gu and Wisdom Gu had left me long ago and I do not have much lifespan left so I’m at my wits end. But as long as there's hope in my heart, I will not give up!\"","Hearing Ren Zu's words, the two voices went silent.","After a while, one of the Gu said, \"I understand, human, you have already given your heart to the Hope Gu. You will not give up no matter what.\"","The other continued, \"In that case, we shall give you a chance. As long as you can say our name, we will allow you to use us.\"","Ren Zu was stunned. To find their names among all the words in the world, it was akin to finding a needle in a haystack.","Furthermore, he did not even know how many words were in their names.","Ren Zu quickly asked the Hope Gu, but it did not know either.","Ren Zu had no alternatives and had no choice but to randomly guess their names. He said many many names and wasted a lot of time but the darkness did not respond to him so evidently he was wrong.","Eventually, Ren Zu's breath got weaker as he turned from an old man into a dying man. It was like the scene of the evening's setting sun. The sun that would slowly descending had already been lowered halfway across the horizon, becoming a sunset.","The food he had brought was gradually reduced, his brain becoming slower and he barely had any energy to speak anymore.","The voice in the darkness urged, \"Human, you are almost dead, so we will let you go. Using your remaining time, you can climb out of the cave and take a final look at the world. But you have offended us, and as punishment, the Hope Gu shall stay here as our companion.\"","Ren Zu clenched his heart and rejected, \"Even if I die, I will not give up hope!\"","The Hope Gu was very touched and answered Ren Zu's call enthusiastically, emitting a bright light. At Ren Zu's chest area, a light began to shine. But this light was too weak, it could not illuminate the darkness. In fact, it could not even cover Ren Zu's entire body, but only engulfed his chest area.","Yet Ren Zu could feel a renewed surge of energy gushing into his body from the Hope Gu.","He continued to speak, shouting out names. But he was already muddled. A lot of names had already been said but he could not remember that and repeated them, wasting a lot of effort in the process.","As time continued to flow, Ren Zu's lifespan was almost over.","Finally, when he was on his final day, he said out the word ‘Regulation’.","A sigh came from the darkness as a voice spoke, \"Human, I admire your perseverance. You have said my name, so from today onwards, I will obey your commands. But only with my brother can I aid you in capturing all the Gu in the world. Otherwise, with my ability alone, it is impossible. Thus, you should give up. You're almost dead, you might as well use this chance to take a final look at the world.\"","Ren Zu was determined and shook his head, he made use of all his time to continue saying out names as he tried to guess the other Gu worm's name.","Seconds and minutes went by and soon he only had one hour left.","But at this time, he unknowingly said the word ‘Rule’.","Immediately, the darkness dissipated.","The two Gu's appeared before him. As the Hope Gu had said, one was cubic, called ‘Regulations’. The other was spherical, called ‘Rules’. Together, they made up ‘Rules and Regulations’.","The two Gu said together, \"No matter who it is, as long as they know our names, we will listen to them. Human, since you know our names already, we will be at your service. But you must remember, it is important to not let others know of our names. The more people that know our names, the more people we have to obey them. Now that you are the first to subdue us, tell us your request.\"","Ren Zu was overjoyed. \"Then I order you both, go and catch me a Longevity Gu.\"","The Rules Gu and Regulations Gu worked together and captured an eighty-year Longevity Gu.","Ren Zu was already a hundred years old but after consuming this Gu, the wrinkles on his face vanished and his frail limbs became muscular again. A vibrant aura of youth oozed from him.","With a belly flop, he jumped up onto his feet.","He ecstatically looked at his body, knowing that he had regained the body of a twenty year old!"]},{"id":"part_3_1","title":"The Legends of Ren Zu - Part 3.1","part":"3.1","paragraphs":["Ever since Ren Zu was able to get their names and subdued the Rules Gu and Regulation Gu, his first order was for them to capture a Longevity Gu.","Rules Gu and Regulation Gu, one round and other other square, worked together and could capture all the Gu in the world, a Longevity Gu was nothing difficult.","Ren Zu used the Longevity Gu and got back his youth, becoming 20 years old again.","But now the Rules Gu said, \"Human, although you subdued us, every time you command us, it will add a rule and regulation.\"","Regulation Gu continued, \"We can catch the Longevity Gu for you, this is the first order. Our new rule and regulation is, we will not repeatedly catch the same Gu for you.\"","That means, if Ren Zu wanted to catch a Longevity Gu again, the two Rules Gu and Regulation Gu would not help.","Ren Zu nodded, having no choice but to accept.","He gave his second command, \"Then, other than the Longevity Gu, please capture all the other ten thousand Gu in the world for me.\"","Rules Gu and Regulation Gu got this command and Rules Gu turned into a giant circle, encompassing the universe. Regulation Gu turned into a giant square, covering the large world.","One square and one round formed a giant net together, enveloping the entire world.","When they shrunk again and returned to Ren Zu, all the Gu in the world other than Longevity Gu were captured.","Ren Zu was overjoyed, with this all the Gu belonged to him, from now on he was the ruler of the world!","But once he opened the net, with a swoosh, a large number of worms flew outside and the Gu that Rules Gu and Regulation Gu worked hard to catch, all escaped fervently.","When Ren Zu closed the net, only five Gu were left.","\"Why is this?\" Ren Zu was astonished.","Rules Gu and Regulation Gu answered him, \"Human, the world has over ten thousand Gu with all sorts of abilities. You have no strength or knowledge, how can you subdue them? We can only capture Gu for you, to subdue them, you have to rely on yourself to get them to work for you.\"","Next they added, \"This is your second order, so we’ll add a second rule and regulation --- From now on, we can only catch one Gu for you at a time.\"","Ren Zu could only nod, and carefully opened the net, only showing a small gap.","The remaining five Gu contained the Strength Gu and Wisdom Gu. Seeing this, Ren Zu was overjoyed.","He said to Strength Gu, \"Strength Gu, you left me back then, do you have any regrets? If you succumb to me now, I will return you your freedom.\"","Strength Gu said, \"Human, you are wrong. I didn’t leave not because I couldn’t, but because I wanted to stay. You want to subdue me but that’s impossible. I only succumb to those stronger than me, but you are out of the question. However we can deal again, give me your youth and I will temporarily obey you.\"","Ren Zu was reluctant upon hearing this, he had just gotten back his youth, was he about to lose it again?","But he desired strength, he knew that with strength, he would get stronger and life would get easier.","Moreover, with strength, he could subdue more Gu.","Thus, Ren Zu accepted, and formed a second deal with it.","Ren Zu became middle-aged at once, and the Strength Gu flew out of the web and landed on Ren Zu’s shoulder.","Ren Zu had strength, and was full of confidence.","He said to Wisdom Gu: \"Wisdom Gu, you left me back then, do you have any regrets? If you succumb to me now, I will return you your freedom.\"","Wisdom Gu said, \"Human, you are wrong. I did not leave not because I couldn’t, but because I wanted to stay. You want to subdue me but that’s impossible. I only succumb to those smarter than me, yet you are not smarter than me. But we can deal again, give me your middle age and I will temporarily obey you.\"","Ren Zu upon hearing this, refused to do the same deal again.","He treasured his life more, and he also knew that once he sold his middle age, he would be left with old age. Before long, the Strength Gu and Wisdom Gu would leave him again, just like last time.","Ren Zu refused to deal, but did not want to let go of the Wisdom Gu.","Wisdom Gu was anxious, reluctantly giving in, \"Alright, Human, you win. I lost to you this time. As long as you tell me what method you used to capture me, I will admit defeat and not take anything from you, being at your disposal.\"","Upon hearing this, Ren Zu was overjoyed and before the Rules Gu and Regulation Gu could stop him, he said, \"I used the Rules Gu and Regulation Gu to capture you.\"","Wisdom Gu laughed upon hearing, \"I remembered it, so these Gu are called Rules Gu and Regulation Gu. Haha, now that I know your names, you can no longer capture me.\"","Saying so, it turned into a flash of light and flew away, vanishing into thin air.","Rules Gu and Regulation Gu begin to complain, \"Human, we told u long ago that our name should be known by you alone, and not others. Otherwise, we would be used by others. Look what happened, now that Wisdom Gu knows our names, it spells trouble.\"","Only then did Ren Zu realise that he was tricked by Wisdom Gu. He was anguished, for he knew he lost the only chance he had of capturing the Wisdom Gu using Rules Gu and Regulation Gu."]},{"id":"part_3_2","title":"The Legends of Ren Zu - Part 3.2","part":"3.2","paragraphs":["Ren Zu had the Rules Gu and Regulation Gu, and could capture all the ten thousand Gu in the world, obtaining Strength Gu but losing Wisdom Gu.","At that point his net still contained three Gu. He opened and saw that they were the Attitude Gu, Belief Gu and Suspicion Gu respectively.","Ren Zu was unwilling to let them go, thus the three Gu could only bet with him.","Once Ren Zu opens the net, they would run out in three different directions, and whoever is captured by Ren Zu would be subdued. Guess, who did Ren Zu capture in the end?. It’s the Attitude Gu!"]},{"id":"part_4","title":"The Legends of Ren Zu - Part 4","part":"4","paragraphs":["Words have it that Ren Zu used the Rules Gu and Regulation Gu and obtained Strength Gu but losing Wisdom Gu, leaving behind three Gu worms. One was Suspicion Gu, one was Trust Gu, and another was Attitude Gu.","Ren Zu grabbed the Attitude Gu.","Attitude Gu followed the betting rules, submitting to Ren Zu, telling him, \"Human, you caught me, I can only curse my bad luck. From now on, I will be at your command. Wear me and you will be able to use my ability.\"","Attitude Gu’s appearance was like a mask. Ren Zu put it on his face, but in the end he could not wear it. Even if he used a rope to tie it, it would still fall off.","\"What’s going on?\" Ren Zu was troubled.","Attitude Gu laughed, \"I know, human, you have no heart. Attitude is the mask of the heart, so without a heart, how can you wear me?\"","Ren Zu realised at once, he had already given his heart to hope.","He was heartless.","Someone who is heartless cannot wear the attitude mask. In other words, to someone with a heart/an intention, their attitude is a mask."]},{"id":"part_5_1","title":"The Legends of Ren Zu - Part 5.1","part":"5.1","paragraphs":["Legend says, Ren Zu had obtained the Attitude Gu. Attitude Gu was like a mask, and without a heart Ren Zu couldn’t wear it.","Because before this, Ren Zu had given his heart to the Hope Gu, and from then on he never feared difficulty.","But if Ren Zu wanted to use the Attitude Gu, he needed to have a heart.","Ren Zu was troubled, thus he asked Attitude Gu; he said, \"Oh Gu, sometimes attitude says its all. Now that I have encountered a problem, you know it, thus I’m here to seek advice.\"","Attitude Gu said, \"This is not hard. Ren Zu, you lack a heart, thus you just have to find a new one.\"","Ren Zu was confused, asking again, \"Then how can I find a new heart?\"","Attitude Gu sighed, \"Heart, is nowhere and everywhere. Finding a heart, it is both easy and difficult. With your situation, you can obtain a heart now.\"","Ren Zu was overjoyed, \"Quick, tell me, how?\"","Attitude Gu warned him, \"This heart, is called loneliness. Human, are you sure you want it? Once you obtain it, you will face endless pain, loneliness and even fear!\"","Ren Zu did not listen to his warning, he continued asking.","Attitude Gu could not defy Ren Zu’s orders, thus he said, \"You only have to stare at the sky on a starry night, and say nothing. Once you reach daylight, you will obtain the heart of loneliness.\"","That night, it was a star-filled sky.","According to Attitude Gu’s instructions, Ren Zu sat alone at the mountain peak, staring at the night sky.","Before this, his life was very difficult, constantly struggling for survival, he had no time to admire this beautiful yet mysterious sky.","But now, as he stared at the starry sky, his thoughts began floating. Constantly thinking about himself, such a meagre and weak being like himself, living a life of constant fear and insecurity.","\"Sigh, although I have Hope Gu, Strength Gu, Rules Gu and Regulation Gu, and Attitude Gu, to survive in this land, it is still difficult as ever. Even if I die tomorrow, it is not shocking. If I die, will the world remember me? Will anyone rejoice over my existence, and grieve over my death?\"","Thinking of this, Ren Zu shook his head.","In this world, he was the only human, how can there be others?","Even with Gu accompanying him, he still felt a strong sense of","Loneliness.","Heart of loneliness!","At this moment, when Ren Zu felt lonely, his body suddenly had a brand new heart.","The sun rose from the horizon, and shone on his face. But Ren Zu felt no happiness, and instead felt an endless pain, despair, confusion and even fear.","He could not endure this loneliness and fear, for all he felt was the advent of darkness and apocalypse!","Thus, he painfully cried, stretching out his fingers and digging out his eyes.","His left eye fell onto the ground and transformed into a young man. He had golden hair and a strong body. Once he appeared, he kneeled at Ren Zu’s feet, saying: \"Oh Ren Zu, my father, I am your eldest son, Verdant Great Sun.\"","At the same time, his right eye turned into a young girl, and she held Ren Zu’s hand, saying, \"Oh Ren Zu, my father, I am your second daughter, Desolate Ancient Moon.\"","Ren Zu laughed loudly, tears flowing out of his empty sockets. He said ‘good’ three times and continued, \"I have children now, I can finally endure the pain of the heart of loneliness. From now one, there will be people celebrating my existence, and grieving for my death, even if I die now, you will remember me.\"","\"Only that...\" Finally, he sighed, \"I lost both my eyes, and can no longer see the light. From now on, you two shall observe this world for me.\""]},{"id":"part_5_2","title":"The Legends of Ren Zu - Part 5.2","part":"5.2","paragraphs":["In the legend, before Ren Zu died, he gave birth to ten children. The eldest son Verdant Great Sun, second daughter Desolate Ancient Moon. Among the ten, there was one named Northern Dark Ice Soul. Ren Zu’s legends whether real or false, alluded to many secrets in Gu Master’s cultivation. Ren Zu’s ten kids individually represented ten types of ultimate aptitudes.","In Ren Zu’s story, his ten kids didn’t have a long life. In reality, it is difficult for the Gu Masters who hold ten extreme physiques to grow and mature, almost all dying an untimely death. Of course, if they can really grow to become a Rank six, they will be able to sweep through same stage opponents and even perform miracles such as fighting a higher rank!"]},{"id":"part_6","title":"The Legends of Ren Zu - Part 6","part":"6","paragraphs":["Ren Zu was unable to endure the heart of loneliness, thus he dug out both eyes, turning them into a son and daughter. This alleviated his sense of loneliness.","But good things do not last, for his children started to crave the scenery of the outside world, forgetting all about their father Ren Zu and always going out to play until they forgot the time, and even forgot to take care of Ren Zu.","Ren Zu could not see anything, it was total darkness.","But at time, he could see a little bit of light.","To this, he felt perturbed, and asked the Attitude Gu.","Attitude Gu told this to him, \"Oh, this is the eternal light given out by the Faith Gu.\""]},{"id":"part_6_1","title":"The Legends of Ren Zu - Part 6.1","part":"6.1","paragraphs":["Ren Zu’s ten children, eldest son Verdant Great Sun, second daughter Desolate Ancient Moon... the ten children’s aptitude defied heaven, thus heaven was wary and did not give them a long lifespan. In the Gu world, the ten children also represented the top ten most extreme aptitudes!","That is — the ten extreme physiques!","\"Ren Zu’s ten children died one by one, and Ren Zu was about to die of old age. But at the end, Ren Zu gathered the corpse of his ten children and sacrificed himself, all going into the stomach of the Derivation Gu. Derivation Gu’s stomach burst, exploding and countless life spreading across the land, creating the first batch of mortals. These mortals did not have Ren Zu or the ten children’s talent, but they could cultivate after awakening their aperture. Humanity thus grew and developed, forming today’s size. Of course, that is all a mythological story.\""]},{"id":"part_7","title":"The Legends of Ren Zu - Part 7","part":"7","paragraphs":["In this world, humans weren't the only ones who knew how to brew wines.","The earliest records of wine came from the legend of Ren Zu.","Ren Zu's two eyes turned into his eldest son Verdant Great Sun and daughter Desolate Ancient Moon.","Verdant Great Sun was always with Desolate Ancient Moon, and this close association created feelings towards his own sister. However, Desolate Ancient Moon refused his wooing.","Verdant Great Sun was annoyed because of this, and knew he needed some help, thus he asked the Wisdom Gu.","At first, the Wisdom Gu ignored him and avoided him as much as it could. But Verdant Great Sun kept on persevering, and the Wisdom Gu couldn't endure this annoyance any more, so it told him a way - \"In the east dwells a group of Honey Peach Monkeys. Drink the wine brewed by them and come find me.\"","Thus, Verdant Great Sun went to the east and drank the wine.","The wine brewed by the Honey Peach Monkeys was fruit wine. And ever since Verdant Great Sun drank the wine and returned, his face had a rosy flush. He smacked his lips as he recalled the taste: \"So, wine is sweet.\"","The Wisdom Gu smiled and said: \"In the west lies a group of Psychic Monkeys. Go taste the wine brewed by them.\"","The wine brewed by Psychic Monkeys was bitter wine. Verdant Great Sun went to the west and drank the wine; since then, his tongue had a yellowish-brown hue to it. He recalled the taste with a bitter expression: \"So, wine can also be bitter.\"","Wisdom Gu said to him again: \"Wine is both bitter and sweet, love is the same and human lives are even more so. At the north dwells a group of Vajra Monkeys. They also brew wine, go taste it.\"","The Vajra Monkeys brewed strong wine.","Verdant Great Sun enjoyed this wine very much, and drank till he was dead drunk.","He felt this wine was really to his taste, and wanted to drink even more after getting drunk. He drank from the bowl at first before trying to drink it directly from the wine jar.","Finally, he started throwing up. The wine started showings its effects, making him feel an unbearable pain.","He felt the insides of his body was on fire, as if lava was flowing through them.","\"It's too hot!\" He screamed. All the fire flowed in reverse towards his head and his hair started burning. From then on, his hair burned endlessly like fire.","When Verdant Great Sun woke up, he saw the Wisdom Gu looking at him.","\"What did you think of the strong wine?\" The Wisdom Gu asked.","Verdant Great Sun heaved a sigh: \"I understand now, no matter how good the wine is, you will vomit it out if you drink too much; everything should be taken with moderation.\"","The Wisdom Gu laughed out loudly: \"In the north dwells a group of Skywater Monkeys. Their wine is also quite good, go taste it.\"","Skywater Monkeys' wine was clear wine and was completely opposite of the strong wine.","Verdant Great Sun lightly tasted the wine, and the moment he did so, he completely forgot all his worries and felt like he was floating in the air, with a hazy and intoxicated look in his eyes.","The Wisdom Gu again asked him about his experience. He lightly waved his hands: \"Having known the joys of wine, I will not pass it on to those who are sober.\"","The Wisdom Gu chuckled and left quietly….","Thus, humans weren't the first species to brew wine, rather it was the monkeys who were ahead of the humans.","Ordinary monkey groups all knew how to brew wine.","The wines were different from one monkey group to another, with all kinds of taste. However, humans collectively called the wine brewed by the monkeys as monkey wine."]},{"id":"part_8","title":"The Legends of Ren Zu - Part 8","part":"8","paragraphs":["Regarding the Reputation Gu's story, it originated from the legends of Ren Zu…","One time, Verdant Great Sun got very drunk, when he woke up, his head hurt and he forgot all that happened when he was drunk. He did not know why he was trapped on a lone hill, one which was surrounded by a bottomless abyss.","The abyss was filled with spiral winds, pale green color, this was the 'usual wind'. The winds blew dust into the air, those were the dark yellow color 'mortal dust'.","Verdant Great Sun's heart sank, because he recognised that this was the Ordinary Abyss. No living being had ever managed to fly past it. He was trapped on this lone hill, unable to get out; he would die of starvation eventually.","Thankfully, there was a forest on the lone hill. Verdant Great Sun was hungry, and came into this forest to find fruits to eat. But this forest was very strange, the black soil was like a swamp, smelling extremely pungent. The trees had no leaves, and the branches looked like strange claws. But when the wind blew, there was the sound of leaves moving in the wind.","Verdant Great Sun could not find food, and fell into despair, knowing he was going to die soon.","A few days later, he was so hungry he could not move, leaning on the tree trunk as he laid on the ground.","He eventually fell unconscious.","In his slumber, he could hear many voices talking.","\"Hey look, this person finally passed out.\"","\"Mm, as I expected, he's finished.\"","\"Actually, it is possible to leave the Ordinary Abyss, you just need the Reputation Gu.\"","\"Reputation Gu is at the center of the forest, hidden under a rock. Too bad he doesn't know, hahaha…\"","\"Sshhh, speak softer, it will be bad if he hears us.\"","\"It's okay, it's okay, he has fainted already, before long, the black soil will bury him, and turn him into nutrients for us trees.\"","Hearing this, Verdant Great Sun jolted awake.","It turns out this forest is Xi Yu Forest, what he had thought was leaves brushing in the wind turned out to be the whispers of the trees.","After hearing the information, Verdant Great Sun walked to the center of the forest, lifted the rock, and obtained the Reputation Gu.","Reputation Gu was like a chrysanthemum, its petals were golden yellow, emitting a fragrance.","Reputation Gu said to Verdant Great Sun: \"Young man, thank you for lifting the rock, and saving me. To repay you, I have decided to help you get across this Ordinary Abyss.\"","Reputation Gu told Verdant Great Sun the method to use it.","Verdant Great Sun was overjoyed, arriving at Ordinary Abyss, and placed the Reputation Gu in his mouth, shouting as loud as he could...","The strange thing was, no matter how loud he shouted, there was no sound, but the vibrations in the air caused the Ordinary Abyss to shake, as the commotion got bigger, it was like an earthquake. The air was even filled with a brilliant fragrance.","Verdant Great Sun did not feel anything weird, as he had known from the Reputation Gu: Reputation itself has no voice, but it can spread wide and create tremors.","As he shouted, a golden bridge appeared in midair, but the bridge's length was limited, there was still a long distance to the other side.","Verdant Great Sun was too hungry, too tired, after trying several times, the effect continue to diminish, and his chance for salvation seemed dim.","Reputation Gu sighed: \"Sigh, you have not eaten anything in a while, even though you have a breath left in your stomach, it is too little. From your diaphragm, it has to go through your stomach, chest, throat, and finally your mouth, the journey is too long, we have to reduce it, here, place me between your two buttcheeks.","Verdant Great Sun did as instructed.","Reputation Gu landed near his private part, and turned into a chrysanthemum cave.","\"Okay, you can start shouting again.\" Reputation Gu said.","Verdant Great Sun forced that last breath of his, out of this hole, out of his body.","Prrrrrrrrt","In his daze, Verdant Great Sun heard a loud sound. The air was filled with an unimaginable stench, but that golden bridge became majestic and large, stretching over a thousand miles, reaching the other side.","A shitty reputation compared to good reputation, is always easier to obtain and maintain.","Verdant Great Sun quickly crossed the bridge, leaving the Ordinary Abyss and reaching the other side, saving his own life."]},{"id":"part_9","title":"The Legends of Ren Zu - Part 9","part":"9","paragraphs":["The earliest record of Hairy Men was in .","It was said that Ren Zu dug out his two eyes which turned into a son and a daughter, the son was Verdant Great Sun and the daughter was Desolate Ancient Moon.","Verdant Great Sun liked to drink wine a lot, one time he caused an incident while being drunk and was trapped at the depths of the Ordinary Abyss. In the end, he profited from the disaster and obtained Reputation Gu which looked like chrysanthemum, and was able to escape alive.","Because of Reputation Gu, Verdant Great Sun's reputation gradually became bigger. Soon, news that Verdant Great Sun was a huge drunkard spread all over the world.","One day, a group of Tiger-Striped Honey Bees brought their beehive and found Verdant Great Sun.","\"Verdant Great Sun, we heard you really liked drinking wine and you have been saying the wine made by the four heaven and earth monkeys are the most delicious in the world. But how could the wine they brewed compare to our honey wine? Today, we have specially brought our honey for you to have a taste.\"","Each of these honey bees was the size of a leopard with patterns on their body resembling tiger stripes, golden with black stripes on top. They were speaking politely but their tone contained a threatening and forceful intent.","Verdant Great Sun complained in his heart, this was truly misfortune befalling on someone who merely stayed home . Tiger-Striped Honey Bees were very powerful, he was not a match against one of them, let alone a whole group.","Verdant Great Sun could only reluctantly taste the honey wine inside the beehive.","He had only taken a sip when his eyes brightened.","Honey wine was sweet but not overly sweet, the wine fragrance was mellow and very delicious, absolutely a treasure of the world!","\"Delicious, delicious, really delicious. This honey wine makes one feel like the most fortunate person in the world!\" Verdant Great Sun drank a mouthful of wine, praising it to the high heavens.","Tiger-Striped Honey Bees laughed, feeling very happy.","The leader asked Verdant Great Sun: \"The tell us which tastes more delicious, our honey wine or the wines of the four heaven and earth monkeys?\"","Verdant Great Sun was already drunk and forgot about the terror of the Tiger-Striped Honey Bees, speaking frankly: \"They all have their own merits, it is very difficult to compare them.\"","Tiger-Striped Honey Bees were furious: He said our wine is actually at the same level as those mere monkeys? This Verdant Great Sun is too hateful, we need to teach him a lesson!","They were just about to attack when suddenly Verdant Great Sun disappeared.","This intoxication of Verdant Great Sun lasted for seven days and seven nights.","In his haziness, he heard a voice call calling out for him from the darkness: \"Verdant Great Sun, wake up quick. If you don't wake up, you will be eaten…\"","Verdant Great Sun was startled awake.","He discovered he was bound up and was being carried by a group of savage people.","This group of savage people had hair all over their body and their two eyes were dark blue. There was already a bonfire burning and above the bonfire was a cauldron.","The savage people quietly sat down, speaking pleasant sounding words.","\"We are refining Eternal Gu and were just lacking a human to be the catalyst. Now heaven has sent us Verdant Great Sun, it is truly worthy of celebration!\"","\"Human is the spirit of all living beings, Ren Zu is the spirit ancestor. Verdant Great Sun was born from his left eye and has ample spiritual energy. The way I see it, the refinement will succeed this time!\"","\"Throw him into the cauldron quick, we will obtain Eternal Gu and live for eternity…\"","Verdant Great Sun turned pale from fright at these words, immediately shouting out and struggling with all his strength.","However, these savage people remained unmoved.","At this very moment, Verdant Great Sun again heard the voice from before in his mind.","\"Sigh, it is no use. These savages are the Hairy Men, loved by the world. They have an innate talent in refining Gu Worms.\"","Verdant Great Sun instantly forgot his predicament and curiously asked in his mind: \"Who are you?\"","That voice laughed: \"I am Divine Travel Gu, as long as any person drinks four different top-tier wines in the world, they will give birth to me in their hearts. I can let you teleport to any place you wish.\"","Verdant Great Sun was exulted: \"Then, please quickly bring me out of here.\"","Divine Travel Gu sighed: \"It is no use. You can only use me when you are drunk. Your mind is sober now and so you can't use me.\"","Verdant Great Sun suddenly realized: \"So that is why I was trapped in the isolated island and almost starved to death that time. Fortunately, I obtained Reputation Gu and could leave the Ordinary Abyss. So it was you who harmed me!\"","Divine Travel Gu replied: \"Sigh, human, I did not have any intent to harm you, it was all because you used my strength after you became drunk. You don't need to blame me, last time you were almost captured by the Tiger-Striped Honey Bees, but you were able to escape thanks to me. One harm and one rescue, we can call it even.\"","Verdant Great Sun also thought of the Tiger-Striped Honey Bees and no longer blamed Divine Travel Gu.","He was thrown into the cauldron by the Hairy Men.","The huge fire was burning hotter under the cauldron and the liquid temperature inside also soared.","\"Add Agates and Red Pepper!\" A Hairy Man threw precious agates and red pepper into the cauldron.","The liquid inside the cauldron immediately changed to red and dyed Verdant Great Sun's body red.","\"Add Blue Smoke Fox Child !\" A Hairy Man grabbed a small fox and threw it into the cauldron.","The small fox's whole body was hairy and looked extremely cute with its eyes like black diamonds. But the moment it touched the liquid, it turned into blue smoke and blended into the water.","The liquid in the cauldron slowly boiled and Verdant Great Sun also felt more despair, feeling it would be difficult to escape the disaster this time.","Hairy Men continued to add in many supplementary materials and Gu Worms.","\"Add Vanity Gu!\" A Hairy Man threw a Gu into the cauldron.","This Gu was strange and looked like a huge blue crab. But different from real crabs, its crab shell was hollow.","The moment it saw Verdant Great Sun, the huge crab like Vanity Gu was very excited: \"You, you are Verdant Great Sun? I have heard about you, but had never expected I would meet you here, it is really my good fortune. I am too happy, too excited.\"","Verdant Great Sun gave a bitter smile: \"How can it be good fortune when we are about to die.\"","\"I don't care about death. I only wanted to ask, how did you become so famous? I really admire you! I have the utmost admiration for people like you.\" Vanity Gu asked with urgency.","\"I am not in the mood to talk about this now, I need to escape.\" Verdant Great Sun struggled in the cauldron and tried to climb up, but was quickly pressed down into the cauldron by a watching Hairy Man.","\"Quick, tell me, tell me quick!\" Vanity Gu was not tactful and wholeheartedly wanted to ask for guidance.","Verdant Great Sun furiously rebuked: \"Can't you see the situation we are in now?\"","Vanity Gu opened its eyes wide and started at Verdant Great Sun before it beamed with pleasure: \"I understand, I understand now. If I want to be popular, I need to endure the heat. Thank you for the guidance, thank you. Verdant Great Sun, as thanks, I will do a favor for you.\"","Saying so, the Vanity Gu exploded.","This explosion was not intense and was very light, only giving off a soft \"bang\" sound. The Vanity Gu turned into a formless poisonous wind and attacked the hearts of all the Hairy Men.","The crystal clear dark blue eyes of the Hairy Men turned red.","Verdant Great Sun was dazed for a good while, before coming back to his senses. He could not help sighing at Vanity Gu's sacrifice, and immediately shouted: \"Although you Hairy Men can refine Gu, but it is nothing. Even if you all live for eternity, so what? You are so ugly with hair all over your body, you are simply an abomination.\"","The Hairy Men were stupefied.","If it was before, they would not care about Verdant Great Sun.","But now, the poison of vanity had spread in the depths of their hearts, shrouding their intelligence.","Hearing Verdant Great Sun's shouts, the Hairy Men started refuting loudly: \"Nonsense, nonsense! We Hairy Men are the most perfect, there can be nothing more beautiful than hair all over the body!\"","Verdant Great Sun was suddenly hit by an inspiration: \"No matter how beautiful your hair is, could it be as beautiful as my hair?\"","Because he had drank Vajra Monkey's strong wine, his hair had become blazing fire.","The Hairy Men were baffled at his words.","The beautiful fire was flickering and changing all the time. Even they could not help but admit the movement of Verdant Great Sun's hair was beautiful.","Verdant Great Sun continued to stimulate them: \"Even if you obtain eternity, you won't be as beautiful as me! Look at my hair, it is as colorful and charismatic as fire.\"","The Hairy Men were spurred on by Verdant Great Sun, and finally someone could not endure it: \"You have such amazing hair, I will have it too. Look at mine!\"","He then used a fire torch to ignite his whole body.","The hair on his body burned and he became a fiery man.","\"Hahaha, you only have beautiful hair, but my whole body is beautiful now.\" This Hairy Man shouted.","Soon, the other Hairy Men also rushed to do the same.","All of them became fiery men, the fire burned them and the intense pain caused them to howl in pain.","But when they realized this, it was too late for them to extinguish the fire, and bombastically displayed their beauty.","Divine Travel Gu was overjoyed and praised Verdant Great Sun endlessly: \"Human, you are really clever, actually thinking of this method.\"","Verdant Great Sun escaped out of the cauldron and succeeded in surviving. He replied in his mind with a cold smile: \"It is not me who is clever. It is the vanity in people that have turned them stupid. They often silently endure pain for false beauty, giving up the goals they should truly pursue.\""]},{"id":"part_10_1","title":"The Legends of Ren Zu - Part 10.1","part":"10.1","paragraphs":["How can flying type Gu be easy to control? By nature, humans walk on the ground, if they want to fly and soar freely, they need a lot of painstaking practice! And to battle while flying? It needs even more bitter training! Even Verdant Great Sun, son of the great Ren Zu, died while flying."]},{"id":"part_10_2","title":"The Legends of Ren Zu - Part 10.2","part":"10.2","paragraphs":["Humans were creatures that walked on ground and did not have wings. Even Ren Zu did not have ability to fly. Being able to fly by itself was a miracle in defiance of heaven."]},{"id":"part_10_3","title":"The Legends of Ren Zu - Part 10.3","part":"10.3","paragraphs":["Dang Hun Mountain known as Crystal Mountain in the legends of Ren Zu.","As long as any living creatures enter the range of Dang Hun Mountain, their soul would receive a shock. The closer they get to the peak, the stronger the force of the shock would be. Many living beings don't have strong souls and their soul would often scatter when they reach halfway up the mountain"]},{"id":"part_10_4","title":"The Legends of Ren Zu - Part 10.4","part":"10.4","paragraphs":["In this world, there is a thing that is more precious than life. That is glory. Eons ago, Ren Zu's eldest son Verdant Great Sun gave up his life while chasing for glory."]},{"id":"part_11_1","title":"The Legends of Ren Zu - Part 11.1","part":"11.1","paragraphs":["The Legends of Ren Zu Chapter Two, Section Three","The sunlight of the Immemorial Antiquity Era shone on all living beings.","Cicadas made noises, giving off the clamor of life. Dense green trees formed a large area of shade, as they swayed with the wind.","A large vat of delicious wine was in front of Verdant Great Sun, but he frowned, having no desire to drink.","\"Divine Travel Gu, oh Divine Travel Gu, you have harmed me so deeply. Right now, I do not even dare to drink wine. I am afraid of getting drunk, and end up transported to a dangerous land by you.\" Verdant Great Sun sighed in anguish.","The previous two times, he was sent into the Ordinary Abyss by Divine Travel Gu, as well as the cauldron of the Hairy Men. Thankfully he was lucky, and made it out of both the incidents alive.","Divine Travel Gu said: \"Prince of humans, I was not intentionally harming you. In fact, every time you got drunk, you were the one who used my power. I am innocent, in fact, I even saved your life once, didn't I?\"","Divine Travel Gu had in fact, saved Verdant Great Sun's life from the Tiger-Striped Honey Bees before.","Verdant Great Sun's expression was dejected: \"Sigh… don't mention the past, now because of you, I do not dare to drink wine. My life has become meaningless and boring.\"","Hearing this, Divine Travel Gu felt ashamed: \"In that case, let me teach you a method. Go up into the sky, and in the Azure Heaven among the nine heavens, there is a bamboo forest. Inside the bamboo forest, pluck a Jade Bamboo that is sky blue in color. Next, go to Blue Heaven and during the night time, collect the Eight-Sided Diamonds Inside The Star Fragments. Next, when it is dawn, fly into the sky and use the light of glory of the rising sun to turn me into Fixed Immortal Travel Gu. Once I become that Gu, I will no longer send you to random places when you are drunk.","Verdant Great Sun heard this and he was overjoyed.","But he thought about it, and felt that hope was slim: \"Oh Gu, I have stepped on the earth since I was born, I am not as light as clouds, nor do I have wings like birds. How can I fly into the Azure Heaven and pluck the Jade Bamboo. How can I collect the Eight-Sided Diamonds In The Star Fragments? Not to mention flying towards the rising sun.\"","Divine Travel Gu said: \"That is right, humans cannot fly. But it is not a problem, we can ask Wisdom Gu. It has the greatest wisdom in this world, there has to be a way.\"","Verdant Great Sun and Wisdom Gu were old acquaintances, the reason Verdant Great Sun started drinking was because of Wisdom Gu's teachings.","But Wisdom Gu taught him to drink merely because it did not want to be disturbed. Sensing that Verdant Great Sun was going to find it again, Wisdom Gu quickly went into hiding.","Verdant Great Sun did not find Wisdom Gu, and felt dejected.","But Divine Travel Gu said again: \"If we can't find Wisdom Gu, we can find Cognition Gu, it is the mother of Wisdom Gu.\"","Verdant Great Sun quickly found Cognition Gu, and requested for the methods of flying.","Cognition Gu answered: \"You found the right person, because cognition is the wings of freedom. But everyone's thoughts are different, what wings you have depends on yourself.\"","Saying so, Cognition Gu turned into a warm light and shone on Verdant Great Sun.","In the light, a pair of white pure feathered wings appeared behind Verdant Great Sun's back.","This pair of wings was very beautiful, white and pure like snow, without a trace of impurity, it was like the wings of a white crane.","Cognition Gu took a look and said: \"Mm, this pair of wings is called 'self', everyone has their own 'self-cognition', this pair of wings has a high degree of flexibility and freedom. But you must be careful, do not overly bask in sunlight, otherwise, your sense of 'self' will either expand or shrink.\"","\"Young man, you must remember my words. The higher you fly, the harder you fall.\" Cognition Gu thought and said the last sentence with deep meaning.","Obtaining the cognition wings named 'self', Verdant Great Sun was very happy, and flew into the sky.","He flew and flew, going higher and higher.","Humans were not born to fly, like birds soaring in the sky. This brought Verdant Great Sun great curiosity.","He played around freely in the sky, extremely happy. At the same time, he remembered Cognition Gu's warning, and did not overly expose himself to sunlight.","When it was sunny, he would hide in the clouds.","Like this, Verdant Great Sun flew higher and higher, finally reaching the limits of heaven, the end of Azure Heaven.","There, Jade Bamboos grew in the air, having lustrous green leaves.","These Jade Bamboos were rooted in the void, and their tips also extended into the unknown void. Looking from outside, one could only see their thin long stem.","Verdant Great Sun retrieved one segment of the bamboo casually.","This dark green bamboo stem was like jade, palm-sized, and hollow in the middle, giving off a cold feeling.","Verdant Great Sun obtained the Jade Bamboo and was very happy, he continued flying upwards.","The sky of the Immemorial Antiquity Era had nine levels. White Heaven, Red Heaven, Orange Heaven, Yellow Heaven, Green Heaven, Azure Heaven, Blue Heaven, Purple Heaven, and Black Heaven.","Verdant Great Sun plucked the Jade Bamboo in Azure Heaven, a few days later, he flew to the higher Blue Heaven.","It was night time, and stars were shining the the sky. The stars flew around happily, raining down stardust. These stardust gathered into a sea, a beautiful river of light made of silver stars, flowing across the entire Blue Heaven.","Verdant Great Sun willed his wings, and plunged into the star river to swim.","He searched painstakingly in the endless stardust, he did not want those seven-sided or sixteen-sided fragments, he only wanted the Eight-Sided ones. These Star Fragments were like diamonds, crystal clear and flawless.","He searched for a long time before finding one.","On the second day, Verdant Great Sun flew towards the rising sun at the break of dawn.","The sunrise was like a large red lantern, emitting a warm light.","This sunlight was not ordinary, it was the light of glory, it could shine on all living beings and penetrate the River of Time.","Verdant Great Sun's left hand was holding into the Jade Bamboo, his right hand was holding the Eight-Sided Diamond, as he flew towards the sun and summoned Divine Travel Gu.","Basking under the light of glory, Divine Travel Gu swallowed the Star Fragment, and entered the Jade Bamboo.","\"Oh Verdant Great Sun, I need time to metamorphosize and become Fixed Immortal Travel Gu. During this period, you have to fly towards the sun, and do not leave the light of glory. But you have to be more careful, Cognition Gu had said, pay attention to the 'self' wings on your back. Once my transformation ends, you should fly towards the cloud cover immediately. Do remember, remember.\" Divine Travel Gu reminded.","Verdant Great Sun laughed heartily: \"Oh Gu, rest assured. I have even survived the Ordinary Abyss, and lived after the Hairy Men, I have the Reputation Gu, and have transcended vanity, the light of glory can do nothing to me.\"","\"Then I can stop worrying.\" Divine Travel Gu's voice weakened,as the sunlight turned into threads, forming a cocoon and wrapping the Divine Travel Gu and the Jade Bamboo.","Verdant Great Sun moved his pure white wings, flying towards the sun.","During this process, the light cocoon became thicker and heavier.","A moment later, the cocoon was burst open, and a butterfly glowing in green light flew out: \"I succeeded, from today onwards, I am not Divine Travel Gu, but Fixed Immortal Travel Gu. Hahaha.\"","Fixed Immortal Travel Gu flew around Verdant Great Sun, happily dancing, but suddenly shouted: \"Ah, oh no! Verdant Great Sun, look at your wings!\"","Under the light of the sun, Verdant Great Sun's wings had expanded to three times of its original size.","\"Do not fluster, I noticed it long ago, but so what? The larger my wings, the stronger they are, and the higher and faster I can fly.\" Verdant Great Sun laughed loudly.","\"Quickly hide in the clouds, stop flying.\" Fixed Immortal Travel Gu said worriedly.","\"Don't worry, don't worry.\" Verdant Great Sun was not worried at all.","The 'self' wings on his back grew larger and larger, becoming even larger than his body. Verdant Great Sun's speed also became faster and faster.","\"Fixed Immortal Travel Gu, what do you think is above the nine heavens?\" He shot up towards greater altitudes.","\"Stop flying, stop flying. If you fall down, I cannot save you.\" Fixed Immortal Travel Gu was very worried.","\"What's the problem, how could I fall down? Look at my wings, how strong are they, how powerful are they!\" Verdant Great Sun was just rebuking, when suddenly, his wings expanded to their limits, and exploded.","Losing his wings, Verdant Great Sun fell towards the ground immediately.","Eventually, he landed on the ground, as an unrecognisable grotesque corpse.","Ren Zu eldest son, met his end."]},{"id":"part_11_2","title":"The Legends of Ren Zu - Part 11.2","part":"11.2","paragraphs":["Divine Travel Gu was very mysterious and also legendary. Its earliest appearance was in .","was the first classic of Gu. It appeared to be a story when one first read it but it actually held profound messages, recording the secrets of the ancient times and all kinds of Gu. Some Gu were directly described like Wisdom Gu, Strength Gu and so on. And some Gu were hidden, their descriptions were very vague, requiring the readers to dig through it and study carefully.","In the legends of Ren Zu, Divine Travel Gu's earliest appearance was beside Verdant Great Sun.","Verdant Great Sun drank four different top-tier wines in the world, the dense liquor aura in his body congealed into Divine Travel Gu.","Divine Travel Gu had the power to send the Gu Master to any place in the world. But its activation required the Gu Master to be in a drunken state and its destination also could not be controlled.","Verdant Great Sun was transported to many dangerous places and suffered a lot due to Divine Travel Gu, his life on the line several times.","\"Divine Travel Gu might be one of the four great movement Gu and is very powerful at that, but its flaw is extremely big, who would dare to use it? Even Verdant Great Sun had no choice but to refine Divine Travel Gu into Fixed Immortal Travel Gu in the end.\"","Divine Travel Gu might be at the noble rank six but its every use carried extremely high risk and had low worth in using. Thus, Verdant Great Sun refined it into Fixed Immortal Travel Gu"]},{"id":"part_11_3","title":"The Legends of Ren Zu - Part 11.3","part":"11.3","paragraphs":["The Door of Life and Death was a big deal, it was recorded in a secret forbidden land in ancient times. It was similar to the River of Time and Ordinary Abyss.","After Verdant Great Sun died, Ren Zu went to the Door of Life and Death to attempt to revive him.","Legend says that behind the Door of Life and Death holds the secrets of life and death, if a person can comprehend it completely, they would be able to control life and death itself.","In the legend, even Ren Zu had to spend all his effort to find it. Door of Life and Death is an unparalleled holy land, the controller of life and death."]},{"id":"part_12_1","title":"The Legends of Ren Zu - Part 12.1","part":"12.1","paragraphs":["Dang Hun Mountain is a forbidden ground, first appearing in .","Legend says that Verdant Great Sun flew towards the sky, and ended plunging to his death.","Ren Zu, as his father, was extremely upset after receiving the news, finding Wisdom Gu for an explanation.","It was Wisdom Gu who taught Verdant Great Sun to drink, causing the series of events thereafter.","Wisdom Gu quickly said: \"Ren Zu, oh Ren Zu, don't find trouble with me. Although your son died, it is not impossible to revive him. As long as you enter the Door of Life and Death, and lead him towards the Road of Life, walking under the sunlight, he would be revived.","Ren Zu was shocked, before becoming overjoyed, and then extremely furious.","He grabbed Wisdom Gu and questioned: \"Wisdom Gu, oh Wisdom Gu, do you still think I am that ignorant boy from before? The Door of Life and Death is a dangerous place, once I enter I will never be able to leave. After harming my son, you want to kill me too?\"","Wisdom Gu quickly said: \"Other living beings do not know the secret of the Door of Life and Death, thus they cannot leave. But I can teach you all of these secrets.\"","\"You are a living person, to enter the Door of Life and Death, you have to enter from the Road of Death. This road is extraordinary, it was the road left behind by Fate Gu when it left Fairness Gu. The road left behind was called path of destiny. There are many Suffering Gu inside the path of life, you have to enter from the Road of Death, and you need to own Courage Gu. That way, you will not fear the torture of suffering.\"","\"When you enter the Door of Life and Death, and see Fairness Gu, you are already dead. But at the same time, you will see your eldest son, Verdant Great Sun's soul. You will bring him away, and go out from another road, the Road of Life. Road of Life was the path treaded on by Fate Gu when it visited Fairness Gu, it is also called the path of destiny.\"","\"But during this path, you will meet three obstacles. One is Dang Hun Mountain, another is called Luo Po Valley, and lastly the Reverse Flow River. To climb past Dang Hun Mountain, you have to smash the Gutstones on it, and obtain Guts Gu's help. To get past Luo Po Valley, you need to find Faith Gu to help. To get through the Reverse Flow River, you have to move forward continuously, not stopping for even a second during the process.\"","Ren Zu heard Wisdom Gu's words and let it go.","He quickly found Faith Gu.","Ever since he became blind, Faith Gu's light was the only light he could see.","\"Oh Ren Zu, I can feel your determination in getting back your eldest son. I am willing to help you, but I urge you not to give up on this goal. Because when you give up, I will leave you for good.\" Faith Gu said with concern.","Ren Zu found Courage Gu next.","Courage Gu and Hope Gu were good companions.","Ren Zu had Hope Gu, and thus saw Courage Gu occasionally, he had a decent relationship with it.","After getting Courage Gu's help, Ren Zu came to the Door of Life and Death, entering the Road of Death.","The Road of Death was pure darkness, the large number of Suffering Gu were like yellow fireflies, swarming towards Ren Zu. At this time, Courage Gu shone brightly, chasing away the Suffering Gu for Ren Zu.","Courage was needed to face death.","Ren Zu succeeded in going down, his body turned whiter as it turned hollow, gradually turning into a ghost.","He could \"see\" again.","When he got to the end of the road, amidst the calm darkness, he saw Fairness Gu.","He was extremely shocked by Fairness Gu's huge body, exclaiming: \"You are Fairness Gu? Why is your body so huge? A mountain is a speck of dust compared to you. The sea is like a droplet compared to you.\"","Fairness Gu's voice was grand: \"Life and death are the greatest fairness in this world, when I am inside the Door of Life and Death, my body will become enormous. Oh Ren Zu, you are here for your son right. Feel free to go, he is right there.\""]},{"id":"part_12_2","title":"The Legends of Ren Zu - Part 12.2","part":"12.2","paragraphs":["Ren Zu was overjoyed upon seeing his son and ran towards him.","Verdant Great Sun had turned into a white ghost and was lying beside a lake, scooping out the water with a bowl and drinking it.","The water was like wine with its fragrance pervading the area.","Verdant Great Sun drank it with utmost satisfaction.","\"My son, don't drink anymore. Come, let's go back.\" Ren Zu walked towards Verdant Great Sun and shouted.","\"Esteemed father, how did you come here? This is great, let's drink together.\" Verdant Great Sun opened his hazy eyes and looked at Ren Zu.","Ren Zu seized the wine bowl from him and said with exasperation: \"Don't drink anymore, you only know how to drink wine! Everyone knows there is a bewitching lake in the land of the dead, and its water is the Bewitching Soup. When ghosts drink it, they become muddle-headed and lose the desire to leave.\"","Verdant Great Sun, however, refuted: \"Father, you are wrong. This is not the Bewitching Soup, it is the Soul Calming Wine. It can calm down your soul and remove all the impurities, your soul will no longer be restless and you will experience utmost tranquility in your heart. This is one of the best quality wines in this world.\"","\"I don't care what wine it is, you have to follow me back.\" Ren Zu pulled Verdant Great Sun's hand, but found Verdant Great Sun was as heavy as a mountain and could not be budged.","Verdant Great Sun shook his head: \"Some people, upon death, will be as heavy as a mountain. Some people, upon death, will be light as a feather. Father, I had Reputation Gu in my life and died after bathing in the light of glory. When I arrived here, my body had become heavier than a mountain, I cannot even walk a single step and can only lie down here.\"","\"What!\" Ren Zu immediately felt gloomy and anxiously shouted, \"I told you before, a tall tree attracts the wind, reputation is not always a good thing. Throw away the Reputation Gu.\"","Verdant Great Sun shook his head and sighed: \"We were not born with fame and fortune, we also cannot take them with us after death. After I died, Reputation Gu left me. It is Fixed Immortal Travel Gu that has accompanied me.\"","Fixed Immortal Travel Gu could bring Verdant Great Sun's soul out of the Door of Life and Death or even bring him to any place in the outside world.","However, Verdant Great Sun could only truly resurrect after walking through the path of life.","\"What do we do now...\" Ren Zu realized he had been played by Wisdom Gu. Although he had arrived at the deepest part of the Door of Life and Death — a death domain that had endless darkness, and has also found Verdant Great Sun, he discovered he could not bring back his son.","At this moment, Fairness Gu spoke: \"Oh Ren Zu, do you still not understand? There are only two paths in Door of Life and Death, both appeared because of Fate Gu. Life and death are determined by fate! All living beings live and thus die, this is the cycle that allows the universe to continue existing. Your eldest son Verdant Great Sun died, this is fate and you should accept it. Moreover, he is living a good life here, Obsession Death Domain is the world's most tranquil place. He is drinking the world's supreme quality wine and is free from all the worries of the outside world, do you know how blissful this is?\"","Ren Zu stood there and looked at his flesh and blood for a while before heaving a deep sigh.","He knew he could not bring back his son's soul, at least it was like that for now.","He bid farewell to the Fairness Gu and also his son, and left the Obsession Death Domain.","He stepped on another path this time, it was the path of life which went from darkness to light.","However, Ren Zu soon realized walking this path was countless times more difficult than when he walked in through the path of death.","There were many more Suffering Gu on path of life than path of death. When Ren Zu had walked through the path of death, his journey became smoother along the way and the Suffering Gu lesser the further he walked. But as he walked through the path of life, there was not only more Suffering Gu, but every step he took would cause much more Suffering Gu to fly over and obstruct him.","Courage Gu could not resist them any longer: \"Ren Zu, there are too many Suffering Gu and they will continue to increase. There is peace in death, but life has endless suffering. Go to Dang Hun Mountain quickly and break some Gutstones. If you want to survive, just relying on courage won't be enough, you need guts too.\"","Ren Zu hurried forward to Dang Hun Mountain and picked the Guts Gu while enduring the tremors in his soul.","With Guts Gu's help, his soul strengthened grealy, and although he still suffered the tremors, it was not of much worry.","He passed through Dang Hun Mountain and arrived at Luo Po Valley.","Luo Po Valley was a maze with winding and twisted paths. Occasionally, there were a large area of Bewilderment Fog which could cause the soul to loosen, and occasionally, Luo Po Wind would blow through and cut apart the soul.","Ren Zu had fallen into the lowest part of my life and could not distinguish the directions. Because his soul was strengthened by Guts Gu, it was loosening in the Bewilderment Fog at a slower speed. The loosened soul was cut apart by the Luo Po Wind.","Ren Zu almost completely lost his way, but fortunately at this time, Faith Gu flew out and shone upon his path.","Ren Zu was able to walk out of the Luo Po Valley with only the essence of his soul remaining.","He let out a huge breath of relief and could feel he was close to success.","He walked to the reverse flowing river, this was the final barrier in the path of life.","It was extremely difficult to move against the stream.","Endless suffering pushed upon him, causing him to make very slow progress.","However, he forcibly persevered and walked towards the light.","\"Almost there.\" He looked at the success that was just ahead of him, only one final step remained.","He let out a breath of turbid air and relaxed, forgetting the warning of the Wisdom Gu, he stopped.","This brief pause caused Ren Zu to be washed away by the river.","Life was not easy, it was like a boat moving against the flow of the river, if you do not continue moving forward, you will be pushed back.","Ren Zu was washed away by the river into the depths of Luo Po Valley, he was so tired he could not budge a bit and was trapped in the Luo Po Valley."]},{"id":"part_12_3","title":"The Legends of Ren Zu - Part 12.3","part":"12.3","paragraphs":["Space Cave was first depicted in it was a forbidden ground on the same level as the River of Time. In the River of Time, there were large numbers of time path Gu Worms. Inside the Space Cave, there were countless space path Gu Worms.","It connected the five regions, hidden in a place no one knew. Pushing open a door from inside the Space Cave, one can reach any place in the world. The door that connected the Space Cave was also known as the space door. Space door was omnipresent, it could be in a narrow crack, or in the wide and boundless sky. Where there is space, there is a door into Space Cave.","But from the past until now, very little people could find the Space Cave, not to mention going inside. In the entire human history, only one person had managed to enter and exit it."]},{"id":"part_13_1","title":"The Legends of Ren Zu - Part 13.1","part":"13.1","paragraphs":["Long long ago, Desolate Ancient Moon climbed Cheng Bai Mountain and met with a Rockman's pursuit.","Ren Zu could not save his eldest son Verdant Great Sun, and at the final juncture of resurrection, he made a great mistake and was swept away by Reverse Flow River back into Luo Po Valley.","His eldest daughter Desolate Ancient Moon heard of this and wanted to go rescue her father.","However, one must have the help of Courage Gu and Faith Gu to enter the Life and Death Door.","But these Gu were with her father Ren Zu.","Desolate Ancient Moon was unable to enter the Life and Deat
