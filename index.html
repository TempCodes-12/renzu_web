h Door. She wanted to rescue Ren Zu but had no ways, so she asked for guidance from Cognition Gu.","Cognition Gu gave her two methods.","The first method was to enter Space Cave, then open the space door to directly move to Ren Zu's side. She could then use the Space Cave to escape Life and Death Door. However, this method could only rescue Ren Zu's soul and could not resurrect him.","The second method was to climb to the peak of Cheng Bai Mountain and find the one and only Success Gu. As long as she made a wish to Success Gu, she could rescue Ren Zu and allow him to successfully resurrect.","Desolate Ancient Moon already knew of Space Cave's existence, but she had no idea how to find the Space Cave. Moreover, to let her father truly resurrect, she had to go to Cheng Bai Mountain.","Cheng Bai Mountain was not tall and was like a mound. It was peculiar as it was made from millions and millions of 'pebbles'.","These 'pebbles' were actually Failure Gu. And there was only one Success Gu, at the peak of Cheng Bai Mountain.","Desolate Ancient Moon walked to the foot of the mountain and began to ascend the mountain.","Her movement woke up Love Gu who was sleeping nearby.","Love Gu was very angry at having its sleep disturbed and wanted to take revenge against Desolate Ancient Moon. It used its unique power to awaken a piece of stone.","The stone gained life because of Love Gu and became a Rockman.","The Rockman was tall and might, his body filled with gold, silver, copper and iron, looking very dazzling and gorgeous.","After the Rockman was born, the first thing he saw was Desolate Ancient Moon. Her shocking beauty immediately conquered his heart.","He started following behind Desolate Ancient Moon, and as he looked at her fair back view, his heart was filled with love.","Finally, he could not endure it anymore and ran past Desolate Ancient Moon and blocked her, shouting loudly: \"Beautiful lady, your appearance is so dazzling, your body is so elegant and your temperament is so noble. The very first moment I saw you, I was subdued by you. You are my love, please accept my love for you!\"","The Rockman's physique was huge, completely blocking Desolate Ancient Moon's path.","Desolate Ancient Moon slightly furrowed her brows and sized up the Rockman before speaking coldly: \"Love, what is that thing? You want me to accept your love, but where is it?\"","The Rockman immediately took off the iron pieces from his body and offered them to Desolate Ancient Moon: \"Beautiful lady, this is my firmness. I give it all to you, this is my love.\"","Desolate Ancient Moon disappointedly shook her head, she had no interest in these iron pieces.","The Rockman was dazed before taking out the copper pieces from his body and piling them above the iron pieces: \"Beautiful lady, this is my obstinance. I give it all to you because this is my love.\"","Desolate Ancient Moon impatiently said: \"Please move away, I have no interest in love, I need to rescue my father.\"","The Rockman panicked seeing that the goddess of his heart was unmoved. He kneeled down and made up his mind, taking out all the silver pieces in his body and piling them above the copper pieces: \"Beautiful lady, this is my dignity. I give it all to you, this will prove my love for you, right?\"","Desolate Ancient Moon's furrowed brows deepened: \"Listen, I don't have time to waste with you.\"","The Rockman became more anxious and took out all the gold pieces in his body and put them above the silver pieces: \"Beautiful lady, this is my self-confidence. I give it all to you, they represent my love for you.\"","Desolate Ancient Moon heaved a deep sigh: \"Rockman, to express your love for me, you gave up your firmness, put down your obstinance, lost your dignity and even gave up your self-confidence. However, what I see is a very ugly Rockman. Get up, I cannot accept your love, I have more important things to do.\"","After losing his gold, silver, copper and iron decorations, the Rockman looked very small and weak, even appearing comical. It lost all the beauty and might it had before.","The Rockman wept and begged Desolate Ancient Moon: \"Then, how can I obtain your love?\"","Desolate Ancient Moon was anxious, but the Rockman kept on kneeling on the ground. She thought of an idea and changed her expression to show a smile: \"Rockman, since you love me, take out your real heart for me to see.\"","The Rockman opened his chest without any hesitation and offered his scarlet heart to Desolate Ancient Moon.","Desolate Ancient Moon took the heart and immediately kept it.","The Rockman then said: \"Now, I can obtain your love, right?\"","Desolate Ancient Moon shook her head: \"Even if you offer your heart, it cannot exchange for my love.\"","\"The Rockman was panicking seeing Desolate Ancient Moon had stored his heart away. He said: 'Heartless woman, your cold-heartedness has made me despair. Since I can't obtain your love, then please give back my heart. Without my heart, I will die.'\"","\"But Desolate Ancient Moon did not return the heart and watched as he slowly died.\"","\"'Why? I love you so much, why are you killing me!' The Rockman shouted before his death.\"","\"Desolate Ancient Moon looked at him with pity, but her voice was tranquil: 'Rockman, I did not want to kill you. But you blocked my path to success.'\""]},{"id":"part_13_2","title":"The Legends of Ren Zu - Part 13.2","part":"13.2","paragraphs":["Above Blessed Lands were Grotto-Heavens.","The most famous Grotto-Heaven was recorded within it was the famous Immemorial Nine Heavens.","Verdant Great Sun refined the Fixed Immortal Travel Gu, and flew up to the nine heavens. In Azure Heaven, he obtained a segment of the jade-green Jade Bamboo. In Blue Heaven, he collected the Eight-Sided Diamonds Inside The Star Fragments.","The Immemorial Nine Heavens consisted of, White Heaven, Red Heaven, Orange Heaven, Yellow Heaven, Green Heaven, Azure Heaven, Blue Heaven, Purple Heaven, and Black Heaven.","But later, when Ren Zu's son caused havoc in heaven and earth, red, orange, yellow, green, azure, blue, and purple, the seven heavens were destroyed consecutively, and all that remained were white and Black Heavens, with the two alternating between day and night."]},{"id":"part_13_3","title":"The Legends of Ren Zu - Part 13.3","part":"13.3","paragraphs":["Grey-White Stone Slabs they were from the Immemorial Era, Ren Zu's ninth daughter, Carefree Wisdom Heart.","that in order to save Wisdom Gu, Carefree Wisdom Heart came to the Qian Kun Crystal Wall.","Qian Kun Crystal Wall was straight from top to bottom, it floated in mid air like a giant mirror.","In the mirror, there was a Book Mountain.","On the Book Mountain, there was a Ink Waterfall, landing on the mountain rocks to form a Literature Spring.","The Ink Waterfall continued to flow, as it landed on the Literature Spring, water splashed about. These black color splashes flew in the air as the water droplets formed into words.","This was the origin of the hundred clan writing system in the Gu Master world.","After Qian Kun Crystal Wall was broken, it turned into numerous Grey-White Stone Slabs.","Legends say that if one gathered all of the stone slabs, they could piece back Qian Kun Crystal Wall and the Gu Master would be able to enter Book Mountain again."]},{"id":"part_13_4","title":"The Legends of Ren Zu - Part 13.4","part":"13.4","paragraphs":["Inkman was also recorded in the . Their homeland was the Book Mountain.","The Book Mountain had an Ink Waterfall which would crash down on the Literature Spring, and the raging ink would fall on the rocks, forming Inkmen."]},{"id":"part_14","title":"The Legends of Ren Zu - Part 14","part":"14","paragraphs":["and this was recorded within","When Ren Zu was in a certain-death situation, after he fell into Luo Po Valley and had no way to get out.","Desolate Ancient Moon, in order to save her father, climbed up Cheng Bai Mountain and tried to get to the top, in order to get that one and only Success Gu.","As long as she made a wish to Success Gu, Desolate Ancient Moon would be able to save Ren Zu.","But when Desolate Ancient Moon got to the foot of the mountain, she was obstructed by the Rockman.","It turns out that when Ren Zu's second daughter arrived at Cheng Bai Mountain, she ruined Love Gu's wonderful dream.","Out of anger, Love Gu awakened the Rockman in order to obstruct Desolate Ancient Moon.","After Desolate Ancient Moon killed the Rockman, and got to the mountain waist.","Love Gu had yet to leave, it appeared before Desolate Ancient Moon and said: \"Oh human, you interrupted my sweet dream, yet you still desire to take away Success Gu. Now I will topple the entire Cheng Bai Mountain, you can have fun finding that one and only Success Gu out of billions of rocks. Hahaha.\"","Saying so, Love Gu crashed towards Cheng Bai Mountain.","Cheng Bai Mountain was not an ordinary mountain, it was a mound entirely made up of stacked rocks.","After Love Gu crashed into it, the entire mountain crumbled.","Love Gu left smugly, leaving behind Desolate Ancient Moon who looked at this huge pile of rocks in a daze.","How was she going to find that one and only Success Gu among this chaotic pile of rocks?","Desolate Ancient Moon was troubled, without a choice, she had to return to Cognition Gu to seek advice.","After Cognition Gu heard Desolate Ancient Moon's description, it sighed: \"Love Gu had always been demanding and unreasonable, even if it was me, or my child Wisdom Gu, we would not want to confront it.\"","\"Right now, Cheng Bai Mountain had collapsed, you can only look at these rocks one by one, to find the real Success Gu from among them. There are no other ways.\"","Cognition Gu said again: \"But you have to be careful, there are two Gu on Cheng Bai Mountain. One is Success Gu, at the peak of the mountain. The other is Failure Gu, at the bottom of the mountain. Failure is the mother of success, but it also has many other children. Those rocks are Success Gu's siblings. When you pick those rocks, many unthinkably bad situations will occur. I will tell you a secret here, as long as you continue to affirm the belief of 'me' in your heart, these disastrous situations will gradually disappear.\"","Desolate Ancient Moon heard this and her heart sank, she asked again: \"Then how do I differentiate the rocks in my hand? What do Success Gu and Failure Gu look like?\"","Cognition Gu sighed: \"They look almost the same, but it is easy to differentiate them. Just hold them in your hands, you will learn about their identities.\"","\"In your search for Success Gu, that Failure Gu will be your biggest threat. You cannot hold on to the Failure Gu, otherwise, you will be completely lost and your life would be in danger.\"","Desolate Ancient Moon heard this and nodded, expressing her gratitude.","Cognition instructed her again before leaving: \"Do not say that I taught you that. If Love Gu comes to find me, I'd be in trouble. In the face of fanatic and toyful love, wisdom and cognition can only run away.\"","\"Don't worry, I won't expose you.\" Desolate Ancient Moon agreed, returning to Cheng Bai Mountain.","Seeing the huge pile of rocks, her heart was gloomy.","Success was not easily obtainable, to obtain success, she would need to bend down and search while taking great risks.","Desolate Ancient Moon breathed in deeply, picking up the first rock.","This rock was ordinary, but when Desolate Ancient Moon held it in her hand, it shook slightly.","A light wound appeared on Desolate Ancient Moon's hand.","This was not Success Gu, but one of success' siblings, one of the children of Failure Gu.","Desolate Ancient Moon's heart was shocked, she touched the wound on her hand as she recalled what Cognition Gu said —\"When you pick those rocks, many unthinkably bad situations will occur. You have to affirm the belief of 'me' in your heart.\"","\"So this is the terrible situation.\" Desolate Ancient Moon understood.","She chanted in her heart: \"Me, me, me, me…\"","As she chanted, the wound on her hand miraculously healed! Only a light scar was left.","She tossed the first rock away, and picked up the second rock.","When she held this rock in her hand, Desolate Ancient Moon's heart jumped, as an intense feeling of fear assaulted her.","Desolate Ancient Moon was shivering in fear, she almost ran away to escape, away from this place.","But she held on, and chanted 'me'.","After a long time, she slowly recovered as the fear in her heart was gone by half, finally picking up the third rock.","This rock made her dejected. She could not help but think: \"I want to find that one and only Success Gu among these billions of rocks, how difficult is that, how long would it take me?\"","She could barely move anymore, she felt that the future was shrouded in darkness, it was too difficult to find Success Gu.","She almost wanted to give up, but she thought about her father who was trapped in Life and Death Door.","\"If I give up, who will save father?\" Desolate Ancient Moon shuddered: \"Oh no, I forgot to chant 'me'.\"","Desolate Ancient Moon chanted again, getting rid of the despair in her heart, bending down to pick up another rock.","Once she held the fourth rock in her hand, Desolate Ancient Moon was shocked to find out that her nose had changed, it turned into a pig's nose.","She chanted 'me' once again, allowing her nose to recover.","Spending a lot of time, she exerted all her effort to get rid of the pig nose. But her nose was still slightly deformed compared to before.","Like this, Desolate Ancient Moon continued to pick up rocks, hoping to find that Success Gu.","But days passed, and all she found was Failure Gu's children.","Among these rocks, some made her injured, some made her dejected, despair, or fear, while some made her grow a pig head, rat's tail, etc.","Despite Desolate Ancient Moon chanting 'me' continuously, some of the scars still remained on her. As they accumulated, these scars turned her into a monster.","She grew six heads, three arms, five tails, and looked like a centaur. She had sixteen legs, and some of her legs had soft fur, some had snake-like scales, some had sharp claws, some had tough hooves.","In the search for success, people often transform and become completely different.","But Desolate Ancient Moon also became much stronger because of this.","After going through so much, she had become several hundred times as strong as before. These rocks could not longer trouble her.","\"Success, oh success, where in the world are you?\" Her seven mouths opened together. Some were screaming, some were shouting, some were whispering while others were growling.","The more she failed, the more she desired success in her heart.","After her great effort, the number of unpicked rocks became fewer and fewer.","Eventually, when there were only two rocks left, Desolate Ancient Moon was stuck between two difficult choices.","Undeniably, among these two rocks, one was Success Gu, while the other was Failure Gu.","If she obtains Success Gu, that would be the best. But if she picked Failure Gu, then Desolate Ancient Moon would become completely lost, she would be in danger of dying.","Even if Desolate Ancient Moon became a monster, becoming so much stronger.","One step to heaven, one step to hell, what should she choose? Desolate Ancient Moon could not help but become hesitant.","\"If I do not dare to take the next step for fear of failure, then I will never succeed! I am already so strong, success is a step away from me, even if I take Failure Gu, as long as I chant 'me', I should be able to endure it right?\" Eventually, she mustered her courage and stretched out her palm, picking one of the rocks.","Unfortunately, she picked Failure Gu.","An unforseen feeling of lost, self-doubt assaulted her.","\"Me, me, me…\"","Desolate Ancient Moon continued to chant 'me, but her voice became softer, as her seven mouths stopped moving eventually, her expression turning into a daze.","She had fallen into endless perplexity, she had completely lost herself.","The biggest tragedy for a human, is to lose your sense of self."]},{"id":"part_15","title":"The Legends of Ren Zu - Part 15","part":"15","paragraphs":["chapter three, first section","Ren Zu's second daughter Desolate Ancient Moon climbed Cheng Bai Mountain and searched for Success Gu to rescue her father from the Door of Life and Death.","But at the final juncture, she failed and lost her sense of self, becoming an ugly and powerful monster.","Without his daughter to rescue him, and his eldest son Verdant Great Sun still addicted and dejected, Ren Zu was trapped in Luo Po Valley, unable to return to life.","Luo Po Valley was like a giant maze, its paths twisted and turned. Occasionally, boundless Bewilderment Fog would spread and cause the soul to slacken, and occasionally, Luo Po Wind that was as sharp as a knife would blow and cut down souls.","Ren Zu had a spiritual body now and was unable to find the way out of the Bewilderment Fog. His soul was cut down by Luo Po Wind, becoming weaker and weaker, and the situation turned even more dangerous.","The soul fragments cut down by Luo Po Wind started to converge gradually and turned into a youth.","Like this, Ren Zu's third son was born.","He was Northern Dark Ice Soul.","\"My son, thank you for your company. I do not have much time left, having you to accompany me in my final days, father did not have to feel lonely.\" Ren Zu sighed with deep emotions.","Northern Dark Ice Soul had a cold appearance but was warm-hearted, and although he did not speak much, he was very filial to Ren Zu. And as he looked at Ren Zu growing weaker and weaker every day, his mood also became heavier.","He decided to rescue Ren Zu.","Ren Zu sensed his determination, and felt both happiness and heartache: \"Don't be worried my son, I know of your filial heart, I now understand that life and death cannot be forced. Humans will die in the end, this is our fate.\"","Northern Dark Ice Soul said in a sobbing tone: \"Father, I know your words are right. I also know my efforts might be in vain. But looking at you growing weaker like this, if I do not make an effort, my heart will feel even more pain. Let me do something for you.\"","Ren Zu sighed and could only let him go.","Northern Dark Ice Soul wandered in the vast Luo Po Valley, he was born here, as such, Luo Po Wind could not cut down his soul and the Bewilderment Fog could not obstruct his vision.","He searched bitterly but could not find the exit.","Right as he was becoming more desperate, he came across a Gu Worm.","\"Well, well, to think I would be discovered by you.\" This Gu was like a ladybug with a chubby spherical body, but it was extremely agile and was flashing around Northern Dark Ice Soul's body.","Northern Dark Ice Soul's eyes brightened as he asked in curiosity: \"What Gu are you?\"","\"I am known as unexpected.\" This Gu Worm replied.","Northern Dark Ice Soul's gaze dimmed down: \"So you are Unexpected Gu, it is a pity you are not Success Gu.\"","Unexpected Gu sneered: \"Young man, do not look down on me. I have a love-hate relation with Success Gu. The strength of unexpectedness is very powerful. Do you know what your encounter with me here represents?\"","\"What?\"","Unexpected Gu shook its chubby body and said proudly: \"What kind of place is this? This is Luo Po Valley, a death realm. You being here means you are already dead. But by encountering me, you have come across an unexpected event in 'death' - that is 'life'. Grab me, I will take you out to the human world and you can be resurrected again.\"","\"Really?\" Northern Dark Ice Soul was exulted, \"Can I bring my father along?\"","Unexpected Gu shook its head: \"It is you who encountered me, not your father, so I can only take you.\"","Northern Dark Ice Soul was extremely disappointed, refusing: \"Since I cannot take my father with me, then I will not go. I will accompany my father till his final moment.\"","Unexpected Gu laughed loudly and spoke in a domineering tone: \"Unexpectedness in life is beyond your control. Young man, you must come with me!\"","The moment it finished speaking, Unexpected Gu forcibly took Northern Dark Ice Soul and instantly left Life and Death Door, arriving in the human world.","Northern Dark Ice Soul obtained flesh body and was feeling extremely bewildered facing this vast world alone.","Unexpected Gu disappeared. He suddenly remembered Ren Zu once saying he had an elder sister who was called Desolate Ancient Moon.","At this moment, Cognition Gu took the initiative to find him: \"Young man, do not be suspicious, cognition has always been the friend of humans, I am here to help you.\"","Cognition Gu told Northern Dark Ice Soul about Cheng Bai Mountain and also the events detailing Desolate Ancient Moon.","Northern Dark Ice Soul decided to first see his elder sister.","When he saw Desolate Ancient Moon, his tears fell in sadness.","Northern Dark Ice Soul tried to converse with Desolate Ancient Moon, but Desolate Ancient Moon who had turned into a monster kept on repeating questions.","\"Where is this?\"","Northern Dark Ice Soul thought for a while and answered: \"This is the human world, living beings can move about here. Above us is the heavens and below our feet is earth.\"","\"Who am I?\" Desolate Ancient Moon asked again.","\"You are a human, Ren Zu's second child, your name is Desolate Ancient Moon. You are my elder sister.\" Northern Dark Ice Soul replied.","\"Elder sister, wake up quickly. Our father is trapped in Luo Po Valley, dying, we need to resurrect him soon.\"","\"Ren Zu? Desolate Ancient Moon? Resurrect?\" The monster shook its head, extremely puzzled, \"Why should I resurrect him? Could it be that humans should not die? What disadvantage is there in death? Why do humans live? Why do I live?\"","This time, Northern Dark Ice Soul was not able to answer.","Why do people live?","As Northern Dark Ice Soul pondered over this question, Bewilderment Gu quietly approached him, making him lose his sense of the surroundings.","Subsequently, Love Gu and Disguise Gu also approached him.","Cognition Gu felt a big headache when it saw them. These several Gu were famous for their mischief and would often move together, even Cognition Gu did not want to provoke them.","\"Love, have you not harmed enough people? Why are you not letting them go?\" Cognition Gu sighed.","\"Don't try to speak reason with me, I am completely unreasonable.\" Love Gu said in a unruly tone, \"Get lost, cognition, I do not like you.\"","Cognition Gu could only leave helplessly.","\"Another human came again? Haha!\" Love Gu was extremely happy when it saw Northern Dark Ice Soul, because it had another target to play with.","It and Disguise Gu were sworn brothers, and on the spot, it used Disguise Gu's power to disguise as Cognition Gu.","\"Young man, your elder sister has lost herself. If you want to save her, you need to find Meaning Gu.\"","Northern Dark Ice Soul regained his senses and asked Love Gu without doubting: \"I have seen Unexpected Gu, please tell me where this Meaning Gu is? How should I look for it?\"","Love Gu deceived him in a serious tone: \"Oh human, you should know, there is a meaning to why you are all living in this world. As long as you find Meaning Gu, your elder sister can awaken. Follow the direction I point towards and keep moving forward, you will eventually find Meaning Gu.\"","Northern Dark Ice Soul expressed his gratitude before immediately setting off.","Love Gu, Bewilderment Gu and Disguise Gu guffawed as they looked at his receding figure.","In this world, how could there be a Meaning Gu?","There was simply no such Gu, Northern Dark Ice Soul would, as such, not find it no matter how much he searched for it.","\"Fool, who told you all to anger me? I will let you guys know how terrifying the punishment of love can be! From now on, let's follow him and toy with him in turns.\"","Love Gu's proposal was approved by the other two Gu.","Thereupon, the three Gu played tricks on Northern Dark Ice Soul in turns, he suffered so much that words could not describe it. But to find this non-existent Meaning Gu, he kept on persevering.","Such spirit moved Cognition Gu. And when Love Gu was not present, Cognition Gu approached Northern Dark Ice Soul to help him.","\"Cognition, what are you doing? We are having a great time.\" Bewilderment Gu and Disguise Gu were extremely displeased with cognition.","Cognition Gu laughed: \"I am afraid of love, but I am not afraid of you two. Young man, use my strength to come to your senses.\"","Northern Dark Ice Soul used Cognition Gu's power to realize the truth, he was no longer bewildered and he had seen through the disguise.","Bewilderment Gu and Disguise Gu could only leave in defeat.","Northern Dark Ice Soul expressed gratitude to Cognition Gu: \"Thank you Cognition Gu. Because of you, I have thought of a way to save elder sister.\"","\"Eh? What way is that?\"","\"In this world, there is indeed no Meaning Gu. But why can't I create a Meaning Gu?\" Northern Dark Ice Soul replied confidently.","Human life might have no meaning, but they could give a meaning to it.","Northern Dark Ice Soul came back to Desolate Ancient Moon's side and personally created a Meaning Gu and pressed it into Desolate Ancient Moon's head.","\"The meaning in my life is to search for Success Gu and resurrect father! I understand now, I get it!\" Desolate Ancient Moon's eyes brightened."]},{"id":"part_16","title":"The Legends of Ren Zu - Part 16","part":"16","paragraphs":["Part 1 = to chapter three, section fourteen.","Northern Dark Ice Soul awakened his elder sister Desolate Ancient Moon, and the two again asked for advice from Cognition Gu on how to save their father.","Cognition Gu said: \"Humans, Cheng Bai Mountain has disappeared, who knows when it will form again. I am also not clear on other ways to bring your father back to life. But no need to be dejected, you can try asking Wisdom Gu. I am its mother, wisdom is the crystallization of cognition.\"","The student surpasses the master, the things Cognition Gu did not know, Wisdom Gu might not necessarily be unknowing of.","Under Cognition Gu's directions, Northern Dark Ice Soul and Desolate Ancient Moon found Wisdom Gu.","Wisdom Gu had somewhat of a connection with Ren Zu, back then Ren Zu had used Rules Gu and Regulations Gu to capture it. But it was able to escape in the end.","At first, Wisdom Gu was not willing to help Northern Dark Ice Soul and Desolate Ancient Moon.","But seeing that they were introduced by its mother Cognition Gu, it reluctantly said: \"Oh humans, I can show you the right path. But I need remuneration, one of you need to hand over your middle age to me.\"","\"I will give my middle age to you.\" Desolate Ancient Moon immediately replied with no hesitation.","She was awakened by her little brother Northern Dark Ice Soul and had been bestowed with the meaning of her life which was to bring her father, Ren Zu, back to life. Thus, she replied immediately without the intention of passing it to others.","Northern Dark Ice Soul was not able to argue with his sister and could only let her offer her middle age.","This meant, once Desolate Ancient Moon's youth had passed, she would directly skip middle age to reach old age.","But to save her father, she did not have many misgivings.","Wisdom Gu obtained Desolate Ancient Moon's middle age and gave her directions: \"In the center of the Golden Desert in the west, there is a still Blue Sea with no ripples, as flat as a mirror. That is the source of all living beings, all lives in the world originates from there. And in the depths of the Blue Sea lie many Life Gu shining upon all living beings. You need to infiltrate the sea, catch a Human Shaped Life Gu and bring it to shore. This Human Shaped Life Gu can bestow your father a new life. But remember, you cannot spend over fifteen minutes in the sea, otherwise you will be assimilated by the sea.","Wisdom Gu added another sentence in the end: \"It is extremely difficult to find Human Shaped Life Gu. Only a person who has truly comprehended the truth of life can do it. If you are not able to do it, don't blame my solution for not being easy to use.\"","Desolate Ancient Moon wanted to ask something, but Wisdom Gu quickly flew away and did not give the siblings any chance to make inquiries.","Part 2 = Desolate Ancient Moon and Northern Dark Ice Soul travelled an arduous journey through the Golden Desert and arrived at the center of the desert where they saw the Blue Sea.","The Blue Sea was so beautiful that nothing more beautiful than it could be imagined.","Just like Wisdom Gu said, even strong winds could not cause the slightest of a ripple on the Blue Sea.","With the soft golden sand surrounding it, it looked like a deep blue gemstone embedded on this golden cloth.","The siblings infiltrated into the depths of the sea and sure enough found large numbers of Life Gu packed together in the sea depths.","These Life Gu were like blue gems. But they were of different sizes and shapes.","Some looked like a colt; some like a tiger or leopard; some like an eagle or dove, while some like a snake or flood dragon.","The siblings were dazzled from the sight. They saw all kinds of Life Gu from flowers, birds, fishes, insects, beasts, Snowmen, Hairy Men and all other shapes, except the Human Shaped Life Gu.","Helplessly, the siblings could only get out of the sea and back to the shore.","The moment they had left the Blue Sea, a Deer Shaped Life Gu Northern Dark Ice Soul had been holding, let out a soft light before jumping on the sand and turning into a fawn.","This was the birth of a life!","The siblings looked at this sight in wonder, with their eyes wide open.","Only when the fawn had hopped far away, the elder sister Desolate Ancient Moon suddenly comprehended: \"No wonder Wisdom Gu flew away immediately after speaking and did not let us question it. I have understood the truth of life.\"","\"The truth of life, what exactly is it?\" Northern Dark Ice Soul quickly asked.","Desolate Ancient Moon pointed at this Blue Sea in front of them and asked in return: \"Tell me, if we were to really find a Life Gu, a human shaped blue gem, and we bring it back, what will it transform into?\"","Northern Dark Ice Soul thought for a moment and replied: \"It should be like that fawn and turn into a real active life form, right?\"","He suddenly looked distracted.","Desolate Ancient Moon looked at him with a smile: \"It seems you have also understood. We are these life forms. We were formed from Life Gu! We, ourselves, are human shaped blue gems!\"","Northern Dark Ice Soul completely understood, where did humans come from?","Wisdom Gu had already made it clear before: This Blue Sea is the source of all living beings, all lives in the world originate from here.","Humans, naturally also originated from here.","Their father Ren Zu was once a blue gem in the depths of this sea. By some opportunity and coincidence, it was able to come out from the sea and form a zestful life form that roamed the world, surviving with difficulty and reaching this stage.","But humans were the spirit of all living beings, so how many human shaped gems could there be in such a large sea?","It was definitely extremely few, and it was very possible Ren Zu was the only one.","Searching for a small blue gem in such a vast sea, how big of a project was this!","This was innumerable times more difficult than Desolate Ancient Moon looking for the only Success Gu in Cheng Bai Mountain.","\"I know a method which can get us a Human Shaped Life Gu quickly.\" Desolate Ancient Moon suddenly said.","\"What method?\" Northern Dark Ice Soul had a bad feeling.","Desolate Ancient Moon smiled: \"That is… I will go into the bottom of the sea and assimilate with this Blue Sea, returning back to a Life Gu.\"","Although Desolate Ancient Moon had transformed into a monster, she was intrinsically a human.","The essence of her life had not changed.","Since she was a human, once she was assimilated, she would form a human shaped blue gem like Life Gu.","This speculation was not wrong.","No wonder Wisdom Gu said: But remember, you cannot spend over fifteen minutes in the sea, otherwise you will be assimilated by the sea.","Wisdom Gu's words did not have any superfluous words.","Wisdom Gu had also said: If you are not able to do it, don't blame my solution for not being easy to use.","One could analyze from this sentence — it was extremely likely there were no human shaped blue gems in the Blue Sea. If the siblings were not willing to sacrifice themselves, they would not be able to obtain Human Shaped Life Gu. As such, don't blame me, the Wisdom Gu, if you are not able to do it.","\"No, you can't sacrifice yourself like this, elder sister.\" Northern Dark Ice Soul immediately dissuaded.","Although he wanted to bring his father back to life, he did not want to sacrifice his own sister.","\"I need to do it, the meaning of my life is to bring father back to life.\" Desolate Ancient Moon replied tranquilly.","Northern Dark Ice Soul suddenly could not say anything.","It was him who gave this meaning to Desolate Ancient Moon's life, and Desolate Ancient Moon was living for this. In other words, if her father could not be brought back to life, there would be no meaning in her life. Then what would be the use in continuing to live?","As long as she sacrificed herself, she could bring her father back to life; this was the greatest meaning of Desolate Ancient Moon's life!","\"Humans originally were gems of the world. It is only that whether the gems are bright or not require us to polish them. Every effort we make, every choice we take, are all polishing each of our gems.\"","\"And humans can only obtain life by sacrificing life.\"","Desolate Ancient Moon leisurely spoke before sinking into the Blue Sea.","Northern Dark Ice Soul tried his best to stop her, but he was not able to. Desolate Ancient Moon had become a monster with incomparable strength, and he was not her match.","After fifteen minutes of time, Desolate Ancient Moon was assimilated by the Blue Sea and turned into a human shaped blue gem.","But this blue gem was not of a healthy human shape but a badly damaged, less than half a proper human shape.","This was because Desolate Ancient Moon had given her 'middle age' to Wisdom Gu.","Humans, in the process of understanding what life was, would often have already used up half of their lives.","Northern Dark Ice Soul held this blue gem with tears in his eyes, and left the Golden Desert.","He did not have any of the happiness of success, but instead sank down into extreme remorse.","From a certain perspective, it was him who had killed his elder sister."]},{"id":"part_17_1","title":"The Legends of Ren Zu - Part 17.1","part":"17.1","paragraphs":["Luo Po Valley was a very wide and complex labyrinth, Ren Zu searched for Northern Dark Ice Soul, who was missing, but he got lost in the labyrinth himself, even after several days, he did not find a way out.","He was extremely tired, he had sprawled on the ground, his back leaning against the walls of the labyrinth.","A feeling of boundless loneliness quickly engulfed him.","This was because he had given his original heart to hope, right now, he only had a heart of loneliness left.","The feeling of loneliness was unbearable, Ren Zu was afraid of being lonely, he had once dug out both of his eyes and turned them into a son and daughter to accompany him.","But right now, he could only endure the torture of loneliness.","Amidst the loneliness, Ren Zu felt intense desolation, loss, and pain. Time seemed to have stopped, he was all alone in this world, there was nobody he could rely on, there was no fire that he could gain warmth from.","Ren Zu felt suffocation, but as time passed, he got used to the feeling of loneliness, he even started to savor it.","He started to feel that loneliness was not that scary.","In his loneliness, he felt serenity, peace, and quiet.","He talked to himself: \"Oh human, what is the purpose of your existence? Struggling here in this world, rushing about everywhere.\"","Next, he heard a voice from beside him: \"Oh human, you are the spirit of all beings. You are lonely, thus you wanted to be comforted, to be understood, to be recognised. Right now, the thing you want to do most is to find the way out of this damned place.\"","Ren Zu was shocked: \"Who, who is talking to me?\"","That voice laughed as it said: \"I am a Gu, called \"self\". If you look inside yourself, you will find me.\"","Ren Zu quickly inspected his heart of loneliness, as expected, in the deepest part of his heart, he saw a Gu Worm.","This Gu looked very real, almost like himself, but it was many times smaller than him, like the size of an ant.","Ren Zu was curious: \"Eh, you are a Gu Worm, why are you inside my body?\"","Self Gu said: \"Ever since you gained life, I had been inside your body, you just did not discover me. It is not easy to find me, you will need to inspect your inner heart of loneliness.","\"Is that so.\" Ren Zu had little interest, he was quite indifferent about this as his mind was entirely concerned with Northern Dark Ice Soul.","Self Gu saw Ren Zu's lack of concern and laughed: \"Oh Ren Zu, you should be happy. You should know, finding yourself and understanding yourself, that is the most important thing in life. You yourself are the most reliable thing in the world, let me help you leave this place.\"","\"You can help me leave this place? No way, can you bring me out of Luo Po Valley, and travel in the Reverse Flow River?\" Ren Zu was shocked and excited.","Self Gu laughed heartily: \"Oh Ren Zu, why must you walk on this road? The Door of Life and Death's entrance and exit are the traces left behind by Fate Gu when it visited Fairness Gu. When you walk on this road, you will be under the manipulation and arrangement of fate. If you want to revive, to leave this place, you should walk on a brand new road.\"","Ren Zu was perplexed: \"Isn't there only one road? Wisdom Gu had already told me that, where can there be a second road?\"","Self Gu said: \"Oh Ren Zu, as long as you want to walk, there will be a road for you to step on.\"","Ren Zu was even more confused now: \"Then how should I walk?\"","Self Gu said: \"Didn't I say it already, first, you have to 'think' about leaving.\"","\"Think?\" Ren Zu tried using his brain, thinking of how to move on.","He thought for half a day, his head was bursting, when finally, a Gu jumped out of his mind.","This Gu was an old friend of Ren Zu, it was Cognition Gu.","\"Where there is cognition, there is me.\" Cognition Gu said: \"Oh human, you seem to have gotten into trouble again, let me help you think.\"","Saying so, Cognition Gu gave off a bright light, enlightening Ren Zu.","Cognition Gu had an ability, that was to enlighten all beings. Any lifeform enlightened by Cognition Gu would gain wings.","Back then, Verdant Great Sun obtained the wings of \"self\", flying into the sky.","When the light dispersed, Ren Zu obtained a pair of wings.","This pair of wings was located at his heels, they were very delicate.","Cognition noted: \"Mm, this pair of wings is called independence, Ren Zu, it will help you walk on a new road. You have to be careful, a new road is hard to walk on, Other Gu are unreliable, you can only rely on your Self Gu.\"","Saying so, Cognition Gu vanished.","Ren Zu was still very much confused: \"How should I walk?\"","\"Walk ahead, and carve the path of your Road of Life. This is a road that is unique to yourself! Only you can walk on it!\" Self Gu said excitedly.","Ren Zu took the first step forward.","Bam!","The next moment, his vision changed."]},{"id":"part_17_2","title":"The Legends of Ren Zu - Part 17.2","part":"17.2","paragraphs":["Legend says, when Ren Zu started walking on the Road of Life, his vision changed, it was pure darkness.","He took the first step.","PIop.","At the next moment, he stepped into the mud.","He raised his foot, wiping it with his hand, it was full of mushy mud and extremely smelly.","He was hesitant to move forward.","At this moment, Self Gu said: \"Oh human, do not hesitate, if you want to walk on your own road, you will need to rely on your own legs. When your leg steps on the road, do not be afraid of dirtiness.\""]},{"id":"part_18","title":"The Legends of Ren Zu - Part 18","part":"18","paragraphs":["Walking Meat Tree was a legendary plant that was recorded in .","Ren Zu's third son — Northern Dark Ice Soul was revived by Unexpected Gu and was wandering outside. After encountering his sister, Desolate Ancient Moon, he gave her a new meaning in life.","Next, under the guidance of Wisdom Gu, the brother and sister came to the Blue Sea to search for the life gem that could revive their father, Ren Zu.","In the end, Desolate Ancient Moon sensed the mysteries behind life and sacrificed herself, being turned into a damaged life gem.","Northern Dark Ice Soul carried the life gem as he attempted to return to his father, to revive Ren Zu.","But it was extremely difficult for him to enter the Door of Life and Death.","The Door of Life and Death had two routes, one was the Road of Life, the other was the Road of Death. No matter which path it was, there would be a lot of Suffering Gu.","To overcome the interference of the Suffering Gu, to enter deep into the Door of Life and Death, he would need the help of Courage Gu.","But because Courage Gu had already been taken by Ren Zu and was currently with him, Northern Dark Ice Soul did not have courage and could not enter the Door of Life and Death. He had no methods left and could only wander around and search for a method to resolve this.","He walked past tall mountains, travelled through streams, ran for his life under the assault of wild beasts, and had gone hungry during the intense cold, he had suffered a lot.","Northern Dark Ice Soul was filled with guilt and anxiety.","He was guilty because he was the one who gave Desolate Ancient Moon her meaning in life, but that caused her to sacrifice herself and become the life gem. Northern Dark Ice Soul was the murderer who indirectly caused his sister's death.","He was anxious because even though he had the life gem, he was unable to return to his father's side. He was afraid that if a long time passed, his father's soul might collapse in Luo Po Valley, causing Desolate Ancient Moon's sacrifice to be in vain.","He walked and walked, until the purple sky above him faded and became black.","Originally, the Immemorial Nine Heavens, white, red, orange, yellow, green, azure, blue, purple, black, would take turns to loom over the five regions at set intervals.","The sky of the Immemorial Antiquity Era was connected to the ground.","Heaven and earth were connected and whole, people could walk towards the sky from the ground, or walk towards the ground from the sky.","Northern Dark Ice Soul was walking aimlessly, unknowingly, he left the ground and walked towards an area deep within Black Heaven.","It was complete darkness inside Black Heaven, but it was not desolate, there were large numbers of life forms there.","Northern Dark Ice Soul was inside the darkness and could not find a way back, he was flustered, scared, and lost.","He could not tell what direction to walk, he tripped many times and fell. Suddenly, he saw a lump of fire ahead of him.","This was the only source of light in the entirety of Black Heaven.","Northern Dark Ice Soul was overjoyed, he quickly walked towards the fire.","When he got close to the lump of fire, he realized it was a Gu.","Northern Dark Ice Soul was very curious, he asked: \"What Gu are you, you can actually give out light in Black Heaven. Help me, I want to leave Black Heaven, heading back to the ground, I have very important things to do.\"","The Gu's voice was very weak, it said to Northern Dark Ice Soul: \"My name is fire, who are you?\"","Northern Dark Ice Soul said: \"I am a human, my name is Northern Dark Ice Soul. Can you help me? With your light, I will be able to see the way, and return to the ground.\"","The Gu sighed: \"So you are a human. I've heard of a famous human before, he is called Verdant Great Sun.\"","Because Verdant Great Sun had Reputation Gu, his name was spread in the entire world, there was almost nobody that did not know him.","Northern Dark Ice Soul was overjoyed: \"That's right, Verdant Great Sun is my big brother.\"","Fire Gu said: \"I can help you. But before I help you, you have to help me. I am too hungry, I am going to die of starvation. Go find me some food first.\"","Northern Dark Ice Soul asked: \"Oh, Fire Gu, what do you eat? This place is completely dark, how can I find what you need to eat?\"","Fire Gu said: \"I am the least picky Gu Worm in the entire world, I can eat almost anything. I will eat whatever you feed me.\"","Northern Dark Ice Soul searched around, finding some tree branches and throwing them towards Fire Gu.","After Fire Gu ate, it started to shine more brightly, it was giving off a warmer light and it also grew from the size of a fist to around the size of a basin.","It was very happy: \"Can you bring me more food?\"","Northern Dark Ice Soul nodded and looked around, finding a pile of rocks and throwing them at Fire Gu.","After eating for some time, Fire Gu sighed: \"Sigh, I was way too hungry, my teeth are not working well now. The things I could chew before, I can't chew them now. Bring me some stuff that are easy to digest.\"","Northern Dark Ice Soul thought about it: \"How about this, Fire Gu, follow me and light the way. Along the way, whatever you feel like eating, I will feed to you, is that alright?\"","Fire Gu agreed and condensed into a small lump, letting Northern Dark Ice Soul hold it.","Like this, Northern Dark Ice Soul left on his return journey, along the way, he fed many things to Fire Gu.","After a while, Fire Gu grew larger.","On this day, Northern Dark Ice Soul was resting, Fire Gu was eating branches in front of him while swaying with the wind.","Suddenly, countless footsteps could be heard, Northern Dark Ice Soul looked and saw a huge group of trees shining under the light of the fire, they were running towards him in huge numbers.","Not just trees, there were also countless wild beasts and insect groups.","Northern Dark Ice Soul was extremely scared, he quickly picked up Fire Gu and ran.","Behind him, the trees, wild beasts, and insect groups were chasing. Wherever Northern Dark Ice Soul went, they followed.","The pursuers shouted: \"Whoever is in front, stop running.\"","\"We do not want to harm you, we just want to escape into the light.\"","\"Dream Realms are about to reach us, please help us and let us live under the light of the fire.\"","Northern Dark Ice Soul was breathing roughly, he could not run any further, seeing that he was about to be caught, Fire Gu said: \"Oh human, don't be afraid, these pursuers are my food, let me help you. Just toss me there.\"","Northern Dark Ice Soul was forced by the circumstances, he could only listen to Fire Gu and toss it towards them.","What Fire Gu first encountered were a huge group of trees.","These trees were Walking Meat Trees. The branches were made of meat, they resembled the tentacles of octopuses.","Fire Gu burned all of these trees, turning the trunks into ashes, and branches into cooked meat. The smell of fragrant meat attracted Northern Dark Ice Soul and he picked up one to eat, exclaiming that it was delicious."]},{"id":"part_19","title":"The Legends of Ren Zu - Part 19","part":"19","paragraphs":["Ren Zu's third son, Northern Dark Ice Soul had entered a deep part of Black Heaven, obtaining Fire Gu.","He was chased by many life forms inside Black Heaven, left without a choice, he tossed Fire Gu towards them to protect himself.","Fire Gu lit up many of the Walking Meat Trees, and the fire spread out to ignite many of the wild beasts' bodies.","At once, life forms were crying out as the light of the flames burst out brightly.","\"So many delicious things, so many delicious things!\" Fire Gu shouted in excitement, it was no longer weak like before, it was tall and imposing, there was even a hint of ruthlessness and madness in its tone.","Northern Dark Ice Soul was shocked: \"Fire, oh fire, how did you become so huge?\"","\"I said, I am the least picky when it comes to food, I can eat almost anything. Fire can draw out more fire, a spark can create a forest fire.\" Fire Gu shouted proudly as it answered.","Suddenly, the flame rose up like a wall, moving towards Northern Dark Ice Soul.","Northern Dark Ice Soul quickly took a step back.","Fire Gu laughed loudly: \"Oh human, do not be scared! You saved me, you are my benefactor, you are my friend. They are afraid of me, but they need me to deal with those Dream Realms, thus they imprisoned me and starved me. Only you helped me, thus you are my true friend, from now on, if you have any difficulties, you can count on me!\"","Northern Dark Ice Soul's heart was eased, he said happily: \"That would be great, my friend.\"","\"Friend!\" Fire Gu laughed loudly, it turned into a form of a human as it opened its arms, wanting to give Northern Dark Ice Soul a hug.","Northern Dark Ice Soul jumped back in fear: \"Oh fire, excessive fervor is the fire of self-immolation, let's keep a distance between us.\"","Fire Gu had no choice but to stop its actions, it spun around Northern Dark Ice Soul as he said: \"Oh human, you are so weak, you are not fun.\"","Northern Dark Ice Soul was surrounded in flames, he quickly waved his hand: \"Don't get too close, don't get too close. It is so hot, way too hot, leave a path open for me to walk out.\"","Fire Gu had to open a path for Northern Dark Ice Soul to walk out of, after he walked for several hundred steps, he looked back at the blazing sea of fire with a sigh of relief.","But at this time, a wild beast came out from the shadows behind him, swallowing Northern Dark Ice Soul in one mouthful.","\"That is a Dream Realm! There are so many Dream Realms, they are catching up!\" Many life forms shouted as they escaped.","\"Quickly release my friend!\" Fire Gu shouted in anger, pouncing towards the beast group of Dream Realms.","The Dream Realm beast group shrunk when shone by the light of the fire, they rapidly melted like a candle. They growled and scattered all over the place.","Fire Gu continued to eat along the way, it spread towards the Dream Realm that consumed Northern Dark Ice Soul.","The Dream Realms were escaping, but Fire Gu was chasing behind them.","Among the escaping Dream Realms, the larger their bodies, the stronger they were, and the faster they ran away, soon, they pulled some distance from Fire Gu.","As it turned out, the Dream Realms used the emotions and desires of their prey to strengthen themselves.","Northern Dark Ice Soul, who was swallowed by a Dream Realm, had a huge desire to survive, at the same time, his greatest goal was to revive his father.","In addition, he was filled with anxiety and was afraid he would not make it. He was also filled with guilt and regret, because Desolate Ancient Moon died due to him giving her a meaning in life.","One could say that Northern Dark Ice Soul was the best prey for the Dream Realms.","The Dream Realm who swallowed him grew rapidly, Fire Gu growled loudly in anger, but it was getting closer to the Dream Realm.","Northern Dark Ice Soul was deep inside the Dream Realm, he had fallen asleep, in his dream, he saw Desolate Ancient Moon reviving and smiling to him, calling him a good brother and saying she forgave him, and that she knew he did not do it intentionally.","He saw that he was at the Door of Life and Death, successfully saving his father, Ren Zu. Ren Zu praised him: You are indeed my good son, if not for you, father would not have revived.","Northern Dark Ice Soul's face was filled with a blissful smile.","And like that, many days passed.","The sea of fire was still burning intensely, it spread all over Black Heaven as it finally blocked all of the Dream Realms which were escaping.","Under the burning of the flames, the Dream Realmm quickly melted as Northern Dark Ice Soul fell onto the ground, waking up from his dream.","He suddenly understood that everything in his dream was fake, his happiness was not real, what he faced was a burning hot Fire Gu. But his face was filled with tears, he felt an extreme cold that was piercing into his bones.","He cried out loud, questioning Fire Gu: \"Why, why did you wake me up? I still want to dream, I want to be eaten by the Dream Realmm!\"","Fire Gu reminded him helplessly: \"Oh human, you must know, dreams are often the opposite of reality, they are fake.\"","\"I don't want to listen, I don't care.\" Northern Dark Ice Soul cried out as he covered his ears and shook his head.","Fire Gu was anxious: \"I am your friend, I do not want...\"","Northern Dark Ice Soul interrupted it before it finished: \"Since you are my friend, you should not restrict me or obstruct me!\"","\"Sigh...\" Fire Gu let out a long sigh, it fell into silence, giving Northern Dark Ice Soul a path leading out without a better choice.","Northern Dark Ice Soul quickly ran out, wanting to find another Dream Realm within the darkness to have him eaten once again."]},{"id":"part_20","title":"The Legends of Ren Zu - Part 20","part":"20","paragraphs":["At the end of it said — Ren Zu's ten children died one after another, even Ren Zu himself was going to die of old age, he was at the end of his life. Before dying, Ren Zu retrieved the corpses of his ten children, and sacrificed himself, sending them all into Derivation Gu's stomach, eaten by it.","Large amounts of Dream Realms also followed the smell of the delicious food, going into Derivation Gu's mouth along with them.","Derivation Gu's stomach was burst open, as countless light of life shone on the lands, creating the first batch of mortals.","\"Because the Dream Realm was involved in the derivation, the first batch of mortals would experience dreams when they slept at night. Humans often sink deep into dreams, like Northern Dark Ice Soul, and are unable to free themselves from it.\""]},{"id":"part_21","title":"The Legends of Ren Zu - Part 21","part":"21","paragraphs":["There was a record in","Ren Zu started walking on the Road of Life, the surroundings were pure darkness and under his feet was dirty mud.","Ren Zu asked Self Gu: \"Where is this?\"","Self Gu replied: \"This is the ordinary marsh in the lowest level of Ordinary Abyss.\"","Ren Zu knew of Ordinary Abyss, his eldest son Verdant Great Sun had once been trapped inside.","Ren Zu could not help but become excited: \"Since this is the bottom of Ordinary Abyss, does that mean I have already left the Door of Life and Death and returned to the living world? Does that mean I am now reborn?\"","\"In a way, that is true.\" Self Gu said.","\"But how is this possible? I have not passed Luo Po Valley and have not charged through the Reverse Flow River.\" Ren Zu said in an incredulous tone.","Self Gu said: \"Oh human, you should know that you are talking about the path Fate Gu traveled. And this path you have walked on is a completely new path, a path created by you. Where this path goes is all decided by your own intentions. Like I said before, as long as you want to walk, there will be a road for you to step on.\"","Ren Zu suddenly came to a realization: \"So it was like this.\"","He then felt doubtful: \"Then how did I walk to this place?\"","Self Gu: \"Humans are born ordinary. Although they are the spirit of all living beings, they do not have the claws of a tiger nor the ability to absorb nutrients from the earth like plants, and also cannot transform like clouds and rain. You came to the ordinary marsh, what's strange about it? It is not only you, look at the mud under your feet carefully, you will see traces of many other footprints.\"","Ren Zu lowered his head close to the ground before he was able to see clearly, like Self Gu said, ordinary marsh was filled with all kinds of marks. Claws prints of wild beasts, root imprints of vegetation, traces of water flowing and also traces of stones rolling past.","\"How can there be so many marks?\" Ren Zu asked curiously.","Self Gu replied: \"This is Ordinary Abyss, all living beings will enter here due to various reasons. All living beings are ordinary. But the absolute majority of them will be trapped in Ordinary Abyss for all their lives. Only a small portion can leave Ordinary Abyss through their own efforts.\"","\"I do not want to be trapped here for my entire life. There is nothing here, it is completely dark and the air stinks, I want to leave this place.\" Ren Zu frowned.","Self Gu laughed loudly: \"If you think that being ordinary is an abyss, then it is an abyss. But if you think that being ordinary is heaven, then it shall be heaven. Since you do not want to stay here, then leave, use your two legs to walk out of the ordinary marsh step by step and become extraordinary.\"","Ren Zu took the first step.","Suddenly, his body bent, his front leg was deeply embedded into the marsh.","It was not easy to walk in the marsh, one step was deep, another was shallow. The path which looked almost uniform had some parts that were rather solid, while some were very loose.","Ren Zu walked several steps when his eyes suddenly brightened as he thought of a trick.","He purposely chose to walk on the spots which had the claw marks, since these spots could hold the marks, its soil texture was also much more solid.","Thus, Ren Zu was able to walk very smoothly almost like he was running when compared to his previous speed.","He said with a burst of emotion: \"So it turns out that in ordinary marsh, walking in the footsteps of predecessors is much faster than finding the way on your own.\""]},{"id":"part_22","title":"The Legends of Ren Zu - Part 22","part":"22","paragraphs":["Ren Zu stepped on his own Road of Life, he left the Door of Life and Death, but ended up in Ordinary Abyss.","He walked around in the bottom of the abyss, moving forward aimlessly, after a long time, even though he wanted to get out of Ordinary Abyss, he could not find the exit.","In his anguish, Cognition Gu gave him pointers: \"Human, oh human, you walked in the footsteps of other existences, although this road is simple and safe, if you want to become extraordinary, and walk out of Ordinary Abyss, there is little hope if you follow other people's trails. Since you walked on your own Road of Life, all the difficulties need to be challenged by you personally, you need to innovate and carve out your own footprints.\"","After Ren Zu received this advice, he came to a realization, he was overjoyed as he followed Cognition Gu's instructions.","He walked out of the footsteps that already existed, he started to step on the ground that was not too firm.","The ground of Ordinary Abyss was not easy to walk on.","Some places were swampy, it was easy to get stuck in the mud, and the stench was foul. Some places were full of thorns, sharp pointy tips were everywhere, Ren Zu was full of injuries. In some parts of the ground, there were also Blade Gu. When Ren Zu stepped on the ground, his soles were injured by the sharp blades, his injuries became larger as blood flowed, when he walked, the pain could be felt striking deep within himself.","The injuries on his feet caused huge pain, Ren Zu decided to walk softly.","But as he walked, Ren Zu lost his way in Ordinary Abyss, many times, he would end up on the same route, and waste extra effort traversing the same path.","Ren Zu gradually found out this problem, he was perplexed.","How could he not lose his way in the abyss?","Cognition Gu told him: \"Ren Zu, if you do not want to lose your way, that is entirely up to you. You were afraid of pain, thus you walked softly, the footprints you created were too shallow. When ordinary winds blow in this Ordinary Abyss, mortal dust will be blown out, and when the dust settles, your footprints will be covered up. If you do not want to lose your way, you have to leave behind deep footprints, do you understand what I am saying?\"","Ren Zu nodded, he understood.","Thus, he started to walk using heavy steps, each time, he stepped hard onto the ground, creating a deep footprint.","This way, every step he walked would have a deep and clear marking left by him. As long as Ren Zu saw these markings, he would know that these routes were already explored, and that there was no exit to Ordinary Abyss there.","But good things did not last, after a while, even the deepest footprints would be covered up by the dust.","Ren Zu was extremely troubled, he asked Cognition Gu.","Cognition Gu gave him another suggestion: \"Oh human, even though you left deep footprints, you purposely avoided those thorns and blades. Every time you saw them, you would take a detour, this will not do. You cannot ask to be extraordinary while leading a comfortable life.\"","Ren Zu got the hint and gritted his teeth, he purposely walked on the paths filled with thorns and blades.","Every time he took a step, he would leave a deep footprint behind, no matter how painful it was, no matter how deep the scar was.","His sweat and blood seeped into the ordinary soil as he stepped heavily into it.","When he left his foot and moved forward, on his footprint, there would be a small stem of grass.","The name of this grass was — accomplishment.","In each of his footprints, there would be a small stem of grass.","The stems of grass did not fall when the wind blew, they could not be buried under dust, they grow stubbornly and could be preserved for much longer than the footprints.","\"This way, I would not need to be afraid of losing my way.\" Ren Zu was overjoyed, he gritted his teeth and endured the pain, he tenaciously walked on a road filled with thorns and blades, he was not afraid of bleed or perspiring.","He walked further and further, he no longer lost his way, he no longer walked in circles, he went into uncharted territories.","He used his blood and sweat to nourish the grass under him, they started growing with more vitality and became taller.","Gradually, it was no longer grass that grew from his footprints, they had turned into accomplishment trees.","As time passed, the small trees grew into larger trees, the leaves were lush and green, they were even bearing fruits.","Ren Zu was tired from walking, he leaned on a tree for rest, he ate the sweet and juicy fruits to recover his stamina.","As time passed, he had almost walked in every corner of Ordinary Abyss, he created a huge forest spanning everywhere he had traveled.","Ren Zu looked at the forest behind him and felt bliss and joy, but even when the forest covered the entirety of Ordinary Abyss, he did not find the way out of it.","He felt anxious and disappointed.","He plucked one fruit and put it in his mouth, the fruit no longer tasted sweet, instead, it was bitter and hard to swallow.","Ren Zu felt strange, he tried to find the reason and realized: Unknowingly, there had been a second heart growing in his body.","This heart was called discontent.","With this, anything that he ate would not taste sweet.","Ren Zu ate the bitter fruit as he looked at the boundless forest, he no longer felt joy or bliss.","At this time, his original heart, the heart of loneliness, spoke in Self Gu's voice: \"Oh human, I have thought about a way to leave the abyss. You can plant a tall and grand accomplishment tree, as long as this tree is taller than Ordinary Abyss, you will be able to leave this place by climbing onto this tree.\"","Ren Zu thought about it and his eyes shined: \"That's right, that is a good idea.\"","But he was troubled again: \"But how can I plant a tree that is so grand, taller than Ordinary Abyss?\"","Self Gu said: \"You used the blood from your feet to plant this forest, these are all ordinary trees. If you use the blood from your heart, you should be able to plant a great accomplishment tree. Buried under the ground of Ordinary Abyss are many blades, why don't you use these blades to stab into your heart, the heart blood that flows out can be used to water the trees.\"","Ren Zu tried the method that Self Gu said.","The blade stabbed into his heart, it caused an immense pain.","This pain was hundreds and thousands of times greater than the ones in his body.","Eventually, the trees that were watered grew tall and large, they were much larger than the original trees.","Ren Zu felt pain but also joy, he continued to stab more blades into his heart, causing more heart blood to flow out.","The more blades he stabbed, the more heart blood flowed out, and the larger the trees he planted.","But even the tallest accomplishment tree was only half the height of Ordinary Abyss.","Ren Zu continued to persevere, as Hope Gu accompanied him.","When the crown of the tree he planted reach the same height as Ordinary Abyss, the trunk of the tree cracked open, inside, a girl came out.","\"Father, father!\" The girl went into Ren Zu's embrace, she was very adorable.","This was Ren Zu's fourth child, called Boundless Forest Samsara.","Ren Zu was also overjoyed, he played around with his daughter. When Boundless Forest Samsara was hungry, he would get her fruits to eat.","\"So sweet, so sweet.\" Boundless Forest Samsara loved to eat fruits, she became healthy and well-fed.","She played in the forest every day, feeling immense joy.","Ren Zu still wanted to walk out of the Ordinary Abyss, Boundless Forest Samsara urged him many times: \"Father, why must you exhaust yourself? Isn't staying here great, there are trees to shelter us, fruits to feed us, we can play here forever, life will be peaceful until we die of old age.\"","Ren Zu shook his head, his attitude was firm, he planted an even greater tree and the branches of the trees left Ordinary Abyss completely.","Boundless Forest Samsara cried, she held onto Ren Zu's hands as she pleaded: \"Father, don't abandon me. I cannot climb trees, if you go, I will be left here alone, I do not know how to plant trees, there are limited fruits, one day, I will die of hunger.\"","Ren Zu said: \"Why would I abandon you? You are my daughter, I will carry you and leave this place.\"","Thus, the father and daughter climbed the tree.","The higher they went, the more exhausted Ren Zu felt. Boundless Forest Samsara was a heavy burden, even without her, climbing the tree alone was very dangerous, not to mention carrying a person who could not climb the tree at all.","The bigger problem was, the tree started wavering and making cracking noises.","Cognition Gu told Ren Zu: \"Oh no, Ren Zu, you are carrying your daughter, it is impossible to get out of Ordinary Abyss. This is your accomplishment tree, it cannot help others become extraordinary, even your daughter is no exception.\"","Ren Zu shook his head: \"I do not want to give up.\"","Hope Gu also urged him: \"Put her down, otherwise, you cannot leave this place. Even though you have the hearts of loneliness and discontent, after planting so many trees, your heart blood is already dry. This is your last hope! Look, the tree is about to collapse!\"","Ren Zu waved his hand: \"I still want to try.\"","Self Gu saw that Ren Zu was stubborn from his actions, and seeing that the other Gu Worms failed to convince him, it flew out.","\"Ah, this is killing me!\" Self Gu did not discuss with Ren Zu, it bit on Boundless Forest Samsara's hand.","Boundless Forest Samsara shouted in pain, she was furious, she wanted to kill Self Gu.","But this way, she let go of her hands, with the shaking tree, she fell off Ren Zu's back, crashing and tumbling, after breaking her fall from many branches, she landed on the ground, she was in great pain as she started crying.","\"Daughter!\" Ren Zu shouted, wanting to go down.","\"It's too late, the tree is going to fall!\" Self Gu pushed Ren Zu, he took a huge step forward subconsciously, he left Ordinary Abyss!","The tree fell.","Ren Zu was at the edge of the cliff, he lost the way back, he shouted helplessly: \"Daughter, I will return to save you.\"","Boundless Forest Samsara cried, she said with much sadness and helplessness: \"Father, how could you be so cruel to leave me behind to live here alone, I am so scared!\"","Ren Zu heard her cries and felt extremely anguished, he checked around Ordinary Abyss, but could not find a way in.","\"It is no use.\" Self Gu said: \"Your accomplishment tree, even if it has fallen, is proof of your grandeur. A grand person is extraordinary, how can a person who is not ordinary enter Ordinary Abyss?\""]},{"id":"part_23","title":"The Legends of Ren Zu - Part 23","part":"23","paragraphs":[", after Ren Zu climbed the giant tree and walked out of Ordinary Abyss, he left behind his daughter, Boundless Forest Samsara.","Ren Zu wanted to save her, but there was nothing he could do.","He had become extraordinary, no longer able to enter Ordinary Abyss.","Ren Zu saw that pacing around this place was not going to help. He decided to set out again to find a way to rescue his eldest child, Verdant Great Sun, and his fourth child, Boundless Forest Samsara.","He started a new journey, beginning his Road of Life.","On this day, he came across a Hairy Man.","The Hairy Man stopped him, and was clearly happy: \"Ren Zu, I had a tough time looking for you.\"","Ren Zu felt strange: \"I don't recognize you, why are you searching for me?\"","The Hairy Man explained: \"It is like this, Ren Zu. I am the leader of all the Hairy Men in the world, no Hairy Man can match my Gu Refinement attainment. But I have recently encountered a problem when refining Gu. I want to refine Success Gu, but I am unable to confirm if it is success or failure.\"","Ren Zu had wanted to continue traveling, but he had a thought well up in his mind, if the Hairy Man Leader could truly refine Success Gu and he borrowed this Gu, couldn't he rescue his eldest child or his fourth child?","Therefore, Ren Zu stopped and talked with the Hairy Man: \"But what do you need from me?\"","The Hairy Man cautiously took out a Gu.","This Gu resembled an ordinary rock and was covered with a thick layer of hair, the Hairy Man spoke: \"I do not dare to break it. If it is Success Gu, that is fine. But if it is Failure Gu, the moment I break it, I will completely lose my sense of self. But Ren Zu, you are different. You are walking on a path that solely belongs to you, this means you have Self Gu. Since you have Self Gu, even if you break the Failure Gu, you will not lose your self. So I want to request you to appraise it.\"","Ren Zu was happy: \"So it is like that. I can help you, but if it is Success Gu, please give it to me. I have an urgent need for it.\"","The Hairy Man said: \"Alright! That is no problem.\"","Ren Zu touched the Gu Worm in front of him. He made a wish upon this Gu: \"Please return my fourth child, Boundless Forest Samsara, to my side.\"","At the next moment, the Gu Worm crumbled.","\"Failure.\" The Hairy Man was dejected: \"It seems I refined a Failure Gu.\"","Courage Gu on Ren Zu flew out: \"Ren Zu, you are a failure. I am leaving you.\"","Courage Gu left Ren Zu and flew away.","The Hairy Man, however, was invigorated: \"It doesn't matter, I can improve the Gu Recipe. Ren Zu, wait a moment, I will refine it again.\"","Ren Zu wanted to chase after Courage Gu and take it back, but he had an even greater desire for Success Gu to rescue his children.","He thought for a moment, and decided to wait for the Hairy Man Leader to refine the Gu.","The Hairy Man refined the second Gu and gave it to Ren Zu for inspection.","Ren Zu touched the Gu and made a wish, the Gu Worm crumbled again.","\"Another Failure Gu.\" The Hairy Man sighed in dejection.","Faith Gu on Ren Zu flew out: \"Ren Zu, you are a failure, you are not worthy of me.\"","Faith Gu also left Ren Zu.","Ren Zu stamped his foot, and wanted to chase after it, but the Hairy Man tugged him: \"Don't be in a hurry, I have thought it through, this time I can definitely refine Success Gu!\"","Faith Gu had already flown far away, Ren Zu realized he could not catch up to it, and said with a sigh: \"Hairy Man, refine it quickly, this is the last time I am trusting you.\"","The Hairy Man's third Gu Worm was still the Failure Gu.","Strength Gu also flew out: \"Ren Zu, you are a failure, you are unworthy of possessing me.\"","Strength Gu flew away, Ren Zu felt bitter as he knew chasing after it would not give any result, so he could only gaze as Strength Gu flew far away.","However, right at this time, Self Gu in his heart suddenly flew out and bit Strength Gu.","Strength Gu shrieked and flew even faster as a piece of it was bitten away. It soon disappeared like a streak of smoke.","Ren Zu and the Hairy Man watched with stupefied expressions.","Self Gu leisurely flew back, and said proudly to Ren Zu: \"Any failure has its value. Ren Zu, I went through repeated failures and absorbed them to become stronger. Just now, I took a bite of Strength Gu, from now on, you will have your own strength! I can still become stronger, I can devour any Gu Worms to possess all their strength!\"","Ren Zu was shocked.","The Hairy Man Leader slapped his thigh, shouting: \"I know how to refine Success Gu, it is through failures. The more failures there are, the closer I will be to success! I understand, I understand now.\"","He shouted happily as he rushed away, leaving Ren Zu behind.","…"]},{"id":"part_24","title":"The Legends of Ren Zu - Part 24","part":"24","paragraphs":[", Ren Zu walked on his own Road of Life. After separating with the Hairy Man Leader, he encountered Feathermen in Green Heaven.","Ren Zu was extremely happy when he saw these Feathermen.","Because Feathermen had wings on their back, and since the Feathermen could understand Ren Zu's words, both sides could communicate.","Ren Zu requested the Feathermen: \"Feathermen, please help me. My daughter is in Ordinary Abyss and cannot come out. Please fly down and rescue my daughter, let us father and daughter reunite.\"","The Feathermen laughed loudly: \"Human, how can you order us. Us Feathermen are the most free living beings in the world, no one can order us or bind us. You want us to listen to your request and follow your wish, that is impossible.\"","Ren Zu kept on persuading, and even pleaded with them, but the Feathermen simply kept on flying in the air, enjoying the pleasure of freedom.","Ren Zu's mouth had already dried, but the Feathermen only treated him as a clown, ridiculing Ren Zu as if they were looking at a joke.","\"Oh look, such a pitiful human.\"","\"So what if he is the life form with the most intelligence in the world?\"","\"He doesn't have wings and can only walk on the ground, he is so pitiful. Fortunately, I am not a human, but a Featherman. See how vigorously I can fly.\"","…","In Ren Zu's heart of loneliness, Self Gu started getting angrier as it heard these words, finally it could not hold the anger back and jumped out.","\"All of you, come down.\" Self Gu displayed its might, capturing all the Feathermen in the sky at once.","Ren Zu could not help but become greatly startled at this: \"Self Gu, when did you become so strong?\"","Self Gu said proudly: \"It is only natural. I took a bite out of Strength Gu, now that I have my own strength, I possess immense might. Moreover, there is no need to pay any price to use this strength. Human, you need to know: what is most reliable is your own strength. And without strength, freedom is just an illusion.\"","The Feathermen were captured and could no longer fly to the sky, pressed onto the ground without being able to move.","They began to throw curses at Ren Zu and Self Gu in anger.","Ren Zu heaved a sigh: \"Feathermen, I did not mean to offend you. Please forgive my rudeness. I only want to ask you to save my daughter. When I reunite with her, I will definitely reward you.\"","\"Impossible! We Feathermen are the most free!\"","\"Even if our bodies lose freedom, our hearts are still free.\"","\"Right, right!\"","\"Cruel human, you can't impose your will on any Featherman.\"","The Feathermen kept on shouting without any intention to compromise.","Ren Zu persuaded them for three days and three nights, but it was in vain. Helpless, he could only let go of these Feathermen.","Self Gu spoke bitterly: \"Human, how could you release them so easily? Don't you want to rescue your fourth child?\"","Ren Zu, however, replied confidently: \"I have already understood that these Feathermen cannot be forced. After these days of contact with the Feathermen, I have found these Feathermen might be free but they don't have dens to shelter themselves from wind and rain, and they also don't have enough food to fill their stomachs. To make them help, I have to make them do it willingly!\"","Thereupon, Ren Zu built a house near the Feathermen. Every day, he relied on Self Gu to gather a lot of wild fruits and hunt many Beasts.","The Feathermen soon discovered the safety and warmth of the house. Especially during the days of storms, the Feathermen could only hide in groves of trees, shivering and starving. While Ren Zu stayed within his house, enjoying the warmth of a fireplace and sumptuous food.","On one cold night, some Feathermen quietly moved under the roof of Ren Zu's house, to evade the wind and snow, while also greedily absorbing the warmth leaking out from the crack in the door.","Ren Zu wore the mask of Attitude Gu and opened the door, using an extremely warm attitude to invite these Feathermen into the house, and to enjoy the warmth and food with him.","As this repeated several times, more and more Feathermen came into Ren Zu's house.","Ren Zu was very hospitable and would entertain the Feathermen every day, even giving the area near the fireplace to the Feathermen. No matter how much the Feathermen ate, he let them eat without restraint.","The Feathermen gradually became accustomed to living this way, until one day, Ren Zu saw the timing was ripe and took off Attitude Gu, revealing his true, cold expression.","He shut the door of the house and stored all the food as well, no longer supplying them to the Feathermen for free.","The Feathermen were caught off-guard and were frantic.","They were already used to the safety and warmth of the house, they were used to plentiful food, they rarely flew now and hunted even less. Their stockpile of food was extremely small. Many Feathermen were fat to the extent they could not fly.","The Feathermen had no way to deal with Ren Zu's behavior. They could not beat Ren Zu, who possessed Self Gu.","Soon, all the Feathermen reached a situation where they would die from hunger or the cold.","Several days later, many Feathermen died.","Ren Zu waited and waited until he became extremely anxious, as the Feathermen showed no signs of coming to terms with him.","In the end, when most of the Feathermen died, Ren Zu could not help but mention the old matter again: \"Feathermen, as long as you move your wings to fly to Ordinary Abyss and rescue my daughter, I will give you enough food and also warm houses.\"","However, the remaining Feathermen still shook their heads.","Eventually, they all died.","From these Feathermen's corpses, many small creatures flew out. They looked like tiny specks of light, shining with all kinds of colors. Ren Zu tried to grab them, but was not able to.","\"It is no use.\" Cognition Gu informed him at this moment: \"Wild Freedom Gu cannot be caught. These Feathermen chased after freedom since their birth, but it is a pity that only after their death could they find freedom.\""]},{"id":"part_25","title":"The Legends of Ren Zu - Part 25","part":"25","paragraphs":["had an interesting account.","Boundless Forest Samsara was separated from her father, Ren Zu
