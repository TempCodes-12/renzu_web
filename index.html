, and could only stay in Ordinary Abyss.","She was heartbroken, and did not feel happy eating the fruits anymore.","Every day, she would shed tears and weep incessantly, until she got tired and gradually fell asleep.","In a dream of hers, she vaguely heard some extremely soft voices, and felt something small, like an ant was climbing her body.","Immediately, she woke up and sat up, and saw a Miniman was climbing on her body.","Because of Boundless Forest Samsara's movement, this Miniman's foothold became unstable and it fell to the ground.","\"Who are you? There is actually such a small person like you in the world?\" Boundless Forest Samsara saw the Miniman that was not even the size of her finger, and felt extremely curious, forgetting to cry for a moment.","The Miniman looked at the giant Boundless Forest Samsara with a stupefied look, and after the shock, he raised his head and started crying loudly.","\"Hey hey hey, little person, I am not crying, what are you crying for?\" Boundless Forest Samsara was puzzled.","The Miniman spoke while crying: \"I am the tallest in my tribe, and I was brave, arrogant and proud because of this. Today, I intended to climb a mountain, but to think that this mountain was really a person. There are actually such giant people like you in the world, this is the first time I've seen someone like you, so I burst into tears!\"","Almost every person who explored and grew up, would have such a mental journey.","The more they saw, the more they realized their weaknesses. Sometimes they would sigh at the vastness of the world, and sometimes they would find how far their goal was and to reach their goal, they had to go through an endless journey which they had not considered before. They would feel loss, bewilderment, discouragement, panic, even hopelessness.","Thus, one could understand the Miniman crying when it saw Boundless Forest Samsara."]},{"id":"part_26","title":"The Legends of Ren Zu - Part 26","part":"26","paragraphs":["This was a story in .","Legend says that Ren Zu tried to rely on the capabilities of the Feathermen to save his daughter, who was still stuck inside Ordinary Abyss.","However, the Feathermen wanted freedom, they did not want to be restricted.","Ren Zu thought of a scheme, but he failed, the Feathermen would rather die than compromise their freedom.","Ren Zu fell into deep perplexity.","He could not find a better way to save his children.","The same situation applied to his eldest son, Verdant Great Sun, and also his daughter, Boundless Forest Samsara.","At this time, Self Gu spoke in Ren Zu's heart: \"Oh human, you want to save your son, Verdant Great Sun, I have a method.\"","Ren Zu thought that he had to save at least one of them, he quickly asked: \"Oh? What method?\"","Self Gu laughed: \"All living beings in this world will die, this is because Fate Gu entered the Door of Life and Death, and left a trace behind when searching for Fairness Gu. Oh human, you can enter the Door of Life and Death, and walk on the Road of Life and Road of Death, as long as you do not walk on the traces of fate, you will step on a road that belongs to you solely. When you walk into the Door of Life and Death and leave again, you will form a brand new road, that would be partway to success.\"","\"Next, as long as you bring Verdant Great Sun onto the path that you walked on, and leave the Door of Life and Death, you will be able to return to the human world where the sun shines. Your son, Verdant Great Sun, will be able to escape death and revive.\"","Ren Zu heard the method of Self Gu and was very hesitant, but there was no better solution available.","Thus, he decided to let Boundless Forest Samsara stay inside Ordinary Abyss for a while longer, while he used the method taught by Self Gu to save his eldest son, Verdant Great Sun.","Ren Zu set off towards the Door of Life and Death, as he walked, one day, he met with a Beastman.","This Beastman was very muscular, his muscles were like rocks, the fangs in his mouth were sharper than blades. He took huge steps, sprinting in the wilderness as he shouted: \"Don't get any closer, don't come here! I am afraid!\"","Ren Zu was very curious, he asked: \"Oh Beastman, what are you afraid of?\"","The Beastman said: \"I am afraid of my own shadow, it keeps following me, I cannot get rid of it. I am so afraid that I can only run around in all directions, I am tired, hungry, and thirsty, I am going to die!\"","Ren Zu felt that this was funny: \"Oh Beastman, you have such a powerful body, yet you are afraid of a harmless shadow, do you have a cowardly heart? What is there to be afraid of?\"","At this time, a Gu Worm came out of the Beastman's heart, it laughed at Ren Zu: \"Oh human, do not speak so shamelessly. You do not feel afraid because you have not encountered me, Fear Gu. Hehehehehe.\"","\"Fear Gu?\" Ren Zu took a step back, his expression changed.","Once Fear Gu appeared, fear started to well up in Ren Zu's heart.","He was afraid.","Fear Gu laughed even more arrogantly now, it said to the Beastman: \"I will let you off now, little Beastman, you pitiful worm.\"","The Beastman was free now, it fell to the ground, weeping in extreme joy.","Fear Gu turned around, facing Ren Zu: \"Oh human, you dared to look down on me, Fear Gu, now I will torture you with endless fear!\"","Saying this, Fear Gu flew into Ren Zu's heart with a whooshing sound.","Ren Zu felt immense fear.","He was afraid of this, and afraid of that.","Fear Gu made him scared of the wind, every time the wind blew, Ren Zu screamed in horror.","Fear Gu made him afraid of sunlight, Ren Zu could only travel at night and often lost his way, during daytime he would enter caves or hide inside thick bushes.","Fear Gu also made Ren Zu afraid of tree leaves, thus Ren Zu ran away from the forests, every tree he saw made him shriek.","Fear Gu made Ren Zu afraid of snakes, in the end, Ren Zu even stopped using the grass ropes that he made himself.","After that, Fear Gu made Ren Zu scared of rain.","Whenever it rained, Ren Zu would shrivel up and look at the sky that was raining continuously, feeling extreme fear.","Ren Zu wanted to go to the Door of Life and Death, but after being struck by Fear Gu, he could not move much, he could not make any progress.","When Fear Gu understood Ren Zu's motive, it made Ren Zu scared of death.","Ren Zu no longer dared to walk towards the Door of Life and Death.","Because once he entered the Door of Life and Death, he would be walking from life towards death.","Ren Zu was afraid that he would die, he could only stay in place.","Self Gu sighed: \"Oh human, actually death is not scary, the real scary thing is the fear in your heart.\"","\"That is right!\" Fear Gu heard this and said proudly: \"The only thing worth being afraid of is fear!\""]},{"id":"part_27","title":"The Legends of Ren Zu - Part 27","part":"27","paragraphs":["City Well first appeared in .","Or more accurately, three clearly described it.","Legend has it —","Ren Zu’s fourth child, Boundless Forest Samsara, fell from the tree, she did not follow after Ren Zu, instead, she was trapped inside Ordinary Abyss.","One day, when she was sleeping, she met a Miniman.","The Miniman was crying, Boundless Forest Samsara asked him why.","The Miniman spoke while crying: “I am the tallest in my tribe, and I was brave, arrogant and proud because of this. Today, I intended to climb a mountain, but to think that this mountain was really a person. There are actually such giant people like you in the world, this is the first time I’ve seen someone like you, so I burst into tears!”","Since then, Boundless Forest Samsara and the Miniman became good friends, they were inseparable.","“Miniman, oh Miniman, where is your father? Do you not have siblings? Why have I never seen your family?” One day, Boundless Forest Samsara asked the Miniman.","The Miniman directed Boundless Forest Samsara to a well, saying: “Look at this well, my former home is inside.”","Boundless Forest Samsara sprawled in front of the well, extending her head to look inside.","Next, she shouted: “Ah, there are so many Minimen.”","She saw that there were countless Minimen inside the well, they were living together.","They built many houses, they lived among each other, there were markets, flowers, it was a harmonious scene, they were very happy.","The Minimen in the well also shouted.","“Why did the sky become so dark? It’s night time already?”","“There was thunder but no rain, I don’t see lightning either!”","The Minimen were in panic, they discussed as the entire city went into commotion.","“Your family is here? Why did you go outside the well, you don’t want to live with them?” Boundless Forest Samsara asked.","The Miniman shook his head: “They were the ones who exiled me, they think I am a monster.”","“Oh? Why is that?” Boundless Forest Samsara was curious.","The Miniman answered with sadness: “I told them that the world we were living in was just a well. The outside world is very big. But they did not believe me, they told me to stop spouting nonsense.”","“I also told them that the mountain at the fringe of our city is a very small mound. But they refuse to believe me, they think that it is the tallest mountain in the world, they told me to stop spreading lies.”","“Which mountain is it?” Boundless Forest Samsara asked.","“That’s Miniscule Mountain.” The Miniman pointed.","Boundless Forest Samsara started to giggle: “You call that a mountain? It can fit in my palm!”","Suddenly, Boundless Forest Samsara clapped: “Then let me tell them the truth.”","The Miniman shook his head: “It is useless.”","Boundless Forest Samsara did not believe him, she faced the well as she shouted, the Minimen inside started to panic even more.","They felt that today was too strange.","Not only did the sky turn dark, there was thunder rumbling, and it was getting louder and more frequent.","“Heaven is raging, I want to repent, I want to confess!”","“No, it is a monster, a monster ate heaven, it is burping now.”","“Save me, this world is getting destroyed!”","Some Minimen knelt on the ground and begged, some had despair on their faces, while others were running around crazily.","Boundless Forest Samsara’s breathing became a tornado inside the well.","Boundless Forest Samsara’s saliva became a huge rainstorm when it went into the well.","Boundless Forest Samsara’s words were like rumbling thunder in the Minimen’s ears, their eardrums almost burst from it.","Boundless Forest Samsara eventually gave up, she sprawled outside the well, exhausted, she said weakly: “Why are these Minimen so stupid? Can’t they be like you, to get out of the well and see the world?”","The Miniman shook his head as he sighed: “They think that they are big enough, they think the sky is round, they think the mountain is only that tall, they think life is just like this.”","“Then why did you climb out?” Boundless Forest Samsara opened her eyes wide as she asked with curiosity.","The Miniman smiled bitterly: “Because I realized how small and insignificant I was, therefore, I got out to see how big the world is.”","…"]},{"id":"part_28","title":"The Legends of Ren Zu - Part 28","part":"28","paragraphs":["Ren Zu wanted to save his own children, but he encountered a Beastman along the way, he was affected by Fear Gu.","Fear Gu made Ren Zu fear everything, he was unable to advance due to his fears.","Ren Zu was tormented by his fear, he was in deep agony, he consulted Self Gu.","Self Gu answered: “Then let me eat it.”","Ren Zu waved his hand: “No, no. I want nothing more than to avoid fear. If you eat it, this fear will stay with me for life. This is too risky.”","Ren Zu asked Cognition Gu.","Cognition Gu said: “Oh human, you want to conquer fear, you need to have courage.”","Ren Zu was troubled: “I used to have Courage Gu as my companion, it is the friend of Faith Gu. But afterwards, because I encountered the Hairy Men, due to Failure Gu, it left me.”","Cognition Gu said: “I’ll teach you a method, hide Fear Gu deep within your heart. Move forward after that and Courage Gu will come to you. Courageous people are not fearless, they are just hiding fear deep within their hearts.”","Ren Zu was more troubled now: “Oh Gu, what are you thinking? Precisely because of fear, I cannot advance, thus I need courage. But you are telling me that to obtain courage, I need to move forward first.”","While they were talking, a Gu Worm flew over.","“Is it Courage Gu?” Ren Zu was overjoyed, before feeling disappointment.","Because this Immortal Gu was not Courage Gu, it was Love Gu.","Sometimes, love comes to you on its own.","Love Gu said: “Oh human, I can smell hope and fear from you, as love, they are my food.”","Ren Zu was overjoyed: “You can take fear away, but hope is mine, I cannot give it to you.”","Love Gu refused: “Only hope and fear can nourish me together, that is how I survive. Oh human, then I can only stay by your side.”","Ren Zu did not have any good feelings towards Love Gu, he was not very willing, but Love Gu said: “Don’t chase me away, with me around, you can summon Courage Gu.”","Indeed, after Ren Zu called out, Courage Gu flew to his side a while later.","“Ah, this is the aura of love. Oh, and fear too.” Courage Gu landed in Ren Zu’s heart with much satisfaction.","It was actually good friends with Fear Gu, the two were playing as they flew around Ren Zu’s heart.","Fear and courage are often within one’s grasp.","Ren Zu had courage, his fear dissipated by a huge amount, he could move on again.","“Oh Ren Zu, I want to thank you, you are the reason why I broke free from fear.” Before Ren Zu left, the Beastman came to him.","“I have two Gu here, one is loyalty, one is betrayal. Choose one, this will be my token of gratitude towards you.” The Beastman said, taking out two Gu Worms, holding one in each hand.","Ren Zu did not know which to choose.","Love Gu said: “Choose loyalty, you already have fear.”","Cognition Gu said instead: “Go choose betrayal, you already have courage.”","Ren Zu was troubled, he asked the Beastman: “Can I take a look at them first?”","The Beastman said: “Of course.”","Ren Zu thus obtained both Loyalty Gu and Betrayal Gu, but to think that after he took them, Loyalty Gu turned into Betrayal Gu, and Betrayal Gu turned into Loyalty Gu.","Ren Zu was puzzled.","The Beastman explained: “Loyalty to others is betrayal to oneself, betraying others is loyalty to yourself.”","Self Gu spoke at this time: “Oh human, choose betrayal. Since you are walking on your own road, you will need to betray others, and even betray yourself.”","Ren Zu made up his mind, he chose Betrayal Gu.","The Beastman kept Loyalty Gu, before leaving, he told Ren Zu: “Oh Ren Zu, you have betrayal now, you cannot go to a place called \"Care\". At that place, betrayal will harm you, but if you do not ‘care’, then betrayal cannot harm you at all.”","Ren Zu nodded: “Thank you Beastman, I will remember your advice.”"]},{"id":"part_29_1","title":"The Legends of Ren Zu - Part 29.1","part":"29.1","paragraphs":["Ren Zu obtained love, courage, and betrayal, he was no longer unable to progress due to fear.","He continued to move forward.","On this day, he walked on his road, hearing a voice behind: “Oh Ren Zu, I finally found you. Slow down, wait for me.”","Ren Zu stopped moving, turning around. He saw a Snowman running up to him.","“What is it, Snowman.” Ren Zu asked curiously.","The Snowman said: “Oh Ren Zu, I finally found you. I am the strongest Snowman in my tribe, Snowmen are said to be afraid of fire, I want to prove that it is untrue. I traveled the world, I have already conquered the Bright Light Glorious Ring Fire in the sky, the Azure Divine Stone Furnace Fire in the earth, and the Raging Wave Rising Dragon Fire in the sea. But I heard that there is a fourth type of fire in this world, called the Fire of Love. Once it burns, it can turn all life forms in this world into cinders. I do not believe it, I heard that you have just obtained Love Gu, thus I wanted to try it.”","“Fire of Love?” Ren Zu was surprised, he was hearing it for the first time.","Thus, he called out Love Gu, asking: “Oh Gu, oh Gu, can you emit the Fire of Love?”","Love Gu replied: “I can, and I cannot.”","Ren Zu and the Snowman were curious, they asked: “What do you mean by can and cannot?”","Love Gu explained: “I can because I am necessary in order to emit the Fire of Love. But I cannot, because I alone am not sufficient, two hearts are needed.”","“Two hearts?” The Snowman was worried, she took out her heart from her chest.","This heart was huge and tough, it was emitting strong pressure.","The Snowman said: “This is my Heart of Domination, it is a pity that I only have one heart.”","Ren Zu said: “Don’t worry, I have a heart too.”","Ren Zu originally had one heart, but he gave it to Hope Gu.","He next obtained a Heart of Loneliness, Self Gu was residing within it.","He also had a Heart of Discontent.","Thus, right now, he took out the Heart of Discontent.","The Heart of Discontent was dry and shriveled, it was small and weak, because this heart had little blood left. Ren Zu had once used almost all of his heart blood in Ordinary Abyss, to grow the grass and trees of achievement.","Love Gu flew into the Heart of Discontent and flew out, it flew into the Heart of Domination and flew out again.","It flew into the sky and said: “Alright, you want the Fire of Love, let these two hearts clash.”","The Snowman and Ren Zu took out their respective hearts, putting them together.","Crackle, sparks were created.","The sparks grew rapidly, turning into a Blazing Flame.","Fire of Love!","The Fire of Love burned on Ren Zu’s heart of discontent, it instantly turned this heart into ashes.","Ren Zu was stunned.","Love Gu said: “Love has a price, it makes people willing to sacrifice.”","The Snowman laughed: “Oh Ren Zu, thankfully you have two hearts, otherwise, without a heart, you would die.”","The Snowman turned to look at the Heart of Domination in her hand.","The Fire of Love enveloped this heart, but this heart shone brighter and brighter.","The Snowman was nonchalant: “Oh what, this Fire of Love only has an impressive appearance, it neither has the heat of Bright Light Glorious Ring Fire, or the heaviness of Azure Divine Stone Furnace Fire, or the chaos of Raging Wave Rising Dragon Fire.”","As she said, she placed the Heart of Domination into her chest.","Next, her body started bursting out in flames, she started melting like snowflakes under the sun.","She turned pale from shock, she quickly patted and attempted to put out the Fire of Love.","But the Fire of Love could not be extinguished.","Eventually, the Snowman completely melted, only her heart was left, burning in raging flames.","Ren Zu was extremely shocked, he felt that this Snowman was very strong, to think that she would vanish like this.","“The Fire of Love is so scary.” Ren Zu was shocked.","Love Gu said: “The result of love varies from heart to heart. The heart of the Snowman was domination, but you had the Heart of Discontent, and it was completely burned from the fire. Thus, this was the result. Actually, there are good results that can occur when the Fire of Love burns.”","The results of love varied, each experience of love was a risk and gamble.","Ren Zu suddenly thought of something, becoming stirred up: “Oh Love Gu, you said that love can make people willing to sacrifice. This is wonderful, I will fall in love with the Feathermen and make them willing to fly for me, so that they can save my daughter from Ordinary Abyss.”","Right at this moment, a voice could be heard: “Father, father.”","From the burning flames of the Heart of Domination, a boy jumped out.","He was Blazing Glory Lightning Brilliance.","Blazing Glory Lightning Brilliance jumped into Ren Zu’s arms as he said: “Father, father, so I have a sister as well. I support you, let’s go save sister.”","Ren Zu was extremely overjoyed, he rubbed Blazing Glory Lightning Brilliance’s head as he said: “My son, you are so smart and sensible!”","Ren Zu brought Blazing Glory Lightning Brilliance and went on a journey again, not long after, they returned to the gathering spot of the Feathermen.","Ren Zu took out his Heart of Loneliness, saying to the Feathermen: “Do you all have hearts?”","The Feathermen answered: “We all have the Heart of Freedom.”","Ren Zu laughed: “Then let us fall in love, I have a heart too, as well as Love Gu.”","The Feathermen shook their heads: “The Heart of Freedom will be completely burned in the Fire of Love.”","The process of pursuing love was also the process of losing freedom.","Ren Zu was persistent: “The results of love vary from hearts to hearts. Don’t just look at one heart, my Heart of Loneliness is part of the process too.”","But no matter how Ren Zu urged, the Feathermen would not agree."]},{"id":"part_29_2","title":"The Legends of Ren Zu - Part 29.2","part":"29.2","paragraphs":["Ren Zu was helpless, he asked Love Gu: “Oh Gu, oh Gu, they don’t want to love me, you have to help me, and ignite the Fire of Love in our hearts.”","Love Gu sighed: “This is beyond my abilities. I cannot force others to love, no matter what heart, it has to collide on its own free will.”","Ren Zu shook his head: “No, this is a good chance to save my daughter, I cannot give up. Self Gu, I will rely on you.”","Self Gu nodded, using its own strength.","It had once eaten a mouthful of Strength Gu, right now, Ren Zu had his own strength.","Thus, these Feathermen were all captured by Ren Zu, their hearts to dug out and used to collide with Ren Zu’s heart.","But no matter how they collided, there were no hearts that created the spark of love.","Love Gu sighed: “Oh Ren Zu, forcing others to love is impossible, you will only create hatred.”","As it said that, a Gu Worm appeared before Ren Zu.","Ren Zu took a look, it was Hatred Gu indeed.","Hatred Gu made all of the Feathermen feel hatred.","They shouted: “Oh Ren Zu, you are too much, you are bullying us, we will make you pay the price!”","Thus, these Feathermen flew up together, shining worms were flying out of their bodies, they were wild Freedom Gu.","The Freedom Gu fused together into a gigantic Freedom Gu.","This Freedom Gu easily took away Ren Zu’s Love Gu.","“Henceforth, love is free.” This giant Freedom Gu said.","Ren Zu’s Self Gu quickly flew out, it wanted to snatch Love Gu, but it could not overpower Freedom Gu, it only managed to take a bite of Love Gu.","Self Gu said angrily: “Love, also belongs to oneself!”"]},{"id":"part_30","title":"The Legends of Ren Zu - Part 30","part":"30","paragraphs":["Ren Zu’s daughter, Boundless Forest Samsara, was trapped inside Ordinary Abyss.","She made friends with a Miniman, the Miniman brought Boundless Forest Samsara to see his home — City Well.","After Boundless Forest Samsara saw City Well, she raised her head at the sky.","“I understand now.” Boundless Forest Samsara looked above her.","She was trapped inside Ordinary Abyss, she was just like the Minimen who were trapped under the well. The Minimen raised their heads and saw the sky within the well, it was like the sky that Boundless Forest Samsara saw when she looked up at Ordinary Abyss.","“I have decided, I will work hard and get out of this abyss to meet with father again!” Boundless Forest Samsara raised her fists, making up her mind.","The Miniman was overjoyed: “Sure. I want to leave Ordinary Abyss and see the world outside as well. I see that there are many trees here in Ordinary Abyss, we can chop them down and make a ladder to climb up.”","Boundless Forest Samsara gasped, looking at the Miniman: “Oh Miniman, don’t you have wings? Why can’t you fly out?”","The Miniman smiled bitterly: “Oh human, I might have a pair of wings, but they are flimsy and weak. They can only carry me for a short distance. When I left City Well, I also used a ladder.”","“So that’s it.” Boundless Forest Samsara realized.","In the following days, she stayed with the Miniman, chopping trees and creating a ladder.","Trees were chopped down one by one, Wisdom Gu flew out from them.","Boundless Forest Samsara was shocked: “Wisdom Gu, why are you here?”","“Wisdom is hidden in the ordinary, of course I can be here.” Wisdom Gu answered.","Next, Wisdom Gu said: “You are all very smart, you know how to use the achievements of predecessors to escape from being ordinary. But if you two want to leave Ordinary Abyss, you need to build your own ladders and complete them alone. Otherwise, you cannot leave.”","Boundless Forest Samsara quickly nodded: “Oh Wisdom Gu, thanks for reminding us, we will take note.”","She and the Miniman made their own ladders.","The ladders became taller and taller, soon, Boundless Forest Samsara’s ladder surpassed the Miniman.","The Miniman’s ladder was short and small, the distance between each step was also small.","In comparison, Boundless Forest Samsara’s ladder was long and tall.","Boundless Forest Samsara teased the Miniman: “Miniman, oh Miniman, the ladder I make in half a day is as tall as the one you make in half a month. At this rate, when can you make a proper ladder to step on and escape from Ordinary Abyss?”","The Miniman was helpless: “I can’t help it, I am already doing my best, but this is all the wood I can carry after spending half a day, while you only need one hand to carry this over. I need to use a long time to chop down a small tree, but you only take three swings. I am already doing my best to reach this extent.”","Boundless Forest Samsara nodded: “It is a pity we can only make our own ladders.”","The Miniman replied: “That’s right, to leave Ordinary Abyss, we can use our predecessors’ achievements, but we truly need to rely on ourselves. Let’s continue working hard.”","Boundless Forest Samsara and the Miniman continued to chop down trees to make their ladders.","Trees fell one by one, from within, Strength Gu flew out.","Boundless Forest Samsara was shocked: “Oh Strength Gu, why are you here?”","“Strength is hidden in the ordinary, of course I can be here.” Strength Gu answered.","Boundless Forest Samsara thought about it and asked: “Oh Strength Gu, can you give us any advice? Like Wisdom Gu.”","Strength Gu said: “I have no advice to give you, but I can grant you great strength, as long as you give me your youth.”","Boundless Forest Samsara fell into hesitation.","Strength Gu said: “According to your current strength, when will you be able to build a ladder tall enough to escape Ordinary Abyss?”","Boundless Forest Samsara thought: “Very long, I will need twenty to thirty years.”","Strength Gu said: “Yes, by then, you will no longer be young, you will lose your youth and became middle aged, rather than that, you might as well give me your youth, even though you will become middle aged, you only need a few years to build the ladder.”","Boundless Forest Samsara thought about it and nodded: “You are absolutely right, Strength Gu, I will rely on you.”","Thus, Boundless Forest Samsara obtained Strength Gu, her speed in building the ladder became very fast, she could chop more trees at once. A year later, her ladder was extremely tall.","She stood at the top of the ladder and looked down.","She saw that the trees were very small, the grass was a field of green, she was very happy: “So when I stand at a high point, things that are big usually will become small. It is just like City Well.”","She looked down at the Miniman’s ladder, it was very short, less than one percent of hers. She pouted.","Boundless Forest Samsara walked down and said to the Miniman: “Why are you still so slow, my ladder is already so tall!”","The Miniman looked at her ladder in admiration, saying helplessly: “I really admire you, your strength surpassed me to begin with, but now you also have Strength Gu, it is too bad that I have no help, I can only rely on myself. I have already tried my best, everyday, other than eating and resting, I spend all my time building this ladder, but it cannot match yours.”","Boundless Forest Samsara nodded: “That is natural.”","Another year passed.","Boundless Forest Samsara continued to build the ladder even taller.","She stood at the peak and looked down.","The trees were like grass, while everything smaller than trees could not be seen clearly.","She looked at the Miniman’s ladder, even though it was taller than most trees, it was less than one-thousandth of hers.","Boundless Forest Samsara walked down the ladder, laughing at the Miniman: “Miniman oh Miniman, stop wasting your efforts. Your strength is too low, you will not be able to build that ladder even if you spend an entire lifetime. You might as well use this time to enjoy your life.”","“Actually, you are already very amazing, compared to those Minimen, you actually walked out of City Well, you should just enjoy your life now.”","The Miniman thought about it and shook his head: “I am not satisfied with being ordinary. When I am not happy with being ordinary, being ordinary would be like an abyss to me, I want to go out. Even if I cannot succeed, I want to try, if I do not try hard enough, I will not be happy.”","Thus, the Miniman continued building his ladder.","The third year passed.","Boundless Forest Samsara’s ladder was extremely tall.","She stood at the peak and looked down.","Only to see that clouds were blocking her vision.","She wanted to look at the Miniman’s ladder, but she could barely see it, it was less than one ten-thousandth of her ladder.","Boundless Forest Samsara sighed, she felt lonely.","When the wind blew, she shuddered, feeling cold.","“So when I stand at this tall point, not only will I feel lonely, I will also feel cold.” Boundless Forest Samsara walked down the ladder and told the Miniman about this.","The Miniman shook his head: “My ladder is not tall enough, I don’t know how you feel.”","Boundless Forest Samsara felt bored.","She continued to build the ladder, but the time she spent on it was decreasing.","Strength Gu asked her: “Oh human, why are you not building your ladder?”","Boundless Forest Samsara answered: “The ladder is too tall and cold, I need to rest and regain warmth.","Another year passed.","Boundless Forest Samsara felt extremely bored.","She was still building her ladder, but she was spending less and less time on it.","Strength Gu asked her: “Oh human, why are you not building your ladder?”","Boundless Forest Samsara answered: “The ladder is too tall, when I look down, I get afraid. I need to rest and let my heart calm down.”","Another year passed.","Boundless Forest Samsara became even more lazy.","Strength Gu asked her: “Look at the Miniman, he has never stopped building his ladder, he is giving it his all. If you continue being lazy, he will surpass you one day.”","Boundless Forest Samsara laughed: “How can that be possible? One day of work for me is a month of his. How can he ever surpass me?”","Like this, years passed without stopping.","Finally, one day, the Miniman found Boundless Forest Samsara who was resting under a tree, saying to her: “Oh friend, my ladder is at the edge of Ordinary Abyss, tomorrow, I will step out and leave Ordinary Abyss.”","Boundless Forest Samsara laughed: “Oh Miniman, don’t lie to me, this is too funny.”","The Miniman shook his head, saying seriously: “Grandness and being laughable is merely an inch apart. But I am not laughable anymore, I am grand and can finally leave this Ordinary Abyss. If you do not believe me, watch as I leave.”","Thus, the Miniman started to climb his ladder.","Boundless Forest Samsara was shocked at this, the Miniman was really at the edge of the abyss, he could leave if he continued like this.","Boundless Forest Samsara shouted: “Oh Miniman, do you not feel cold?”","The Miniman said: “Of course, but I want to build my ladder and climb out of here.”","Boundless Forest Samsara shouted again: “Oh Miniman, do you not feel lonely?”","The Miniman said: “Of course, but I want to build my ladder and climb out of here.”","Boundless Forest Samsara shouted again: “Oh Miniman, do you not feel afraid?”","The Miniman said: “Of course, but I want to build my ladder and climb out of here.”","After saying those three lines, a bright light flashed on his body, rapidly forming into a Gu Worm.","“My name is Perseverance, oh Miniman, thank you for giving me life.” Perseverance Gu thanked the Miniman.","The Miniman laughed: “Great, even though I do not have strength, I have perseverance.”","The Miniman said as he climbed out of Ordinary Abyss, stepping into the outside world.","He first saw someone.","It was Ren Zu.","The rate of time inside Ordinary Abyss was different from the outside world.","Ren Zu sighed as he saw the Miniman: “This is Perseverance Gu? What a pity, if I had it, I would have been able to conquer Reverse Flow River.”"]},{"id":"part_31","title":"The Legends of Ren Zu - Part 31","part":"31","paragraphs":["As for the Myriad Gold Wondrous Essence Physique, it was written in seven","Legend says that the miniman surpassed Boundless Forest Samsara and persevered to build the ladder and made his way out of Ordinary Abyss.","When the miniman saw Ren Zu, Ren Zu sighed, if he had perseverance Gu back then, he would have conquered Reverse Flow River and would not have created such a mess.","Ren Zu wanted to save his children, but until now, he had not achieved anything.","Ren Zu saw that the miniman had perseverance Gu and gained new hope, he said to the miniman: \"Miniman, oh miniman, I need your help.\"","The miniman asked: \"Oh Ren Zu, how do you want me to help you?\"","Ren Zu told the miniman that he wanted to borrow and use perseverance Gu.","The miniman said: \"Oh Ren Zu, the reason why I could leave Ordinary Abyss was because I used the trees that you planted. I chopped down those trees and built my ladder, thus, I owe you a favor.\"","The miniman agreed to lend perseverance Gu to Ren Zu.","But after Ren Zu gained perseverance Gu, he realized he could not use it.","\"This is the perseverance of the miniman, not yours, Ren Zu.\" Cognition Gu appeared at this time and told Ren Zu this fact.","Ren Zu was anguished, he sighed deeply.","He asked cognition Gu: \"Then what should I do? I know that perseverance Gu can help me but I cannot use it. I know the feathermen can help me but love cannot control them.\"","Cognition Gu told Ren Zu: \"Nobody can force anyone to love them, but you can create a Gu to lure the feathermen into helping you do things. Think about it, how did the miniman gain perseverance Gu?\"","Cognition Gu's words were a huge inspiration to Ren Zu.","Ren Zu was overjoyed: \"Oh cognition Gu, thank you for the great idea. I know what to do now, I want to create my own Gu.\"","Cognition Gu was curious: \"What Gu is that?\"","Ren Zu shook his head: \"I am not sure, but I have an idea. I want this Gu to be something everyone in the world wants.\"","Thus, Ren Zu left Ordinary Abyss and went to the blue sea.","This was the blue sea that formed life Gu, it was the source of all life in the world.","Ren Zu had walked ashore from the blue sea, he was back here again.","Ren Zu was thirsty, he scooped up the blue sea water and drank a few mouthfuls, he got more thirsty as he drank it, but Ren Zu was satisfied: \"I want to use the blue sea water to refine Gu. After I succeed, no matter who obtains it, they will never be satisfied, they will want more.\"","Thus, Ren Zu took away a lot of blue sea water.","After the sea level reduced, the beach was exposed. Ren Zu found that there were many sea urchin-like Gu on the beach.","This was not life Gu, it was difficulty Gu.","Any life would face difficulties.","Ren Zu's eyes shone, he said: \"I want to refine Gu that everyone needs, but to obtain it, there will be difficulties.\"","Thus, he took many difficulty Gu.","After doing all these, Ren Zu left the blue sea and headed to the Door of Life and Death.","After entering it, Ren Zu did not go deeply into the Door of Life and Death, but only walked one round around the road of life.","He gathered a lot of worry Gu as he said: \"I want to refine Gu that after getting it, people will not abandon easily, they will be worried that it will go missing.\"","After leaving the Door of Life and Death, along the way, Ren Zu met with sadness Gu.","Ren Zu laughed happily: \"Excellent, I want to refine Gu in which once people lose it, they will be very sad. This way, people will not abandon it easily.\"","Thus, he collected the sadness Gu.","Ren Zu had gathered everything, he started to refine Gu.","The flames of the Gu refinement raged on, a lot of black smoke was produced, attracting many Gu and lifeforms to come and watch.","\"Oh Ren Zu, what Gu are you trying to refine?\" Stupidity Gu was lured here as it asked curiously.","Ren Zu smiled: \"Oh stupidity Gu, if you want to know, go into the fire and see for yourself.\"","Stupidity Gu went inside and never came out again.","Not long after, wisdom Gu came here as well, it asked: \"Oh Ren Zu, what are you trying to refine?\"","Ren Zu laughed: \"Oh wisdom Gu, if you want to know, go into the fire and see for yourself.\"","Wisdom Gu flew in too.","But it only flew into the black smoke, once its vision was obscured, it flew around randomly and flew out again.","\"Ren Zu, oh Ren Zu, I was almost deceived by you. I already know what you are refining, I am leaving.\" Saying this, wisdom Gu flew away.","Ren Zu felt that it was a pity, he sighed: \"This way, after my Gu is refined, it can enslave stupid people, and blind wise people for some time.\"","Days passed one by one.","The Gu refinement flame continued to burn, but he did not succeed.","The black smoke did not fade away, it gathered in the sky and created huge black clouds.","\"Oh Ren Zu, you must have felt it, we are just one step away. This final step is the most crucial one.\" Cognition Gu said.","Ren Zu nodded, he stood up with determination and walked towards the fire: \"It seems that this Gu needs to be created with human hands.\"","Saying so, Ren Zu chopped off both hands and threw them into the fire.","Boom!","The flame exploded as the endless dark clouds in the sky faded, under the golden sunlight that shone down, a little girl appeared before Ren Zu.","\"Oh father, thank you for giving life to me, I am Myriad Gold Wondrous Essence.\" The girl was radiating an aura of prosperity, she smiled towards Ren Zu.","Ren Zu looked at her and laughed: \"Hahaha, I have another daughter now. But wait, did my Gu refinement succeed?\"","Myriad Gold Wondrous Essence opened her right palm as she held the Gu towards Ren Zu: \"Look father, this is the Gu that you refined, it is called — Wealth.\""]},{"id":"part_32","title":"The Legends of Ren Zu - Part 32","part":"32","paragraphs":["d that Ren Zu had spent enormous energy and effort to gather Gu materials, even sacrificing his own two hands to finally refine wealth Gu.","He brought his son, Blazing Glory Lightning Brilliance, and daughter, Myriad Gold Wondrous Essence, to the feathermen’s residence.","But strangely, all the feathermen had disappeared with no traces left.","“What’s going on?” Ren Zu was puzzled.","“That is because I arrived here, those feathermen are afraid of me, all of them ran away.” A black and white spider walked towards Ren Zu leisurely.","“Who are you?” Ren Zu asked.","The spider smiled: “Human, you have walked through the road I created in the Door of Life and Death, you still don’t know who I am? I am fate Gu.”","Myriad Gold Wondrous Essence added: “Fate Gu, you are not even the size of my palm, why would those feathermen fear you?”","Fate Gu chuckled: “Because they pursue freedom, but I, Fate, bind and restrict them.”","Blazing Glory Lightning Brilliance grumbled: “So your intention was the same as us. You are really a failure, not capturing even one featherman, while hindering us as well.”","Fate Gu laughed loudly: “Who said I failed? The feathermen are pursuing freedom, but what do they know? Their escape is only on the superficial level, I have already bound them. The road towards their freedom was all arranged by me, but they think they succeeded, not knowing anything. You are also the same, look at yourselves.”","Ren Zu, Blazing Glory Lightning Brilliance, and Myriad Gold Wondrous Essence looked at their bodies.","They discovered that white spider silk had stuck to their limbs and body for some unknown time.","They also discovered that not just themselves, even the surrounding flowers, grass, trees, rocks, water, everything was bound by the spider silk.","These spider silk gathered together to form into a spider web which spread out endlessly in the sight of Ren Zu and his children.","“This is the web that I weaved, it is called all-encompassing web. Everything in the world is bound by this web, to be arranged and controlled by me, Fate. Everyone you encountered and all the things that have happened are all controlled by me.” Fate Gu said.","Ren Zu and his children felt a chill in their hearts and began to struggle fiercely.","Fate Gu smiled: “It is useless, you cannot escape. Fate cannot be altered.”","Ren Zu glared at fate Gu furiously: “Oh Fate, why do you have to manipulate and toy with us? From what you said, all the hardships and misfortunes I encountered were all your doings. The loss of my children was also due to you!”","Fate Gu said calmly: “Human, I know you want to save your eldest son Verdant Great Sun, but he is already dead. Death is a necessary fate of humans, you simply cannot save him. Moreover, you want to rely on wealth Gu to save your daughter Boundless Forest Samsara, that is also impossible.”","As Fate willed, a thread of spider silk bound Ren Zu’s wealth Gu and dragged it in front of fate Gu.","“Release it, that is our Gu worm!” Blazing Glory Lightning Brilliance shouted.","Myriad Gold Wondrous Essence’s eyes reddened, sobbing: “Father sacrificed his own hands to painstakingly refine this wealth Gu. How dare you take it away?”","Ren Zu struggled fiercely, but the spider silk continued to become tighter, firmly binding them.","Fate Gu laughed loudly: “Life and death is decreed by fate, prosperity is up to heaven. Human, you are fated to be poor and menial, tormented and humiliated till you become insane, and in the end, you will also die. Although you refined wealth Gu, you don’t have the fate to enjoy it. If you are fated to be poor, even if you dug out gold, it will turn to copper, if you are fated to be rich, even if you pick up paper, it will turn to silk. All these things are under my control.”","Ren Zu, Blazing Glory Lightning Brilliance, and Myriad Gold Wondrous Essence started cursing fate Gu furiously.","Fate Gu was not the least bit angry, still carefree and at leisure: “Many have cursed me, but so what? Humans, no matter how you curse me, it won’t change anything.”","Fate Gu suddenly moved the spider silk, throwing Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence far away, completely out of Ren Zu’s sight.","“My children!” Ren Zu howled.","Fate Gu said darkly: “Human, don’t blame me, this is your fate. Not just you, loneliness is the fate of every person. Even if they are your own children, they will not accompany you for life and will eventually leave you. Every encounter is temporary, separation is normality.”","Ren Zu, however, kept on struggling, but the more he struggled, the tighter the spider silk bound him.","Ren Zu felt an increasingly enormous pressure pushing him down to the point of suffocation.","He panted heavily, he gradually lost the strength to struggle.","Ren Zu started crying, tears rolling down his cheeks: “Why does my fate have to be so pitiful!”","Fate Gu was silent.","But at this time, a voice emerged from the depths of Ren Zu’s heart. The voice belonged to self Gu: “Human, believe in your own strength rather than blaming your fate!”","Ren Zu stopped crying as he suddenly realized: “Right, although I don’t have strength Gu, self Gu has taken a bite of strength Gu, I have my own strength now. Self Gu, I can only rely on you.”","Self Gu then erupted with a dazzling light as it attempted to break the spider silk.","Some spider silk was torn, but even more came to bind Ren Zu.","“My own strength is not enough?” Ren Zu was anxious: “Right, self Gu, you have also taken a bite of love Gu. If strength does not work, let us rely on love instead.”","Thereupon, self Gu let out a gentle light as it attempted to break the spider silk, but this also failed.","Fate Gu said: “Oh human, why can’t you understand? Love is a type of fate, I arranged it to make Verdant Great Sun fall in love with Desolate Ancient Moon, I also arranged it to make the rockman fall in love with Desolate Ancient Moon. I also arranged success and failure in their lives, so they eventually ended up dead.”","“No! No——!” Ren Zu screamed and bawled.","Fate Gu listened quietly.","Ren Zu gradually lost the strength to cry, he mumbled powerlessly: “I understand now, I know why the feathermen pursue freedom.”","Fate Gu smiled: “Human, you also want to pursue freedom?”","Ren Zu nodded: “Yes, if I have freedom, I will be no longer be bound by you.”","Fate Gu: “But look at those feathermen, even though they pursue freedom, aren’t they still under my control?”","Ren Zu shook his head: “My freedom is different from them. I will pursue absolute freedom.”","Fate Gu laughed loudly: “A person’s absolute freedom is insanity. Oh human, see for yourself, you are seeking freedom but you are actually moving towards insanity. I already said this earlier, you will lose your mind. That is the road I arranged for you, you cannot escape my control.”","“No! I don’t believe you! I will use my own strength and wisdom to obtain freedom. I don’t believe your words, I will escape your control!” Ren Zu retorted.","Fate Gu’s laughter became louder: “Oh human, you are truly going crazy, you are already deranged. Did you forget? Your self Gu has only taken a bite of strength Gu and love Gu, so you only have your own strength and love, but not your own wisdom. Oh human, when you think you are intelligent, it will be the sign that you are going crazy.”","“Hahaha, hahaha.” It was Ren Zu’s turn to laugh: “I don’t believe you, oh fate Gu, I don’t believe you! I don’t believe that this world has fate.”","Fate Gu was silent for a moment before saying: “Even if you don’t believe it, I will still exist.”","Ren Zu rebuked: “No, that is not true. When I stop believing in you, you will stop existing. I refuse to believe in fate, fate does not exist! Hahaha!”","Fate Gu shook its head, sighing: “Truly pitiful, oh human, you have already fallen into insanity.”","Ren Zu scratched his hair and skin, his tears and mucus mixed together, he struggled, he knelt on the ground as he rolled around.","It was like how Fate declared, he had become insane."]},{"id":"part_33","title":"The Legends of Ren Zu - Part 33","part":"33","paragraphs":["Ren Zu wandered alone on the vast land, his hair was disheveled and he seemed to have lost his mind: at times, he wailed, at times, he sat down in a daze, and at times, he laughed like a fool.","Fate Gu's manipulation had separated him from his children, he also lost wealth Gu, Ren Zu was forced into a state of madness.","\"Who am I? Where am I? What am I doing?\" Ren Zu was at a loss and went crazy again.","One morning, a group of birds ran past Ren Zu.","These birds did not have wings, their six legs moved alternately as they ran on the ground, raising clouds of dust in their path.","Ren Zu jumped with joy when he saw these birds.","\"So I am a bird!\" He also spread his legs and ran wildly, joining the bird group.","The birds growled strangely towards Ren Zu: \"You are a human, you use two legs to walk, you are not a bird. Leave, don't disturb us, we are pursuing freedom Gu, we want to retrieve our freedom.\"","Ren Zu asked: \"Why are you all searching for freedom Gu?\"","The birds said with a heavy tone: \"We once possessed freedom Gu, but we did not realize that. Only after losing it, we found that we no longer had wings and could not fly anymore. When we regain freedom, we will be able to spread our wings and soar to the sky again.\"","Ren Zu realized: \"I understand, humans also need freedom. If humans don't have freedom, they will be like birds who have lost their wings.\"","\"Right! I remember now!\" Ren Zu clapped and laughed madly: \"I also need to search for freedom to get rid of fate's shackles. After that, I can go wherever I want to go, and be with whomever I want to be forever.\"","The birds casted a strange look at Ren Zu: \"Oh human, how can you have such preposterous thoughts?\"","\"Look at us, how can birds not have wings? So, chasing after freedom is part of our duty.\"","\"But you humans are destined to be alone, all gatherings will end up in separation. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.\"","Ren Zu scratched his head, puzzled: \"Is that how it works?\"","The birds left behind their last words: \"Oh human, let us give you some sincere advice. If you obtain freedom in the future, you must cherish it, don't be like us and let go. Don't let freedom Gu fly away, otherwise you will regret it.\"","After Ren Zu parted ways with the birds, he slowly forgot his identity and goals once again.","One afternoon, a leap of blue leopards passed by him.","The insane Ren Zu saw the group of leopards and shouted in joy: \"So I am a leopard.\"","Ren Zu rushed into the group.","But the leopards pushed him away and shouted: \"You are a human, not a leopard. You use two legs to walk, while we have four legs. Leave, don't disturb us. We are pursuing freedom Gu, we want to retrieve our freedom.\"","Ren Zu asked: \"Why are you searching for freedom Gu?\"","The blue leopards looked depressed: \"Sigh, we once possessed freedom Gu, but we did not realize it. Only after losing it, we found that we no longer had teeth and could not bite and tear apart our prey. When we regain freedom, we will be able to eat happily again.\"","Ren Zu realized: \"I understand, humans also need freedom. If humans don't have freedom, they will be like beasts with no teeth.\"","\"Right!\" Ren Zu clapped and laughed madly: \"I need to search for freedom to get rid of fate's shackles. I will possess countless delicacies and wines, endless wealth, and all kinds of comfortable and beautiful clothes.\"","The blue leopards were stunned before laughing loudly as they mocked Ren Zu: \"Oh human, how can you have such preposterous thoughts?\"","\"Look at us, how can beasts not have fangs or claws? So, chasing after freedom is part of our duty.\"","\"But you humans were born with empty hands and will pass away with nothing. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.\"","Ren Zu scratched his head, unsatisfied: \"Is that how it works?\"","The leopards left behind their final words: \"Oh human, let us give you some sincere advice. If you obtain freedom in the future, you must cherish it, don't be like us and let go. Don't let freedom Gu fly away, otherwise you will regret it.\"","After Ren Zu parted ways with the leopards, he slowly forgot his identity and goals once again.","One evening, a school of fish swam past him.","Ren Zu saw the fish and shouted in joy: \"So I am a fish.\"","Ren Zu joined the fish group and tried to swim like them.","There was a commotion in the fish group as they pushed Ren Zu away and shouted: \"You are a human, not a fish. You use two legs to walk, while we have no legs. Leave, don't disturb us. We are pursuing freedom Gu, we want to retrieve our freedom.\"","Ren Zu asked: \"Why are you searching for freedom Gu?\"","The fish sighed: \"We once possessed freedom Gu, but we did not realize that. Only after losing it, we found that we no longer had gills and could not breathe in the water again. When we regain freedom, we will be able to swim in the water again.\"","Ren Zu realized: \"I understand, humans also need freedom. If humans don't have freedom, they will be like fish with no gills and cannot breathe.\"","\"Right!\" Ren Zu clapped and laughed madly: \"I need to search for freedom to get rid of fate's shackles. I will breathe freely and live on forever, I want eternal life!\"","The fish sneered: \"Oh human, how can you have such preposterous thoughts?\"","\"Look at us, a fish must have gills, so chasing after freedom is part of our duty.\"","\"But you humans are destined to have no relation with eternal life, you will die of old age and illnesses. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.\"","Ren Zu frowned, feeling irritated: \"Is that how it works?\"","The fishes left behind their final words: \"Oh human, let us give you some sincere advice. If you obtain freedom in the future, you must cherish it, don't be like us and let go. Don't let freedom Gu fly away, otherwise you will regret it.\"","After Ren Zu parted ways with the fishes, he slowly forgot the advice of the birds, leopards, and the fish.","\"I am a human, I need to pursue freedom!\"","\"I need to get rid of the shackles of fate, I want to live forever with my loved ones, I want to enjoy life with enough wealth, I want to live on forever.\"","Many beings that walked past Ren Zu heard him, they shook their heads and stayed away from him.","\"Let's quickly leave, he is Ren Zu and he is talking nonsense again.\"","\"He has already gone mad completely.\"","\"How could he dare to have such thoughts?\"","One day, freedom Gu flew towards Ren Zu on its own accord.","Ren Zu was joyous as he grabbed it.","\"Oh freedom, I finally obtained freedom.\" Ren Zu was extremely happy but also felt puzzled as he asked [[]]freedom Gu: \"This is really strange, the wingless birds are pursuing you, the toothless beasts are pursuing you, the gill-less fish are pursuing you, but you flew to me, what is going on here?\"","Freedom Gu replied: \"I didn't fly to you, human, you once used attitude Gu to bully me, used love to bind me, and used wealth to bribe me. I loathe and hate you! I flew over because I was attracted by the cognition Gu on you.\"","Cognition Gu floated out of Ren Zu's body and explained with a smile: \"Ren Zu, because you have gone mad, you are thinking deliriously all the time. A human that desires companionship forever, a human who has an extravagant hope of living a life with no worries, a human who pursues eternal life; what else can this be other than a lunatic?\"","Freedom Gu sighed: \"Freedom of cognition is the greatest freedom. These delirious thoughts can strengthen me. Ren Zu, although you captured me, I will never work for you. Release me now!\"","Ren Zu shook his head and grasped even tighter: \"Freedom Gu, I will not let you go.\"","Freedom Gu sneered: \"Then prepare yourself, don't collapse from the pressure.\"","The moment it finished speaking, responsibility Gu flew over, pressing on Ren Zu's shoulder.","\"Heavy, so heavy!\" Ren Zu almost bent over from the pressure.","Cognition Gu sighed: \"Freedom and responsibility coexist, oh Ren Zu, you want to obtain freedom so you need to shoulder the responsibility. At least, you need to be responsible for yourself.\"","Ren Zu clenched his teeth and persevered, sweat flowed down his body like a river, soon, he knelt down on the ground.","He saw spider webs again.","Fate Gu's spider silk wrapped around his whole body. Ren Zu was barely shouldering the heavy responsibility and had no strength to break free from the spider silk's bindings.","Fate Gu's spider silk constricted tightly, forming blood wounds everywhere on Ren Zu's body.","Ren Zu shouted: \"What is going on?\"","Cognition Gu explained: \"Oh human, the more freedom you experience, the more you will feel the restriction around you.\"","Freedom Gu laughed: \"Just let me go, the longer you hold on to me, the more spider silk will bind you, the binding will become tighter and will even constrict you to death!\"","Ren Zu shook his head: \"No, I won't let go, oh freedom Gu, I must have you!\"","Countless spider silk pierced into Ren Zu's flesh, Ren Zu howled in pain and rolled on the ground but did not let go.","\"Hahaha!\" Ren Zu began laughing foolishly again: \"I can sense a Gu far away. Just this feeling alone makes me happy and satisfied.\"","Cognition Gu admitted frankly: \"That is natural. Whoever obtains freedom Gu will also be able to sense the location of happiness Gu.\"","Ren Zu continued to persevere, he cried in pain at times and laughed happily at other times. The spider silk constricted tightly, tearing into his bones and leaving deep marks on them, but Ren Zu still did not loosen his hands.","In the end, he fainted from the pain.","After a long time, he slowly woke up.","Fate Gu's spider silk was no longer constricting him, responsibility Gu also did not exert heavy pressure, while cognition Gu had disappeared.","\"Wait, what about freedom Gu?\" Ren Zu did not sense freedom Gu's existence, and in his moment of panic, he opened his hands.","The moment a gap appeared, freedom Gu flew away and left Ren Zu behind.","Humans often did not understand freedom when they possessed it, only after losing it, they would come to a sudden realization.","Ren Zu was stunned when he saw freedom Gu flying away, he remembered the advice of the birds, leopards, and fish, he felt extremely regretful.","He tore out his hair painfully and rolled on the ground.","\"I am better off dead.\" Ren Zu was overwhelmed with grief: \"I would rather lose love, I would rather lose my life, I don't want to lose freedom!\""]},{"id":"part_34","title":"The Legends of Ren Zu - Part 34","part":"34","paragraphs":["His goal was achieved at this moment, but he did not think of himself and instead thought of .","Ren Zu said: He wanted freedom and to get rid of fate's shackles. After that, he could go wherever he wanted to go, and be with whoever he wanted to with forever.","The birds berated him: You humans are destined to be alone, all gatherings will end up in separation. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.","Ren Zu said: I want freedom and to get rid of fate's shackles. I will possess countless delicacies and wines, endless wealth, and all kinds of comfortable and beautiful clothes.","The beasts ridiculed him: But you humans were born with empty hands and will pass away with nothing. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.","Ren Zu said: I want freedom and to get rid of fate's shackles. I will breathe freely and live on forever, I want eternal life!","The fishes rebutted: But you humans are destined to have no relation with eternal life, you will die of old age and illnesses. Oh human, you want to pursue freedom but you also need to abide by your nature, you should not indulge in wild fantasies.","Ren Zu was puzzled.","Ren Zu was disgruntled.","Ren Zu was irritated.","Ren Zu became insane!","How can you have such thoughts?","Why can't I have the same thoughts?","Why can't a human be together forever with their loved ones?","Why can't a human live life without worries and have endless wealth?","Why can't a human have eternal life?","Because fate does not allow it?","Because it does not allow, therefore I cannot do it?! I cannot even think about it?!","On what basis?","On what damned basis?","On what basis am I not allowed to think about it?!","On what basis is eternal life forbidden?!","If such thoughts turn me insane.","Then let me become a lunatic!","If such pursuit makes me demonic.","Then let me become a demon!!"]},{"id":"part_35","title":"The Legends of Ren Zu - Part 35","part":"35","paragraphs":["Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence were sent flying away by fate Gu and were forced to leave Ren Zu, arriving at immemorial blue heaven.","Rumble!","Thunder rumbled unceasingly here. Lightning flashed, imprinting the sky and forming a forest of lightning.","\"I am angry! I am angry!\" The source of this lightning forest was a lightning Gu, it was roaring continuously.","Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence were extremely afraid. The lightning was too strong, so long as a lightning bolt struck them, they would be heavily injured or even die.","They did not move at all, afraid of lightning Gu discovering them and bombarding them to death.","They waited patiently for lightning Gu's anger to dissipate. They would move once it calmed down.","But lightning Gu was extremely angry and its anger did not show any signs of decreasing. The lightning forest kept on growing in size.","\"What should we do?\" Myriad Gold Wondrous Essence was worried: \"How can we return to father? Brother, do you have any good suggestions?\"","Blazing Glory Lightning Brilliance shook his head, his brows furrowed: \"It is all fate Gu's fault! It forcefully separated us from father, I am definitely going to take revenge in the future. Argh, my heart hurts every time I think of fate Gu.\"","Blazing Glory Lightning Brilliance held his chest, he found his heart aching more and more.","How could this be?","He quickly opened up his chest and looked at the depths of his heart.","\"Oh, why is there a Gu in my heart?\" Blazing Glory Lightning Brilliance was astonished: \"It is no wonder my heart is in constant pain, this Gu was biting on my heart.\"","Myriad Gold Wondrous Essence also saw this Gu worm: \"Isn't this love Gu? I heard father mentioning it before.\"","\"No, I am hatred Gu.\" The Gu worm spoke: \"Although I look similar to love Gu on the surface.\"","Myriad Gold Wondrous Essence urged: \"Hatred Gu, why are you gnawing on my brother's heart, please stop quickly.\"","But hatred Gu said: \"I won't! I am building my home here, I am changing your brother's heart into a heart of hatred.\"","Blazing Glory Lightning Brilliance was furious: \"Who allowed you to build your home in my heart? Get out quickly, I don't welcome you. If you don't get out, I will crush you to death!\"","Hatred Gu laughed loudly: \"I was attracted by lightning Gu's anger, but unexpectedly discovered that your heart is more suitable for my home. I won't leave.\"","Blazing Glory Lightning Brilliance was furious, he actually put his hand inside his heart and grabbed hatred Gu.","Hatred Gu was like a curved blade without a handle, Blazing Glory Lightning Brilliance's hand was pierced and bled as he grabbed it.","He clenched his teeth and exerted strength, crushing hatred Gu to death.","But at the next moment, hatred Gu resurrected from the blood and became even bigger.","Blazing Glory Lightning Brilliance crushed it to death again, hatred Gu revived once again, its size becoming slightly bigger again.","\"It is useless.\" Hatred Gu said: \"Hatred cannot be killed, vengeance only breeds more hatred and grudges, the more you treat me like this, the more your hatred will increase.\"","Myriad Gold Wondrous Essence was somewhat stunned and helpless against hatred Gu.","\"It hurts, it hurts, it hurts!\" Blazing Glory Lightning Brilliance covered his chest, his face pale from the pain.","Hatred Gu was drilling in and out of his heart, creating holes after holes, transforming his heart into a heart of hatred.","The current Blazing Glory Lightning Brilliance hated fate Gu even more.","\"If I was not sent flying here by fate Gu, how could I have encountered hatred Gu? How could my heart be pierced by hatred Gu?\"","\"I will definitely destroy fate Gu, I will definitely take revenge.\"","The more Blazing Glory Lightning Brilliance thought, the more he hated. He was no longer afraid of angering lightning Gu, he stood up suddenly.","\"Sister, let's go, I don't want to stay here.\" Blazing Glory Lightning Brilliance held Myriad Gold Wondrous Essence's hand.","But Myriad Gold Wondrous Essence hesitated: \"Brother, there is lightning all around us, we don't know when it will strike, it is too dangerous.\"","Blazing Glory Lightning Brilliance said: \"Sister, don't be afraid. The hatred in my heart has shown me a path, that is the path of revenge. There is no lightning on this path, as long as I follow it, I can find fate Gu and take revenge against it. Quick, follow me!\"","Blazing Glory Lightning Brilliance dragged Myriad Gold Wondrous Essence.","The strange thing was that despite lightning bolts crackling around them, not a single one struck Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence.","The two ran and ran when they suddenly collided into something.","\"What is ahead?\" Myriad Gold Wondrous Essence touched the air in front of her and found it was like a transparent wall.","\"This is the heavenly wind qi wall, the border of the immemorial nine heavens.\" Hatred Gu explained.","\"Brother, there is a wall ahead, we cannot leave.\" Myriad Gold Wondrous Essence said helplessly.","But Blazing Glory Lightning Brilliance had a different perspective: \"Where is the wall? I only see the path ahead, as long as we follow along this trail, we can definitely leave and find fate Gu!\"","Time and again, Blazing Glory Lightning Brilliance got up and rushed forward before colliding into the heavenly wind qi wall, his head bled as he fell to the ground. Then, he climbed up and charged forward again.","Myriad Gold Wondrous Essence wanted to stop him, but Blazing Glory Lightning Brilliance did not listen.","Hatred Gu laughed: \"It is useless. I have already built my home in his heart, although his eyes are open, he can only see the path that I point towards, he cannot see any other thing. Hahaha.\"","Right at this time, lightning Gu sensed Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence, the terrifying lightning forest began to quickly spread towards them.","There was no road to advance or retreat, Myriad Gold Wondrous Essence was extremely anxious but did not have any ideas: \"It would have been great if we still had wealth Gu!\"","Blazing Glory Lightning Brilliance did not listen to her, he continued to collide into the heavenly wind qi wall. Blood filled the ground.","Lightning Gu finally reached closer, Myriad Gold Wondrous Essence cried: \"Am I going to die here?\"","But Lightning Gu restrained its power and approached slowly, it let out a rumbling sound: \"Don't worry, oh humans, I won't harm you or injure you. On the contrary, I want your help.\"","Myriad Gold Wondrous Essence stopped crying and asked curiously: \"Lightning Gu, you are so strong, how can we possibly help you?\"","Lightning Gu: \"I have been trapped here all along, immemorial blue heaven is large but I am already sick of it. I want to go out but I am unable to find a path that leads to the outside, thus I am angry. Anger often leads to hatred, so hatred Gu was attracted here.\"","\"But from your brother, I can see the path to exit. Therefore, humans, let us cooperate. I will help you break the heavenly wind qi wall and you will bring me out of here, alright?\" Lightning Gu proposed.","Myriad Gold Wondrous Essence and Blazing Glory Lightning Brilliance were very happy at this suggestion.","\"I agree to it. Your help will be great.\" Blazing Glory Lightning Brilliance replied.","Thereupon, lightning Gu landed on Blazing Glory Lightning Brilliance's hand and started to emit a terrifying radiance.","Hatred Gu laughed loudly: \"Let me lend you a hand.\"","Lightning Gu obtained hatred Gu's strength and became extremely powerful.","Rumble rumble…","Lightning Gu erupted with fierce strength, not only destroying the heavenly wind qi wall but even shattering the whole of immemorial blue heaven!","\"Quickly leave!\" Blazing Glory Lightning Brilliance was greatly shocked and knew that they had created a huge disaster, he quickly grabbed his sister and left with lightning Gu and hatred Gu."]},{"id":"part_36","title":"The Legends of Ren Zu - Part 36","part":"36","paragraphs":["Ren Zu lost freedom Gu, he was anguished and only recovered after a long time.","Ren Zu was troubled, he asked cognition Gu: \"Oh cognition Gu, how can I obtain freedom Gu again? After what happened last time, freedom Gu will not approach me anymore.\"","Cognition Gu answered: \"Oh human, why do you desire freedom Gu so much?\"","Ren Zu replied irritably: \"Don't you know the reason already? I am searching for freedom in order to break free of the restraints of fate.\"","Cognition Gu answered once again: \"Then I have nothing much to tell you. Haven't you told fate Gu the answer to this question already?\"","Ren Zu was dazed before he recalled.","Before he went insane, he met fate Gu. When he was harmed by fate Gu, he shouted at it that he would use his own strength and wisdom to obtain freedom, he would eventually break free from fate's control!","Ren Zu's eyes brightened: \"Oh Gu, I remember now, thank you for the reminder. I need to rely on myself to break free of fate. I already have my own strength, what I lack is my own wisdom. I need to let self Gu eat a mouthful of wisdom Gu, just like how it ate a part of strength Gu in the past.\"","\"But where is wisdom Gu?\" Ren Zu asked cognition Gu.","Cognition Gu: \"I do not know. Wisdom Gu has been to many places, its location is not fixed. You can find wisdom in countless places, so human, you need to find it yourself.\"","Ren Zu nodded as he set off on his journey again.","He walked and walked and walked, one day, he saw two Gu worms chasing each other along the road.","One Gu worm was white and tiny, it escaped ahead as it begged for mercy: \"Stop chasing me, stop chasing me, I do not want to be eaten by you.\"","The other Gu was clearly larger in size, it had thick armor and said in a deep tone: \"I want to eat you, I want to eat you! No matter where you escape to, I will eat you!\"","The tiny white Gu was about to be caught by the larger Gu behind, it suddenly saw Ren Zu and hid behind him: \"Oh human, I beg of you, quickly save me.\"","Ren Zu saw that this Gu worm was so pitiful, it was chased by another Gu worm, unable to fend for itself, he felt like he was seeing himself.","At this instance, a new heart grew in his chest — the heart of sympathy.","Ren Zu stretched out both arms as he stopped the larger Gu: \"Stop, stop chasing it.\"","The armored Gu shouted: \"Hey human, are you obstructing me? No, you cannot stop me, you are unable to stop me.\"","\"Why is that so?\" Ren Zu was curious.","The armored Gu explained: \"I am strong Gu, that is weak Gu. Since time immemorial, the rule of nature is that the strong prey on the weak. Thus, strong must eat weak, weaklings are the food of the strong.\"","Ren Zu sighed as he tried to convince the Gu: \"Then why don't you let it off just this once, look at how pitiful it is.\"","Strong Gu sneered: \"Not even once! In the eyes of the strong, weaklings have no stature, there is no sympathy for the weak. This is because heaven and earth will never pity the weak, it will only marvel at the incredible feats of the strong. Weaklings are born to be subdued, controlled, and devoured by the strong.\"","Ren Zu saw that his words fell on deaf ears, he could only deny strong Gu forcefully: \"I have already saved this Gu, go and eat others.\"","Strong Gu knew that it could not beat Ren Zu alone, it could only fly away in dissatisfaction: \"I will be back.\""]},{"id":"part_37","title":"The Legends of Ren Zu - Part 37","part":"37","paragraphs":["Ren Zu continued on his journey, after a while, a huge Predicament entered Ren Zu's vision.","Strong Gu was inside this Predicament's body, it laughed: \"Oh human, I am back again. This time, I have help, let's see what you can do!\"","Ren Zu had to stop walking, even though the Predicament before him was huge, he did not fluster.","Long long ago, Ren Zu had been chased by a group of Predicaments as he escaped, but after he gave his heart to hope Gu, those Predicaments which feared hope escaped in panic.","\"Oh hope Gu, I need your help.\"","Ren Zu summoned hope Gu but the light of hope did not scare away this Predicament.","What was going on?","\"Haha!\" Strong Gu laughed: \"Oh human, this Predicament has gained my help, it will definitely be the greatest Predicament you have ever met in your life. With just hope, how can you possibly defeat it?\"","Ren Zu could not think of a way.","At this moment, weak Gu that was shielded by Ren Zu spoke in a soft voice: \"Oh human, thank you for protecting me. Don't worry, I have an idea, let's scare this Predicament away!\"","\"You can scare it away?\"","Weak Gu shook its head: \"Oh human, even something as weak as me has a method to survive in life. Against those that want to eat or bully me, I will often put up a deceiving disguise, to make others think that I am very strong.\"","\"This world favors the strong. Even if we are weak, we need to disguise ourselves as strong beings or we will be bullied everywhere.\"","\"Oh human, you can do it. Don't you have fear Gu? Isn't attitude Gu on your face?\"","Ren Zu heard weak Gu's suggestion and decided to try it.","He first twisted his appearance using attitude Gu, revealing his teeth and showing a fierce expression. Next, he used fear Gu to scare the Predicament as it bore its teeth, sprawling on the ground and staring at Ren Zu vigilantly.","Ren Zu was dazed: \"Why didn't we scare it away?\"","Weak Gu urged: \"Didn't it jump earlier? This means that my method works, but we need to put in more effort. Oh human, why don't you put attitude Gu on top of self Gu? What is the best form of deceit or disguise? It is to deceive even yourself. By doing that, we should be able to deceive the Predicament.\"","Weak Gu continued: \"As long as the Predicament thinks that you are strong, it will definitely let you pass. That is because Predicaments often take the initiative to give way to the strong.\"","Ren Zu took off the mask on his face as he placed attitude Gu on self Gu.","However, it was pointless.","The Predicament did not run off in fear.","Ren Zu realized at once: \"I understand now, when a person faces a huge predicament, putting up a facade will never solve the real problem.\"","Strong Gu laughed: \"Oh human, stop wasting your effort. With me here to remind the Predicament, how can you guys possibly deceive it? You should not have saved weak Gu, weak people often like to jeer and taunt others, showing a ruthless demeanor to conceal their own weakness inside.\"","Ren Zu was helpless, he could only stall for time temporarily.","Suddenly, he had a flash of inspiration as he said to strong Gu: \"You said that the law of survival is for the strong to eat the weak, I agree with that. But how do you prove that you are strong while we are weak? If you cannot prove this, on what basis are you allowed to eat us?\"","Strong Gu was dazed: \"It is because I am strong Gu and that is weak Gu.\"","Ren Zu shook his head: \"Just your names alone cannot prove anything. Moreover, other than both of you Gu worms, myself and this Predicament are also here.\"","Strong Gu smiled coldly: \"Then I have a good method to prove it! We will eat a portion of each other, whoever fails to persevere to the end will lose, whoever is weak deserves to be eaten.\"","Ren Zu saw that he could not stall for any more time, he had to take a risk: \"Then we will do that. Don't regret it! However, which of us will eat first?\"","Strong Gu was confident in its strength, it chuckled: \"So what if I let you go first?\"","Ren Zu assessed the Predicament with his gaze, the truth was he had never eaten any Predicaments before.","Ren Zu thought about it before he had an idea: \"Then I will eat the head of the Predicament first.\"","Thus, Predicament took off its head and gave it to Ren Zu.","Ren Zu only took a bite when his face became distorted, he almost vomited on the spot: \"So bitter!\"","It turned out that this was a huge bitter head[1].","Not just that, even though the Predicament lost its head, it was still standing, the neck that was missing a head did not bleed at all, there were no issues at all.","\"Haha!\" Strong Gu laughed: \"Oh human, you chose wrongly, by just eating bitter heads, you cannot resolve any predicaments. Moreover, whether you are capable of eating this huge bitter head is another question altogether! If you cannot eat it, it means that you are a weakling, you deserve to be eaten by us.\"","Compared to the Predicament's head, Ren Zu's body was very small.","Ren Zu knew that strong Gu was right, he could not afford to lose. If he lost, not only would he fail to protect weak Gu, he would even lose his life and become the food of the Predicament.","Ren Zu could only frown as he opened his mouth, continuing to eat the bitter head.","After taking dozens of mouthfuls, Ren Zu suddenly stopped, he opened his mouth and almost vomited.","Hope Gu encouraged him: \"Oh human, don't vomit. If you grit your teeth, you can devour any hardship that comes your way. Humans do not just need to eat food, they also need to taste bitterness.\"","Ren Zu nodded as he continued to eat.","Halfway through, the fear Gu on his body started to shout: \"Oh heaven, when will we ever finish eating it?\"","Ren Zu also felt a trace of despair.","Courage Gu quickly said: \"Oh human, you cannot be afraid of tasting bitterness. Don't fear bitterness, suffering is only temporary, if you start to fear suffering, you will suffer for life.\"","With the help of courage Gu, Ren Zu finally managed to eat all of the bitter heads after great hardship.","Ren Zu wiped his mouth as he looked at strong Gu with difficulty: \"You can choose now.\"","Strong Gu smiled: \"Then we will eat your skin first.\"","Ren Zu had to pull off the skin on his body as he threw it to the Predicament.","The Predicament had no head, it stuffed Ren Zu's skin down its neck. Ren Zu's skin was completely eaten but its huge belly did not expand at all.","Strong Gu asked again: \"Oh human, what are you going to eat next?\"","Ren Zu was troubled now, he had just eaten the Predicament's head, it was too bitter, even though he endured the process, his stomach was almost full now.","As for the Predicament, even though it had no head, it was still alive and standing.","\"What should I eat now? I ate too much earlier, my stomach is reaching its limit, if I have to eat a lot, my stomach might burst and I'll die.\" Ren Zu thought to himself, he had to eat the most important and fatal part of the Predicament's body!","But which part of the Predicament's body was the most important?","After thinking for a long time, Ren Zu finally had an idea, he said to strong Gu: \"Then I will eat the part that you absolutely do not want me to eat.\"","Strong Gu snorted coldly: \"Then you can eat some losses[2].\"","It took out all of the losses from the Predicament's body and gave it to Ren Zu for consumption.","These losses were not big, the quantity was not large either.","Ren Zu was quite surprised, because after these losses were taken out, the originally huge Predicament shrunk by a lot.","Rules and regulation Gu started to explain for Ren Zu: \"Oh human, this is not strange. Predicaments vary according to people, since you ate such a huge bitter head earlier, you will have less losses to eat, thus, it became smaller.\"","Ren Zu became happy: \"This is great. Even if I eat all of these losses, I will not reach my limit, it will not fill my stomach completely.\"","Ren Zu opened his mouth and ate a small loss.","It was so spicy!","Ren Zu could not even speak at this moment.","Continuing to eat.","Ren Zu opened his mouth as he breathed heavily, his empty eye sockets also started to tear up uncontrollably.","Eating again.","Ren Zu's entire body was covered in sweat that merged with the tears flowing out of his eye sockets.","The most uncomfortable thing for Ren
